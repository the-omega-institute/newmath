name: Deploy BEDC Dossier

# Consumer of Build Paper's bedc-pdf artifact. Triggered by workflow_run
# after Build Paper succeeds. Renders the Quarto dossier site and (on push
# only) deploys to GitHub Pages. Previously this workflow rebuilt the PDF
# itself; that step is now subsumed by build-paper.yml so PR-time and
# push-time PDFs are produced exactly once per commit.

on:
  workflow_run:
    workflows: ["Build Paper"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Build Paper run ID whose bedc-pdf artifact to deploy"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read  # cross-workflow artifact download

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build_dossier:
    name: Render dossier
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        contains(fromJSON('["feature/dossier","dev","main","auto-dev"]'), github.event.workflow_run.head_branch)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository at triggering SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.37"

      - name: Set up Node.js (for dagre layout bake)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tools/dagre_layout/package-lock.json

      - name: Install dagre layout deps
        run: npm ci
        working-directory: tools/dagre_layout

      - name: Download PDF artifact from Build Paper run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bedc-pdf
          path: pdf-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.source_run_id || github.event.workflow_run.id }}

      - name: Stage PDF with UTC timestamp
        id: stage_pdf
        run: |
          ts=$(date -u +%Y-%m-%dT%H%M%SZ)
          pdf_name="bedc_${ts}.pdf"
          echo "pdf_name=${pdf_name}" >> "$GITHUB_OUTPUT"
          pdf_file=$(find pdf-artifact -maxdepth 1 -type f -name '*.pdf' -print -quit)
          if [ -z "$pdf_file" ]; then
            echo "No PDF found in artifact" >&2
            ls -la pdf-artifact || true
            exit 1
          fi
          cp "$pdf_file" "docs/dossier/${pdf_name}"
          ls -lh "docs/dossier/${pdf_name}"
          # Rewrite literal `bedc.pdf` references in source files so the
          # rendered site links to the timestamped filename.
          sed -i "s|bedc\.pdf|${pdf_name}|g" \
            docs/dossier/_quarto.yml \
            docs/dossier/index.qmd \
            docs/dossier/index.zh-CN.qmd

      - name: Build dossier visualization data
        run: python3 tools/build_dossier_status.py

      - name: Glossary completeness gate
        run: python3 tools/check_glossary.py

      - name: Render dossier
        run: quarto render docs/dossier/

      - name: Verify PDF reached _site
        run: |
          pdf_name="${{ steps.stage_pdf.outputs.pdf_name }}"
          if [ ! -f "docs/dossier/_site/${pdf_name}" ]; then
            echo "PDF missing from _site after render; copying as fallback"
            cp "docs/dossier/${pdf_name}" "docs/dossier/_site/${pdf_name}"
          fi
          ls -lh "docs/dossier/_site/${pdf_name}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dossier/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build_dossier
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
