name: Deploy BEDC Dossier

# Consumer of BEDC Build's bedc-pdf artifact. Triggered by workflow_run
# after BEDC Build succeeds. Renders the Quarto dossier site and (on push
# only) deploys to GitHub Pages. Previously this workflow rebuilt the PDF
# itself; that step is now subsumed by build-paper.yml so PR-time and
# push-time PDFs are produced exactly once per commit.

on:
  workflow_run:
    workflows: ["BEDC Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "BEDC Build run ID whose bedc-pdf artifact to deploy"
        required: true
        type: string

permissions:
  contents: read
  actions: read  # cross-workflow artifact download

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  resolve_source:
    name: Resolve dossier source
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        contains(fromJSON('["feature/dossier","dev","main","auto-dev"]'), github.event.workflow_run.head_branch)
      )
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.resolve.outputs.run_id }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
    steps:
      - id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}")"
            name="$(echo "$run_json" | jq -r '.name')"
            conclusion="$(echo "$run_json" | jq -r '.conclusion')"
            event="$(echo "$run_json" | jq -r '.event')"
            head_sha="$(echo "$run_json" | jq -r '.head_sha')"
            head_repo="$(echo "$run_json" | jq -r '.head_repository.full_name')"
            if [ "$name" != "BEDC Build" ] || [ "$conclusion" != "success" ]; then
              echo "::error::source_run_id must be a successful BEDC Build run" >&2
              exit 1
            fi
            case "$event" in push|workflow_dispatch) ;; *)
              echo "::error::manual deploy refuses source event '$event'" >&2
              exit 1
            esac
            echo "run_id=$SOURCE_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$head_sha" >> "$GITHUB_OUTPUT"
            echo "checkout_repository=$head_repo" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "checkout_repository=${{ github.event.workflow_run.head_repository.full_name }}" >> "$GITHUB_OUTPUT"
          fi

  build_dossier:
    name: Render dossier
    needs: resolve_source
    uses: ./.github/workflows/reusable-dossier-render.yml
    permissions:
      contents: read
      actions: read
    with:
      checkout_ref: ${{ needs.resolve_source.outputs.checkout_ref }}
      checkout_repository: ${{ needs.resolve_source.outputs.checkout_repository }}
      pdf_run_id: ${{ needs.resolve_source.outputs.run_id }}
      upload_pages_artifact: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build_dossier
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
