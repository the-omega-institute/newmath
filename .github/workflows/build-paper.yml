name: BEDC Build

# Single source of truth for PDF + Lean4 build. Runs on any push / PR that
# touches paper, lean, dossier source, or any workflow file involved in the
# build chain. Uploads `bedc-pdf` artifact for downstream consumers
# (dossier.yml, daily-build.yml) to download via workflow_run, removing
# the previous PR-time and dev-push-time duplicate PDF builds.

on:
  push:
    branches:
      - auto-dev
      - dev
      - main
      - feature/dossier
    paths:
      - 'docs/dossier/**'
      - 'papers/bedc/**'
      - 'lean4/**'
      - 'tools/**'
      - '.github/workflows/build-paper.yml'
      - '.github/workflows/dossier.yml'
      - '.github/workflows/daily-build.yml'
      - '.github/workflows/reusable-pdf.yml'
      - '.github/workflows/reusable-lean4.yml'
      - '.github/workflows/reusable-dossier-render.yml'
  pull_request:
    paths:
      - 'docs/dossier/**'
      - 'papers/bedc/**'
      - 'lean4/**'
      - 'tools/**'
      - '.github/workflows/build-paper.yml'
      - '.github/workflows/dossier.yml'
      - '.github/workflows/daily-build.yml'
      - '.github/workflows/reusable-pdf.yml'
      - '.github/workflows/reusable-lean4.yml'
      - '.github/workflows/reusable-dossier-render.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  # PR runs scope to the PR number so concurrent PRs don't cancel each
  # other; push runs scope to the ref so superseded pushes cancel.
  group: build-paper-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect_changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      tex: ${{ steps.detect.outputs.tex }}
      lean4: ${{ steps.detect.outputs.lean4 }}
    steps:
      - name: Detect changed files
        id: detect
        run: |
          # Trigger path filters already restrict this workflow to relevant
          # changes. Keep both validations on so workflow-file changes also
          # exercise the PDF and Lean jobs they affect.
          echo "tex=true" >> "$GITHUB_OUTPUT"
          echo "lean4=true" >> "$GITHUB_OUTPUT"

      - name: Write summary
        run: |
          {
            echo "build-paper path detection"
            echo
            echo "- run PDF validation: \`${{ steps.detect.outputs.tex }}\`"
            echo "- run Lean4 validation: \`${{ steps.detect.outputs.lean4 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build_pdf:
    name: Build main.pdf
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.tex == 'true' }}
    uses: ./.github/workflows/reusable-pdf.yml
    with:
      upload_artifact: true
      artifact_name: bedc-pdf
      artifact_retention_days: 14
    secrets: inherit

  build_lean4:
    name: Build Lean4
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.lean4 == 'true' }}
    uses: ./.github/workflows/reusable-lean4.yml
    secrets: inherit

  render_dossier_check:
    name: Render dossier check
    needs: [detect_changes, build_pdf]
    if: ${{ github.event_name == 'pull_request' && needs.detect_changes.outputs.tex == 'true' }}
    uses: ./.github/workflows/reusable-dossier-render.yml
    permissions:
      contents: read
      actions: read
    with:
      checkout_ref: ${{ github.sha }}
      checkout_repository: ${{ github.repository }}
      pdf_run_id: ""
      upload_pages_artifact: false

  gate:
    name: Gate
    needs: [detect_changes, build_pdf, build_lean4, render_dossier_check]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          detect_result="${{ needs.detect_changes.result }}"
          pdf_result="${{ needs.build_pdf.result }}"
          lean4_result="${{ needs.build_lean4.result }}"
          dossier_result="${{ needs.render_dossier_check.result }}"

          {
            echo "build-paper results"
            echo
            echo "- detect_changes: \`$detect_result\`"
            echo "- build_pdf: \`$pdf_result\`"
            echo "- build_lean4: \`$lean4_result\`"
            echo "- render_dossier_check: \`$dossier_result\`"
          } >> "$GITHUB_STEP_SUMMARY"

          # detect_changes must succeed.
          if [ "$detect_result" != "success" ]; then
            exit 1
          fi
          # Each sub-job: must be `success` (ran and passed) or `skipped`
          # (path detection said not needed). Any other state fails the gate.
          for r in "$pdf_result" "$lean4_result" "$dossier_result"; do
            case "$r" in
              success|skipped) : ;;
              *) exit 1 ;;
            esac
          done
