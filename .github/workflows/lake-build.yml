name: lake-build

on:
  push:
    paths:
      - 'lean4/**'
      - 'tools/check-axioms.py'
  pull_request:
    paths:
      - 'lean4/**'
      - 'tools/check-axioms.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Build Lean
        run: cd lean4 && lake build
      - name: Audit axioms
        run: python3 tools/check-axioms.py
