name: Rolling Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-build
  cancel-in-progress: false

jobs:
  build_pdf:
    name: Build main.pdf
    uses: ./.github/workflows/reusable-pdf.yml
    with:
      checkout_ref: ${{ github.sha }}
      upload_artifact: true
      artifact_name: rolling-pdf
      artifact_retention_days: 7
    secrets: inherit

  publish_rolling:
    name: Publish rolling prerelease
    needs: build_pdf
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download rolling PDF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rolling-pdf
          path: rolling-assets

      - name: Stage rolling PDF asset
        id: stage_asset
        run: |
          src_pdf="$(find rolling-assets -maxdepth 1 -type f -name 'bedc_*.pdf' -print -quit)"
          if [ -z "$src_pdf" ]; then
            echo "Expected a dated PDF artifact in rolling-assets" >&2
            exit 1
          fi
          mkdir -p release-staging
          cp "$src_pdf" release-staging/bedc_dev-latest.pdf
          commit_date="$(git show -s --format=%cs HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          {
            echo "asset_path=release-staging/bedc_dev-latest.pdf"
            echo "commit_date=$commit_date"
            echo "short_sha=$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Reset rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the prior dev-latest release (and its tag) so the new run
          # starts from a clean slate. softprops/action-gh-release does not
          # move an existing tag, so we recreate it pointed at the current SHA.
          if gh release view dev-latest --json id >/dev/null 2>&1; then
            gh release delete dev-latest --yes --cleanup-tag
          fi

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: dev-latest
          name: Rolling dev build
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: |
            Rolling build from the latest `dev` branch commit. The PDF asset
            is replaced on every push to `dev`; older copies are not retained.

            Stable download URL:
            `https://github.com/${{ github.repository }}/releases/download/dev-latest/bedc_dev-latest.pdf`

            - commit SHA: `${{ github.sha }}`
            - short SHA: `${{ steps.stage_asset.outputs.short_sha }}`
            - commit date: `${{ steps.stage_asset.outputs.commit_date }}`
          files: |
            ${{ steps.stage_asset.outputs.asset_path }}
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Write rolling summary
        run: |
          {
            echo "Published rolling dev build."
            echo
            echo "- target SHA: \`${{ github.sha }}\`"
            echo "- short SHA: \`${{ steps.stage_asset.outputs.short_sha }}\`"
            echo "- commit date: \`${{ steps.stage_asset.outputs.commit_date }}\`"
            echo "- release tag: \`dev-latest\` (prerelease, rolling)"
          } >> "$GITHUB_STEP_SUMMARY"
