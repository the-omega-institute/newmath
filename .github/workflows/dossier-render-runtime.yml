name: Dossier Render Runtime

on:
  push:
    paths:
      - '.github/images/dossier-render/**'
      - '.github/workflows/dossier-render-runtime.yml'
  pull_request:
    paths:
      - '.github/images/dossier-render/**'
      - '.github/workflows/dossier-render-runtime.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/the-omega-institute/newmath/dossier-render
  IMAGE_TAG: quarto-1.9.37-node22-texlivefull

jobs:
  build:
    name: Build dossier render runtime
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .github/images/dossier-render
          file: .github/images/dossier-render/Dockerfile
          platforms: linux/amd64
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Smoke runtime image
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            docker run --rm "${IMAGE_NAME}:${IMAGE_TAG}" dossier-render-smoke
          else
            docker run --rm "${IMAGE_NAME}@${{ steps.build.outputs.digest }}" dossier-render-smoke
          fi

      - name: Write digest summary
        run: |
          {
            echo "DossierRenderRuntime"
            echo
            echo "- image: \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- deploy reference: \`${IMAGE_NAME}@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
