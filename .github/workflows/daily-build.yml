name: Daily Build

# Consumer of BEDC Build's bedc-pdf artifact. Triggered by workflow_run
# after BEDC Build succeeds on a push to `dev`. Publishes the resulting
# PDF as a daily prerelease tag. Previously this workflow rebuilt the PDF
# (and Lean) itself; both steps are now subsumed by build-paper.yml so
# the dev push only produces one PDF.

on:
  workflow_run:
    workflows: ["BEDC Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "BEDC Build run ID whose bedc-pdf artifact to publish"
        required: true
        type: string

permissions:
  contents: write
  actions: read  # cross-workflow artifact download

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  publish_prerelease:
    name: Publish daily prerelease
    # Only act on successful BEDC Build runs that pushed to dev.
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'dev'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository at triggering SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve daily target
        id: resolve_target
        run: |
          daily_date="$(date -u +%Y-%m-%d)"
          release_tag="daily-${daily_date}"
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=Daily Build $daily_date" >> "$GITHUB_OUTPUT"

          git fetch origin --tags --force
          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Release tag $release_tag already exists; skipping subsequent pushes today." >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag exists
        if: ${{ steps.resolve_target.outputs.should_publish == 'false' }}
        run: |
          echo "${{ steps.resolve_target.outputs.skip_reason }}" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Validate source BEDC Build run (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}")"
          name="$(echo "$run_json" | jq -r '.name')"
          conclusion="$(echo "$run_json" | jq -r '.conclusion')"
          head_sha="$(echo "$run_json" | jq -r '.head_sha')"
          echo "Source run name=$name conclusion=$conclusion head_sha=$head_sha"
          if [ "$name" != "BEDC Build" ]; then
            echo "::error::source_run_id ${SOURCE_RUN_ID} workflow name is '$name', must be 'BEDC Build'" >&2
            exit 1
          fi
          if [ "$conclusion" != "success" ]; then
            echo "::error::source_run_id ${SOURCE_RUN_ID} conclusion is '$conclusion', must be 'success'" >&2
            exit 1
          fi
          checkout_sha="$(git rev-parse HEAD)"
          if [ "$head_sha" != "$checkout_sha" ]; then
            echo "::warning::source_run_id ${SOURCE_RUN_ID} head_sha=${head_sha} differs from checkout SHA=${checkout_sha}; PDF/release may be inconsistent" >&2
          fi
          {
            echo "Manual daily BEDC Build source validation"
            echo
            echo "- source run id: \`${SOURCE_RUN_ID}\`"
            echo "- workflow name: \`$name\` (expected BEDC Build)"
            echo "- conclusion: \`$conclusion\` (expected success)"
            echo "- head SHA: \`$head_sha\`"
            echo "- checkout SHA: \`$checkout_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download PDF artifact from BEDC Build run
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bedc-pdf
          path: release-assets/pdf
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.source_run_id || github.event.workflow_run.id }}

      - name: Resolve release assets
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        id: resolve_assets
        run: |
          pdf_path="$(find release-assets/pdf -maxdepth 1 -type f -name 'bedc_*.pdf' -print -quit)"
          if [ -z "$pdf_path" ]; then
            echo "Expected a dated PDF artifact in release-assets/pdf" >&2
            exit 1
          fi
          echo "pdf_path=$pdf_path" >> "$GITHUB_OUTPUT"

      - name: Delete orphan releases sharing this tag
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve_target.outputs.release_tag }}
        run: |
          # Soft-publish actions can leave behind draft releases (e.g. when a
          # previous run was interrupted). When a later run also targets the
          # same tag_name, GitHub rejects the finalize step with
          # "tag_name already_exists". Pre-clean: delete any existing draft
          # release whose tag matches our target.
          drafts=$(gh api "/repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq ".[] | select(.tag_name == \"${RELEASE_TAG}\" and .draft == true) | .id")
          if [ -n "$drafts" ]; then
            for id in $drafts; do
              echo "Deleting orphan draft release id=$id (tag=${RELEASE_TAG})"
              gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/releases/${id}"
            done
          else
            echo "No orphan draft for tag ${RELEASE_TAG}"
          fi

      - name: Write prerelease summary
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        run: |
          {
            echo "Built daily prerelease assets."
            echo
            echo "- target SHA: \`${{ steps.resolve_target.outputs.target_sha }}\`"
            echo "- PDF asset: \`${{ steps.resolve_assets.outputs.pdf_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish prerelease
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.resolve_target.outputs.release_tag }}
          name: ${{ steps.resolve_target.outputs.release_name }}
          prerelease: true
          target_commitish: ${{ steps.resolve_target.outputs.target_sha }}
          body: |
            Automated daily build from the first push to `dev` on this UTC day.

            - target SHA: `${{ steps.resolve_target.outputs.target_sha }}`
            - source branch: `dev`
          files: |
            ${{ steps.resolve_assets.outputs.pdf_path }}
          fail_on_unmatched_files: true
          generate_release_notes: false
