name: Daily Build

# Consumer of Build Paper's bedc-pdf artifact. Triggered by workflow_run
# after Build Paper succeeds on a push to `dev`. Publishes the resulting
# PDF as a daily prerelease tag. Previously this workflow rebuilt the PDF
# (and Lean) itself; both steps are now subsumed by build-paper.yml so
# the dev push only produces one PDF.

on:
  workflow_run:
    workflows: ["Build Paper"]
    types: [completed]

permissions:
  contents: write
  actions: read  # cross-workflow artifact download

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  publish_prerelease:
    name: Publish daily prerelease
    # Only act on successful Build Paper runs that pushed to dev.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository at triggering SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve daily target
        id: resolve_target
        run: |
          daily_date="$(date -u +%Y-%m-%d)"
          release_tag="daily-${daily_date}"
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=Daily Build $daily_date" >> "$GITHUB_OUTPUT"

          git fetch origin --tags --force
          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Release tag $release_tag already exists; skipping subsequent pushes today." >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag exists
        if: ${{ steps.resolve_target.outputs.should_publish == 'false' }}
        run: |
          echo "${{ steps.resolve_target.outputs.skip_reason }}" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Download PDF artifact from Build Paper run
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bedc-pdf
          path: release-assets/pdf
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve release assets
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        id: resolve_assets
        run: |
          pdf_path="$(find release-assets/pdf -maxdepth 1 -type f -name 'bedc_*.pdf' -print -quit)"
          if [ -z "$pdf_path" ]; then
            echo "Expected a dated PDF artifact in release-assets/pdf" >&2
            exit 1
          fi
          echo "pdf_path=$pdf_path" >> "$GITHUB_OUTPUT"

      - name: Delete orphan releases sharing this tag
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve_target.outputs.release_tag }}
        run: |
          # Soft-publish actions can leave behind draft releases (e.g. when a
          # previous run was interrupted). When a later run also targets the
          # same tag_name, GitHub rejects the finalize step with
          # "tag_name already_exists". Pre-clean: delete any existing draft
          # release whose tag matches our target.
          drafts=$(gh api "/repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq ".[] | select(.tag_name == \"${RELEASE_TAG}\" and .draft == true) | .id")
          if [ -n "$drafts" ]; then
            for id in $drafts; do
              echo "Deleting orphan draft release id=$id (tag=${RELEASE_TAG})"
              gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/releases/${id}"
            done
          else
            echo "No orphan draft for tag ${RELEASE_TAG}"
          fi

      - name: Write prerelease summary
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        run: |
          {
            echo "Built daily prerelease assets."
            echo
            echo "- target SHA: \`${{ steps.resolve_target.outputs.target_sha }}\`"
            echo "- PDF asset: \`${{ steps.resolve_assets.outputs.pdf_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish prerelease
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.resolve_target.outputs.release_tag }}
          name: ${{ steps.resolve_target.outputs.release_name }}
          prerelease: true
          target_commitish: ${{ steps.resolve_target.outputs.target_sha }}
          body: |
            Automated daily build from the first push to `dev` on this UTC day.

            - target SHA: `${{ steps.resolve_target.outputs.target_sha }}`
            - source branch: `dev`
          files: |
            ${{ steps.resolve_assets.outputs.pdf_path }}
          fail_on_unmatched_files: true
          generate_release_notes: false
