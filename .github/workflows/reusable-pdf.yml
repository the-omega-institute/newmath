name: Reusable PDF Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Branch, tag, or SHA to check out before building.
        required: false
        type: string
        default: ""
      upload_artifact:
        description: Upload the dated PDF as a workflow artifact.
        required: false
        type: boolean
        default: false
      artifact_name:
        description: Artifact name for the packaged PDF.
        required: false
        type: string
        default: main-pdf
      artifact_retention_days:
        description: Retention period for the uploaded PDF artifact.
        required: false
        type: number
        default: 90

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-main-pdf:
    name: Build main.pdf
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    defaults:
      run:
        shell: bash
        working-directory: papers/bedc
    steps:
      - name: Check out repository
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ref="${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}"
          git init "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$ref"
          git -C "$GITHUB_WORKSPACE" checkout --force FETCH_HEAD

      - name: Allow git metadata access in container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore LaTeX aux cache
        uses: actions/cache@v4
        with:
          path: |
            papers/bedc/main.aux
            papers/bedc/main.toc
            papers/bedc/main.out
          key: ${{ runner.os }}-latex-aux-${{ hashFiles('papers/bedc/main.tex', 'papers/bedc/preamble.tex', 'papers/bedc/frontmatter/**/*.tex', 'papers/bedc/parts/**/*.tex', 'papers/bedc/appendices/**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-latex-aux-

      - name: Build main.pdf
        run: |
          if locale -a | grep -Eiq '^en_US\.utf-?8$'; then
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
          fi

          # `make precheck` 跑 7 个 paper gate (tex size / math env / marker
          # uniqueness / naming / external provenance / warn_concrete_instances
          # / bedc_ci audit). 然后 pdflatex 两遍 (跟 main.pdf 目标的步骤一致).
          make precheck
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error main.tex

      - name: Package dated PDF
        if: ${{ inputs.upload_artifact }}
        id: package_pdf
        run: |
          pdf_name="bedc_$(git show -s --format=%cs HEAD).pdf"
          cp main.pdf "$pdf_name"
          echo "pdf_name=$pdf_name" >> "$GITHUB_OUTPUT"

      - name: Upload main.pdf artifact
        if: ${{ inputs.upload_artifact }}
        id: upload_pdf
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: papers/bedc/${{ steps.package_pdf.outputs.pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Retry main.pdf artifact upload
        if: ${{ inputs.upload_artifact && steps.upload_pdf.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: papers/bedc/${{ steps.package_pdf.outputs.pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
          overwrite: true
