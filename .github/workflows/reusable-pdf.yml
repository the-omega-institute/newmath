name: Reusable PDF Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Branch, tag, or SHA to check out before building.
        required: false
        type: string
        default: ""
      upload_artifact:
        description: Upload the dated PDF as a workflow artifact.
        required: false
        type: boolean
        default: false
      artifact_name:
        description: Artifact name for the packaged PDF.
        required: false
        type: string
        default: main-pdf
      artifact_retention_days:
        description: Retention period for the uploaded PDF artifact.
        required: false
        type: number
        default: 90

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-pdfs:
    name: Build PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    defaults:
      run:
        shell: bash
        working-directory: papers/bedc
    steps:
      - name: Check out repository
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ref="${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=2 origin "$ref"
          git -C "$GITHUB_WORKSPACE" checkout --force FETCH_HEAD

      - name: Restore LaTeX aux cache
        uses: actions/cache@v4
        with:
          path: |
            papers/bedc/main.aux
            papers/bedc/main.toc
            papers/bedc/main.out
            papers/bedc/concrete_instances_opening.aux
            papers/bedc/concrete_instances_opening.toc
            papers/bedc/concrete_instances_opening.out
            papers/bedc/concrete_instances_middle.aux
            papers/bedc/concrete_instances_middle.toc
            papers/bedc/concrete_instances_middle.out
            papers/bedc/concrete_instances_analysis.aux
            papers/bedc/concrete_instances_analysis.toc
            papers/bedc/concrete_instances_analysis.out
            papers/bedc/concrete_instances_completion.aux
            papers/bedc/concrete_instances_completion.toc
            papers/bedc/concrete_instances_completion.out
          key: ${{ runner.os }}-latex-aux-${{ hashFiles('papers/bedc/main.tex', 'papers/bedc/preamble.tex', 'papers/bedc/frontmatter/**/*.tex', 'papers/bedc/parts/**/*.tex', 'papers/bedc/appendices/**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-latex-aux-

      - name: Build PDFs
        run: |
          if locale -a | grep -Eiq '^en_US\.utf-?8$'; then
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
          fi

          # `make precheck` runs paper gates, then each PDF target runs pdflatex twice.
          make precheck
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_opening.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_opening.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_middle.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_middle.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_analysis.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_analysis.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_completion.tex
          pdflatex -interaction=nonstopmode -halt-on-error -file-line-error concrete_instances_completion.tex

      - name: Package dated PDFs
        if: ${{ inputs.upload_artifact }}
        id: package_pdf
        run: |
          pdf_name="bedc_$(git show -s --format=%cs HEAD).pdf"
          concrete_opening_pdf_name="bedc_concrete_instances_opening_$(git show -s --format=%cs HEAD).pdf"
          concrete_middle_pdf_name="bedc_concrete_instances_middle_$(git show -s --format=%cs HEAD).pdf"
          concrete_analysis_pdf_name="bedc_concrete_instances_analysis_$(git show -s --format=%cs HEAD).pdf"
          concrete_completion_pdf_name="bedc_concrete_instances_completion_$(git show -s --format=%cs HEAD).pdf"
          cp main.pdf "$pdf_name"
          cp concrete_instances_opening.pdf "$concrete_opening_pdf_name"
          cp concrete_instances_middle.pdf "$concrete_middle_pdf_name"
          cp concrete_instances_analysis.pdf "$concrete_analysis_pdf_name"
          cp concrete_instances_completion.pdf "$concrete_completion_pdf_name"
          echo "pdf_name=$pdf_name" >> "$GITHUB_OUTPUT"
          echo "concrete_opening_pdf_name=$concrete_opening_pdf_name" >> "$GITHUB_OUTPUT"
          echo "concrete_middle_pdf_name=$concrete_middle_pdf_name" >> "$GITHUB_OUTPUT"
          echo "concrete_analysis_pdf_name=$concrete_analysis_pdf_name" >> "$GITHUB_OUTPUT"
          echo "concrete_completion_pdf_name=$concrete_completion_pdf_name" >> "$GITHUB_OUTPUT"

      - name: Upload main.pdf artifact
        if: ${{ inputs.upload_artifact }}
        id: upload_pdf
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: papers/bedc/${{ steps.package_pdf.outputs.pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Retry main.pdf artifact upload
        if: ${{ inputs.upload_artifact && steps.upload_pdf.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: papers/bedc/${{ steps.package_pdf.outputs.pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
          overwrite: true

      - name: Upload concrete_instances_opening.pdf artifact
        if: ${{ inputs.upload_artifact }}
        id: upload_concrete_opening_pdf
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-opening
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_opening_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Retry concrete_instances_opening.pdf artifact upload
        if: ${{ inputs.upload_artifact && steps.upload_concrete_opening_pdf.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-opening
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_opening_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
          overwrite: true

      - name: Upload concrete_instances_middle.pdf artifact
        if: ${{ inputs.upload_artifact }}
        id: upload_concrete_middle_pdf
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-middle
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_middle_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Retry concrete_instances_middle.pdf artifact upload
        if: ${{ inputs.upload_artifact && steps.upload_concrete_middle_pdf.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-middle
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_middle_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
          overwrite: true

      - name: Upload concrete_instances_analysis.pdf artifact
        if: ${{ inputs.upload_artifact }}
        id: upload_concrete_analysis_pdf
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-analysis
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_analysis_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Retry concrete_instances_analysis.pdf artifact upload
        if: ${{ inputs.upload_artifact && steps.upload_concrete_analysis_pdf.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-analysis
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_analysis_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
          overwrite: true

      - name: Upload concrete_instances_completion.pdf artifact
        if: ${{ inputs.upload_artifact }}
        id: upload_concrete_completion_pdf
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-completion
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_completion_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Retry concrete_instances_completion.pdf artifact upload
        if: ${{ inputs.upload_artifact && steps.upload_concrete_completion_pdf.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}-concrete-instances-completion
          path: papers/bedc/${{ steps.package_pdf.outputs.concrete_completion_pdf_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
          overwrite: true
