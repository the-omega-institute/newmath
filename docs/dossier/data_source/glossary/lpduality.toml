key = 'lpduality'

aliases = ['LPDualityUp']

constructive_story_zh = '一条线性规划对偶行从有限行列承载、带 TotalOrderUp 比较的 FieldUp 标量表面, 以及系数、右端项和成本行开始, 原可行性、对可行性和目标端点都由有限求和计算出来. 承载只接受那些可行区域行来自 ConvexSetUp 和 PolytopeUp、标量运算与比较来自有序域表面, 且弱对偶、互补松弛、面和目标纤维数据都保持为有限 BHist 行的包. 两个已接纳包相同, 是把标量端点、可行见证、目标值、有限求和账本、面见证和消费者行逐分量用 hsame 输运, 从不使用环境矩阵相等或商向量空间相等. 源谱是有限有序域可行性行加凸集与多胞形依赖行, 模式谱记录弱对偶比较和互补松弛相等, 账本保留非负性、有限求和单调性、目标读回、凸闭合和面-纤维行. 五条命名证书义务由已接纳可行包、继承的等价与序稳定行, 以及在分类替换后重建每个原问题、对偶、目标和账本行的有限输运证明给出. 一个包历史 h 落入 LPDualityUp token p 的签名 GAP, 当源域接受它的有序域原-对表面, 签名关系把它配对到答案对偶包和证据账本, token 引入关系把答案命名为 p; 展开后, 可行性行、弱对偶比较和任何互补松弛相等正是 p 编码的数据. 本章把这一有限有序域对偶构造命名为 LPDualityUp; 不引入优化求解器、强对偶存在定理、分离定理或标准桥.'

[en]
label = 'LPDuality'
desc = 'Primal/dual linear-program pair; strong duality and complementary slackness.'
wiki = 'https://en.wikipedia.org/wiki/Dual_linear_program'

[zh]
label = '线性规划对偶'
desc = '原 / 对线性规划对; 强对偶与互补松弛.'
