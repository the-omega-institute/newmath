key = 'simplicialcomplex'

aliases = ['SimplicialComplexUp']

constructive_story_zh = '单纯复形从有限单纯形代码脊生成，并配上一条由 PosetUp 行供应的面关系，以及由 FinSetUp 供应的有限枚举行。承载接纳有限脊列出的单纯形历史，并沿展示的面关联向下封闭；不在枚举中的代码，或没有共享偏序传递性行的面关系，都不属于这个 seed 表面。两个展示通过共享单纯形代码分类器、继承的面关系和公共维数分级行比较，所以交与并是对已承载单纯形谓词逐点取合取或析取，而不是外部几何实现。源是固定顶点来源上的有限面承载，模式记录面链封闭、维数单调性、交封闭、并封闭、追加有限枚举和并的分级行，账本保留单纯形代码、有限脊、面关联、分支和分级比较。这个 seed 层级的命名证书义务也在同一批行中可见：已接纳有限承载给有居住表面，共享分类器提供自反、对称、传递，面链、并和交封闭把输运后的面重新打包成已承载单纯形。一条历史 h 落入 SimplicialComplexUp token p 的签名 GAP，当源域接纳它的有限面承载，签名关系把它配对到答案承载和证据账本，token 引入关系把该答案命名为 p；展开后，h 列出的有限单纯形清单、面链封闭和维数分级数据正是 p 编码的数据。本章把这一有限面偏序构造命名为 SimplicialComplexUp；不引入同调、几何实现、完整公开单纯复形对象或标准桥。'

[en]
label = 'SimplicialComplex'
desc = 'Finite simplices closed under taking faces, with grading.'
wiki = 'https://en.wikipedia.org/wiki/Simplicial_complex'

