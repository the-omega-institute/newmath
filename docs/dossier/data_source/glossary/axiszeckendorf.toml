key = 'axiszeckendorf'

constructive_story_zh = '全轴封缄从一个前缀线程开始: 这是一个包含空历史并且在 Ezero 扩展下封闭的历史成员谓词, 在本章特化为已经从空历史生成出来的零轴线程. 承载只接受线程成员, 而有限标记 boundary_01 = Eone(Ezero(空)) 被刻意留在线程之外, 因为它的头是 Eone 而不是 Ezero. 两个可见封缄条目通过同一线程中的共同成员资格来分类, 因而源谱是前缀线程成员资格, 模式谱是线程内部反复 Ezero 扩展, RealUp、Cauchy、紧致性、度量或极限行都不被接受为源. 账本保留前缀线程、每个可见线程成员、有限边界标记、边界排除行和公开封缄别名, 而不把被排除标记变成完备化点. 五条命名证书义务在线程成员资格本身上闭合: 空历史给出承载非空, 共同成员资格在成员上自反、对称、传递, 被分类到的可见目标已经是同一已接纳线程的成员. 一条历史 h 落入 FullAxisUp token p 的签名 GAP, 当源域接受 h 为零轴前缀线程成员, 签名关系把它配对到一个答案封缄行和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 是有限 Ezero 前缀成员, 而不是有限排除边界标记, 除非 p 只把该标记命名为外侧边界行. 本章把这一结构封缄命名为 FullAxisUp; 不引入 RealUp 完备性、度量完备化、紧致性、极限对象、无穷读法或独立封缄原件.'

[en]
label = 'AxisZeckendorf'
desc = 'Conservative bridge cluster: e0-spine repetition, Zeckendorf normal form, Fibonacci carry classifier, prefix-thread seal.'

[zh]
label = '零轴-Zeckendorf 桥'
desc = '保守桥接簇: e0-自旋重复, Zeckendorf 正规形, Fibonacci 进位分类器, 前缀线程封缄.'
