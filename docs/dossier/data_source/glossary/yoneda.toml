key = 'yoneda'

aliases = ['YonedaUp']

constructive_story_zh = '这个 scoped Yoneda 对象由一元前缀构成: 对前缀 p 与 q, 要求在每个一元对象上都有一个空自然变换分量, 于是展示族 Y_p(q) 被接纳当且仅当这两个前缀一元并且历史相同. 因而承载接受的是空分量族, 排除任意分量选择和非一元预层数据; 分类器是在前缀历史上的 HSame, 而确定性定理把任何展示分量族都压回同一个空分量. 源是语义前缀函子表面加前缀自然变换分量证书, 模式记录空分量刻画、源和目标确定性、边界输运以及前缀 full-faithfulness, 账本保留分量族及其被求值出的分量历史. 因为空历史给出分量选择, HSame 在历史上自反、对称、传递, 命名证书义务由语义证书承担, 分类器下的封闭由边界输运行给出. 一条历史 h 落入 YonedaUp token p0 的签名 GAP, 当源域把 h 接受为空分量族, 签名关系把它配对到答案前缀和证据账本, token 引入关系把该答案命名为 p0; 展开后, 每个一元对象都看到空分量, 目标前缀与 p0 编码的表示前缀 HSame. 纸面桥把 BEDC 一元前缀解码成外部有限一元词, 再把这样的词编码回同一条一元历史, 所以外部读回相等对同一前缀分类器是保守的. 本章把这一前缀空分量骨架命名为 YonedaUp; 它给出 fully faithful 的可表示片段, 不引入一般预层范畴、任意 Yoneda 引理或外部自然同构承载.'

