key = 'polytope'

aliases = ['PolytopeUp']

constructive_story_zh = '多面体包由一个 ConvexSetUp 依赖和一个 FinSetUp 依赖并列开始，然后列出有限半空间历史、顶点历史、边历史、面历史、关联行、有限 Cont 账本和一个 Pkg 来源行。承载只接纳这样的面包：半空间由凸集依赖限定，顶点、边、面和关联索引由有限集依赖限定，并且每个展示面都由有限半空间账本和关联账本生成；度量空间、商承载或外部面格不进入该包。两个包按分量用 hsame 比较半空间、顶点、边、面、关联、延拓和来源行，同时固定两个依赖证书。源是这个展示的有限面包，模式记录半空间稳定性、有限顶点-边-面读回、依赖读回、下游凸侧和组合侧投影以及分类器输运，账本让每个原始行都与由它产生的消费者可见面或关联行对齐。在 seed 层级，命名证书义务作为义务清单可见而不是 Lean 已检查公开证书：已接纳包给承载见证，逐分量 hsame 给自反、对称、传递，稳定性定理说明输运后的分量仍能重新打包为已接纳包。一条历史 h 落入 PolytopeUp token p 的签名 GAP，当源域接纳 h 为这个有限面包，签名关系把它配对到答案包和证据账本，token 引入关系把该答案命名为 p；展开后，p 命名同一批有限半空间、顶点、边、面、关联、延拓和来源行。本章把这一有限面账本构造命名为 PolytopeUp；它仍是 seed 表面，不引入欧氏度量、面格完备性、商承载、标准桥或 Lean 验证目标。'

