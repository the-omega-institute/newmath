key = 'padic'

aliases = ['PadicUp']

constructive_story_zh = '这里闭合的 p-adic 表面是素数尺度结果行: 取一条展示为 PrimeUp 的历史 p, 再取一条一元指数 e, 只接纳那些由一元乘法见证展示为 p 乘以 e 的结果历史 r. 已接纳结果上的分类器是结果历史的 hsame, 所以两个尺度计算只有在乘法确定性识别其展示端点时才命名同一个结果; 非素数底、非一元指数和不是由尺度谓词产生的历史都被排除. 源、模式和账本都从同一个素数尺度包中读出: 源固定素数和指数, 模式记录一元分量、全域性、结果唯一性、后继和 append 指数反演、单位指数读回以及分解行, 账本让 NatPrime、NatMul、UnaryHistory、Cont、append 和 hsame 见证保持可见. 素数尺度全域性给出一个承载结果, hsame 律给出自反、对称、传递, 沿 hsame 输运只需重新打包同一个具体乘法见证, 因而五条命名证书义务不需要估值域就能闭合. 一条历史 h 落入 PadicUp token p0 的签名 GAP, 当源域接受所选素数和指数, 签名关系把尺度结果配对到一条答案历史与证据账本, token 引入关系把那条答案命名为 p0; 展开后, h 是 token 编码的素数底乘以指数得到的唯一一元乘积. 本章把这一素数尺度结果证书命名为 PadicUp; 不引入 p-adic Cauchy 完备化、估值代数、域律或标准桥.'

[en]
label = 'Padic'
desc = 'p-adic numbers; completion of Q under p-adic norm.'
wiki = 'https://en.wikipedia.org/wiki/P-adic_number'

