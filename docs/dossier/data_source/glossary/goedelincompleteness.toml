key = 'goedelincompleteness'

aliases = ['GoedelIncompletenessUp']

constructive_story_zh = '一个 GoedelIncompletenessUp 标记 命名一个算术语言上的递归可枚举公理集 T、一个由 NameCert_{ComputableUp} 证明检查解码器实现的算术化可证性谓词 Prov_T(x)、公式上的 Gödel 编号 ⌜·⌝, 以及自指不动点行 G 满足 T ⊢ G ↔ ¬Prov_T(⌜G⌝). 承载接纳一份不完备性见证, 当 T 一致 (无证明检查器跑出 ⊥), 并且 G 在 T 中既不可证亦不可反驳. 分类器是固定 Gödel 编号下不动点行上的 hsame; 源覆盖公理枚举、证明检查器解码器、Gödel 编号行、不动点行与可证性见证; 模式记录一致性可纳入、不动点可纳入、可证性可纳入、可反驳性可纳入与递归公理化可纳入行; 账本让公理枚举、证明检查器、Gödel 编号与不动点行保持可见. 五条命名证书义务由 NameCert_{ComputableUp} 提供给证明检查器, 加 NameCert_{FirstOrderUp} 与 NameCert_{ModelTheoryUp} 提供给句法承载: 有居住的恒等证书是算术语言上的空公理系统; 分类器稳定性是不动点行上自反、对称、传递的 hsame; 输运把证明检查通过 Gödel 数输运重新打包; 账本精确性把已接纳见证与不动点恒等同一; 扩张边界固定递归公理化规则. 一条历史 h 落入 GoedelIncompletenessUp 标记 p 的签名缺口, 当源域接纳一致的递归公理化理论, 签名关系把它配对到不可判定的不动点行, 标记 引入把该不动点命名为 p. 本章把这一自指不完备性表面命名为 GoedelIncompletenessUp; 它是一个有限公理化的不完备性对象, 不证语义完备性定理, 不证第二不完备性定理 (¬Prov_T(⊥) 不可证), 不主张 ω-一致性, 也不通往标准集论基础桥.'

[en]
label = 'GoedelIncompleteness'
desc = 'Arithmetised provability predicate over a recursively-axiomatised first-order arithmetic, plus a self-referential fixed-point row.'
