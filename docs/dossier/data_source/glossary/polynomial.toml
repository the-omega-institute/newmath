key = 'polynomial'

aliases = ['PolynomialUp']

constructive_story_zh = '在这个成熟单点边界上, 一个多项式是一条归一化系数列表, 而它的可见代表永远是空历史: 承载只接受被分类为空历史的代码, 归一化也把每个已接纳代码送回这个端点. 分类器是受限单点关系 rho_emp, 所以两个多项式代码相同, 只意味着两边都在 A_emp 中并且底层历史 hsame, 而不是把任意列表按尾零等价取商. 源是单点环上的归一化系数列表纪律, 模式记录零、一、原始加法、乘法、归一化幂等、裁剪兼容、字面结合律、求值和读回行, 账本把原始系数列表与它的空归一化代表同时保留. 因为空历史给出承载见证, hsame 自反、对称、传递, 单点承载又能沿历史相等输运, 五条命名证书义务在调用外部多项式代数之前就已经完成. 一条历史 h 落入 PolynomialUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个归一化答案和证据账本, token 引入关系把那条答案命名为 p; 在这里, 这只剩下 h 是已接纳的单点代码, 归一化系数列表为空, p 命名单点零多项式值. 已检查的标准桥把同一个端点读成外部单点归一化多项式表, 再读回 BEDC 的空代表, 同时保持加法、乘法、求值与裁剪这些端点律. 本章把这一归一化单点构造命名为 PolynomialUp; 它闭合的是展示的零多项式表面, 不形成商类, 不引入泛性质、多项式导数或超出已列行的求值理论.'

