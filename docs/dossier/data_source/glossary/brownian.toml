key = 'brownian'

aliases = ['BrownianUp']

constructive_story_zh = '一个 Brownian 包不是宿主路径空间; 它是有限展示元组 (M,C,T,I,N,P,rho,lambda), 其中 martingale 行 M 通过 MartingaleUp 的 NameCert 读取, 路径连续行 C 通过 ContinuousMapUp 的 NameCert 读取, 时间、增量、正态步、来源和输运行全是 BHist 数据. 承载只接纳 martingale 依赖给出 adaptedness 与步行、continuous-map 依赖给出路径连续行、且正态步与相邻时间账本均被展示的元组; 分类器通过两个依赖证书和 hsame 逐行输运 M、C、T、I、N、P、rho、lambda. 因而源只覆盖这个有限 step-continuity 包, 模式是 martingale adaptedness 加高斯相邻增量和连续路径读回, 账本把每个公共坐标保存为展示元组中的一行或从 M、C 投影出的行. 由于两个依赖分类器是等价关系, 其余字段又逐分量使用历史相等, 一个已接纳 Brownian 包给出承载见证, 分类器自反、对称、传递, 被输运后的包保持同一义务表面. 一个包 h 落入 BrownianUp token p 的签名 GAP, 当源域接受其 martingale 行、连续路径行、时间脊、步账本、正态步展示和来源, 签名关系把该元组配对到答案元组和证据账本, token 引入关系把答案命名为 p; 展开后, token 记录的正是那些 adapted、continuous、Gaussian-step 行. 这里不导出标准 Brownian 桥. 本章把这一有限 step-continuity 构造命名为 BrownianUp; Brownian motion 由依赖证书和展示账本表示, 不引入高斯测度构造、路径空间完备性、随机微积分或宿主随机过程对象.'

[en]
label = 'Brownian'
desc = 'Continuous-time stochastic process with Gaussian increments and continuous paths.'
wiki = 'https://en.wikipedia.org/wiki/Brownian_motion'

