key = 'cohomology'

aliases = ['CohomologyUp']

constructive_story_zh = '一个 cohomology cocycle 由历史上的展示上链微分 d 生成: 历史 h 被接纳当且仅当微分端点 d(h) 与空历史 hsame. 微分没有塌缩到空端点的历史被排除, 分类器通过微分端点比较已接纳历史, 问 d(h) 与 d(k) 是否 hsame, 而不是按 coboundary 做商. 源、模式和账本策略都是 cocycle 谓词, 模式行展开右侧、左侧和双侧 axis cancellation, 沿 cocycle axis 的 append 封闭, 以及穿过延拓和 hsame 上下文的输运. 命名证书义务由 append-preservation 证明给出空历史是 cocycle, 由展示微分历史上的 hsame 自反、对称、传递给出分类器等价性, 再由 carrier transport 把分类器见证和源 cocycle 见证复合起来. 一条历史 h 落入 CohomologyUp token p 的签名 GAP, 当源域接受 h 为 cocycle, 签名关系把它配对到答案 cocycle 和证据账本, token 引入关系把该答案命名为 p; 具体地说, h 的微分为空, 且它的微分端点与 p 编码的端点分类为同一个. 纸面桥边界把这保持为展示上链微分上的 cocycle 谓词, 而不是外部 coboundary 商或 cohomology 群. 本章把这一 cocycle-predicate 构造命名为 CohomologyUp; 所有可见信息都留在微分端点、axis 行和账本中, 不引入 cup product、sheaf complex、spectral sequence 或宿主商原件.'

[en]
