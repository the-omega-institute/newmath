key = 'liealgebra'

aliases = ['LieAlgebraUp']

constructive_story_zh = '李代数先取已认证的 VecSpaceUp 承载, 再给同一向量承载附上一条双线性反对称括号, 括号输出仍留在该承载中, Jacobi 行也能由分类器读取. 两个代数包相同, 是向量端点由 VecSpaceUp reduct 分类, 且每个括号、加法、标量和伴随端映射端点都沿同一个承载分类器输运. 源覆盖带括号行的已承载向量端点, 模式记录封闭、双线性、反对称、Jacobi、零括号消去和内导子恒等式, 账本让括号来源与 LinearMapUp 伴随端映射包对下游消费者可见. 承载由零向量行居住, 五条证书义务成立是因为向量分类器自反、对称、传递, 并且在加法、标量作用、括号形成和被输运括号端点下稳定. 一条历史 h 落入 LieAlgebraUp token p 的签名 GAP, 当源域接受 h 的向量加括号包, 签名关系把它配对到答案代数包和证据账本, token 引入关系把答案命名为 p; 展开后, 向量承载、括号端点、由 Jacobi 导出的伴随作用和线性端映射行都匹配 p 编码的数据. 纸面桥把这些行暴露给伴随表示和根系消费者, 但不提供 Lie 群积分桥或分类定理. 本章把这一向量承载上的括号构造命名为 LieAlgebraUp; 不假定环境代数对象、隐藏切空间或外部 Lie 理论分类.'

[en]
label = 'LieAlgebra'
desc = 'Vector space with antisymmetric bracket satisfying Jacobi identity.'
wiki = 'https://en.wikipedia.org/wiki/Lie_algebra'

[zh]
label = '李代数'
desc = '带反对称括号且满足 Jacobi 恒等式的向量空间.'
wiki = 'https://zh.wikipedia.org/wiki/%E6%9D%8E%E4%BB%A3%E6%95%B0'
