key = 'iwasawa'

aliases = ['IwasawaUp']

constructive_story_zh = '一个 Iwasawa 塔窗口由已认证的分圆行、已认证的理想类端点、一段有限一元层级列表, 以及把相邻展示层连接起来的 Cont 迁移账本共同组装出来. 承载只接纳这个有限包, 外加一条 Pkg 来源行把分圆源、理想类源、层级指标和迁移行绑定在一起; 宿主投射极限、解析 p-adic L 函数和任何未展示等式都留在承载之外. 两个已接受窗口只有在一元层级窗口由 HSame 相关、分圆和理想类行通过依赖证书分类、并且每条迁移账本逐层输运兼容时才算同一个, 所以源谱就是同一个有限塔包, 模式谱是展示出来的分圆端点、理想类和迁移形状. 账本把原始行作为可见塔窗口保留下来: 层级、端点、迁移延拓、分类器输运和来源都不塌缩成逆极限对象. 一旦展示了这样的有限窗口, 五条命名证书义务由依赖分类器和有限输运共同给出: 包本身见证承载非空, 分类器逐分量自反、对称、传递, 被分类器输运后的包仍保持同样的有限形状. 一条历史 h 落入 IwasawaUp token p 的签名 GAP, 当源域接受 h 为这个有限塔窗口, 签名关系把它配对到答案窗口和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 必须暴露 p 编码的分圆源行、理想类端点、一元层级指标、相邻迁移账本、HSame 输运和来源. 本章把这一有限窗口构造命名为 IwasawaUp; 不引入 Iwasawa 主猜想、投射极限商、解析 p-adic L 函数、标准桥或额外塔原件.'

