key = 'splittingfield'

aliases = ['SplittingFieldUp']

constructive_story_zh = '一个分裂域被表示为根承载包, 其条目是 FieldExtUp 源行、该源上的 PolynomialUp 行、显示根端点、显示因子行、有限因子分解账本、输运见证和包来源. 承载只接受这些行是由指定 Cont 展示连在一起的一元历史的包, 所以商域承载、代数闭包承载和宿主根集都不会成为被接受输入. 它的分类器是沿 hsame 对域扩张行、多项式行、根端点、因子行和输运行作出的输运一致性, 同时保留同一份因子分解账本和来源. 源谱是整个根包, 模式谱是所携带多项式按列出线性因子与根分裂的可见因子分解, 账本精确记录让每个原始因子读回可见的延拓行与来源行. 在这个义务边界上, 一旦显示一个被接受包就给出承载非空见证, 分类器要求的 hsame 行给出自反、对称、传递, 输运义务则说明分类后同一批 E、P、R、F、C、H、Pi 数据还能重包为承载. 一条历史 h 落入 SplittingFieldUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案根包和证据账本, token 引入关系把答案命名为 p; 这里它收缩为 h 正是其 FieldExt 行、Polynomial 行、根、因子、Cont 账本、hsame 输运和 Pkg 来源都为所携带包行的端点. 本章把这一构造命名为 SplittingFieldUp; 不加入商域、代数闭包对象、宿主层根集或标准桥.'

[en]
label = 'SplittingField'
desc = 'Smallest field extension over which a polynomial factors into linear terms.'
wiki = 'https://en.wikipedia.org/wiki/Splitting_field'

[zh]
label = '分裂域'
desc = '使多项式分裂为线性因子的最小域扩张.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%88%86%E8%A3%82%E5%9F%9F'
