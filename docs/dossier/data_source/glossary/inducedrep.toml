key = 'inducedrep'

aliases = ['InducedRepUp']

constructive_story_zh = '一个诱导表示包从两个被消费的证书开始: 命名子群包含的 SubgroupUp 行, 以及命名表示环源和目标的 RepresentationRingUp 行; 随后在同一个有限 BHist 包中展示诱导、限制、Frobenius 比较、单位、余单位、延拓和来源行. 承载只接纳这些展示行, 任何宿主表示范畴、陪集承载、函子相等、伴随对象、特征标公式或未在包内出现的桥接行都被排除. 两个已接受包通过逐分量 HSame 输运来分类: 子群源、表示环源、诱导端点、限制端点、Frobenius 账本、来源包和有限 Cont 账本都必须对应输运, 因而源谱覆盖两个依赖证书, 模式谱是展示出来的诱导-限制与 Frobenius 形状. 账本让原始侧和可见侧对齐, 保留子群行、表示环行、诱导和限制端点、Frobenius 行、单位和余单位行、源与 Frobenius 延拓账本以及 Pkg 来源作为可检查历史. 有了这样一个包, 五条命名证书义务逐分量成立: 展示账本给出承载非空, 继承的端点 HSame 给出自反、对称、传递, 被输运的依赖和 Frobenius 行会重新包装进同一个已接受承载表面. 一条历史 h 落入 InducedRepUp token p 的签名 GAP, 当源域接受 h 为这个包, 签名关系把它配对到答案包和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 必须呈现 p 编码的子群、表示环、诱导、限制、Frobenius、延拓和来源行. 本章把这一有限诱导-限制构造命名为 InducedRepUp; Frobenius 互反是在 BEDC 内部展示的账本比较, 不引入外部函子范畴、宿主伴随、标准桥或额外源.'

[en]
label = 'InducedRep'
desc = 'Induction/restriction functors for a subgroup inclusion; Frobenius reciprocity.'
wiki = 'https://en.wikipedia.org/wiki/Induced_representation'

