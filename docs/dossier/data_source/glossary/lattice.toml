key = 'lattice'

aliases = ['LatticeUp']

constructive_story_zh = '这个格实例是前缀偏序上的单点端点: 承载只接受与空历史相等的历史, 因而不管展示哪两个已承载操作数, meet 和 join 都被迫返回空历史. 它的分类器是 rho_emp, 即把两个端点承载见证和一条 hsame 链接打包的同一个单点关系, 继承的序则是这些已承载端点之间的受限前缀比较. 源是一个带 meet 与 join 数据的已认证偏序承载, 模式记录下界、最大下界、上界、最小上界、同余、有向结合、吸收以及模律行, 账本保存操作数和把每个比较化到空端点的边界刻画见证. 五条命名证书义务直接来自单点端点: 空历史居住承载, hsame 给出分类器等价关系, 通过空历史组合端点见证即可得到分类替换下的承载封闭. 一条历史 h 落入 LatticeUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案端点和边界账本, token 引入关系把那条答案命名为 p; 在此实例中, h 被分类为空历史, 每个 meet 或 join 账本都返回空历史, p 命名单点格行. 本章没有闭合标准桥, 虽然外部直觉读法是终态单点格. 本章把这一单点 meet-join 构造命名为 LatticeUp; 格律是既有前缀序的端点后果, 不引入任意格承载、表示定理或外部 meet/join 代数.'

[en]
label = 'Lattice'
desc = 'Lattice: poset with binary join and meet.'
wiki = 'https://en.wikipedia.org/wiki/Lattice_%28order%29'

[zh]
label = '格'
desc = '格: 带二元 join / meet 的偏序.'
