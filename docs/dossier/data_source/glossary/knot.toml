key = 'knot'

aliases = ['KnotUp']

constructive_story_zh = '结包从一个已消费的 SOneUp 来源包、一个环境 HomotopyUp 变形行、有限交叉数据、有限 Reidemeister trace、端点行、Pkg 来源行和把这些行系在一起的 Cont 账本生成。承载只接纳这样的图式包：端点都通过展示圆来源和环境变形来源分解，交叉与移动都是有限 BHist 或 ProbeBundle 行，隐藏投影数据留在延拓账本中；宿主嵌入和未分解的环境同伦被排除。两个包通过 hsame 与有限 Cont 细化逐分量输运圆来源、交叉条目、Reidemeister 账本、同伦行、端点、来源和延拓账本来分类。源是位于 SOneUp 和 HomotopyUp 命名证书之上的展示图式包，模式记录来源边界抽取、Homotopy 账本边界、投影稳定性、有限 Reidemeister 自反、反转、拼接、端点穷尽和分类器完备性，账本保留来源端点、环境行、交叉、局部移动、变形行和包来源。五条命名证书义务由任一已接纳图式包给承载居住，由空、反向和拼接的 Reidemeister 账本给自反、对称、传递，并由端点来源穷尽和账本复合给分类输运下的封闭。一条历史 h 落入 KnotUp token p 的签名 GAP，当源域接纳它的图式包，签名关系把它配对到答案包和证据账本，token 引入关系把该答案命名为 p；展开后，h 具有 p 编码的同一批 SOneUp 端点、HomotopyUp 变形行、Reidemeister trace、分类器账本和来源。本章把这一有限图式与移动构造命名为 KnotUp；不引入环境同伦商、宿主结类型或展示证书行之外的一般结不变量。'

