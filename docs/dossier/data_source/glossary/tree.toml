key = 'tree'

aliases = ['TreeUp']

constructive_story_zh = '树只有在一个可见 GraphUp 包已经带上有限关联数据、连通性、无环性、一个有根或无根分支, 以及 BHist 节点上的语法推导脊行之后才被接纳. 承载是携带这些图和树见证的展示端点行; 缺少图源、GraphContEdge 行或连通/无环/root 分支证据的展示都不在承载内. 两个树端点通过沿 hsame 和继承的 GraphUp 分类器输运图包、边行、连通性、无环性、有根或无根行以及语法表示来分类, 而不是通过宿主图同构. 源是既有图证书加树行, 模式记录到根分量的路径读回、闭合 walk 塌缩为静止行、root 分支输运、可见脊扩展和推导语法读回, 账本把隐藏路径、root 选择、连通性、无环性和语法见证放在公开行之后. 五条命名证书义务由任意带 root 分支的展示连通无环图包给非空性, 由 hsame 与图分类器继承自反、对称、传递, 并通过一起输运每个列出的行来闭合承载. 一条树历史 h 落入 TreeUp token p 的签名 GAP, 当源域接受它的图包和树见证, 签名关系把它配对到答案树包和证据账本, token 引入关系把答案命名为 p; 展开后, h 正好具有 token 编码的节点、图延拓边、连通性、无环性、root 选择和推导脊. 推导语法桥把它读成以 BHist 为节点、以 GraphContEdge 为边的外部有限有根或无根树, 再通过同一公开包读回. 本章把这一带义务图构造命名为 TreeUp; 树是一份连通无环图账本加 root 边界, 不引入宿主图相等、未检查路径选择或独立归纳树原件.'

