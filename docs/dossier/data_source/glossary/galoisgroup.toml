key = 'galoisgroup'

aliases = ['GaloisGroupUp']

constructive_story_zh = '这里的 Galois 群不是宿主自同构集合, 而是由 GaloisExtUp 源行、GroupUp 定律行、保基行、作用行、复合与逆元行, 以及把这些行串到公共端点的延拓账本构成的有限自同构作用包. 承载只接受那些扩张、群、保基、作用、复合和逆元面都是一元历史, 并由 Cont 连接到来源、分类器、账本和端点行的包; 自同构商承载和任意环境群都在包外. 两个被接受的作用包相同, 当保基行、作用行、复合行、逆元行、来源行和端点行能通过同一组有限读回账本由 hsame 移动. 源谱是被接受的自同构作用包, 模式谱记录从 GaloisExtUp 与 GroupUp 继承来的保基、作用、复合、逆元、单位和群定律行, 账本把原始作用数据保持为同一批可见来源和定律端点. 五条命名证书义务来自显示包端点作为承载见证、hsame 的等价关系定律, 以及输运定理在分量分类后重建承载包. 一条历史 h 落入 GaloisGroupUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案作用包和证据账本, token 引入关系把答案标识为 p; 具体地说, h 必须是由扩张加群的来源行和复合加逆元账本在同一保基作用表面上生成的端点. 本章把这一构造命名为 GaloisGroupUp; 不给出宿主自同构群、自同构商、任意 Galois 群承载或标准桥.'

[en]
label = 'GaloisGroup'
desc = 'Group of automorphisms of a Galois extension fixing the base field.'
wiki = 'https://en.wikipedia.org/wiki/Galois_group'

[zh]
label = '伽罗瓦群'
desc = '保持基域不动的 Galois 扩张自同构群.'
