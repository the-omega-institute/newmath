key = 'projectivevar'

aliases = ['ProjectiveVarUp']

constructive_story_zh = '射影簇从可见的 AffineVarUp 图零点集源、齐次 PolynomialUp 族行、射影空间承载行和零求值包生成, 再用 Pkg 来源与探针读数把它们绑定到一个 BHist 端点. 承载只接纳带有这些图行、齐次族行、射影空间行和零求值行的端点; 宿主轨道集、射影点商、未记录的图代表和外部射影点相等都被排除. 两个已接纳端点同一, 当存在射影缩放见证和与图相容的 hsame 运输, 把仿射图行与齐次多项式行运到相同的零求值结果. 源谱就是这个可见射影零点集包, 模式谱记录兼容图之间的齐次零点集精确性, 账本只隐藏图选择、齐次族展示、缩放见证和求值路线, 同时暴露承载、分类器、稳定性和精确性行. 五条命名证书义务成立, 因为显示包给出承载见证, 缩放与图分类器通过所携运输给出自反、对称、传递, 每个被运输的图行或齐次行又重新打包成已接纳的射影端点. 一条历史 h 落入 ProjectiveVarUp token p 的签名 GAP, 当源域接受它的射影零点集包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 展开后, h 的图行、缩放见证、齐次方程和零求值账本正是 p 编码的那些行. 下游零点集桥让后续消费者只读取这个可见承载、缩放与图分类器、齐次精确包和缩放账本; 本章把该构造命名为 ProjectiveVarUp, 不输出隐藏图数据、宿主射影相等或外部标准模型.'

[en]
label = 'ProjectiveVar'
desc = 'Zero-locus of a homogeneous polynomial ideal in projective n-space.'
wiki = 'https://en.wikipedia.org/wiki/Projective_variety'

[zh]
label = '射影簇'
desc = '射影 n-空间中齐次多项式理想的零点集.'
