key = 'recursivefn'

aliases = ['RecursiveFnUp']

constructive_story_zh = '一个 RecursiveFnUp 标记 命名一个有限构造子历史, 由零、后继、投影 π^k_i、复合、带 base/step 子项的原始递归, 以及带展示一元上限的有界 μ 算子构造. 承载接纳一行图 F(n,m), 当在 SeqUp 轨迹上对 NatUp 输入行 n 求值构造子历史得到展示上限内的 NatUp 输出 m. 一旦构造子历史固定, 分类器控制是输出上的 hsame; 源覆盖 NatUp 输入与输出、构造子历史与 SeqUp 求值轨迹; 模式记录构造子历史可纳入、复合行、原始递归 base/step 行与有界 μ 行; 账本让构造子序列、中间求值行与 μ 见证保持可见. 五条命名证书义务由归纳构造子历史求值给出: 有居住的恒等证书是零构造子; 分类器稳定性是输出上自反、对称、传递的 hsame; 输运把求值通过复合与递归重新打包; 账本精确性把图行与展示求值同一; 扩张边界固定有界 μ 规则. 一条历史 h 落入 RecursiveFnUp 标记 p 的签名缺口, 当源域接纳一份构造子历史求值, 签名关系把它配对到图输出, 标记 引入把该输出命名为 p. 本章把这一有限构造子历史表面命名为 RecursiveFnUp; 它是一个部分递归函数对象, 不主张一般 μ-递归全函数性, 无 oracle, 不通往 Church-Turing 桥, 也不引入标准递归论库.'

[en]
label = 'RecursiveFn'
desc = 'Partial functions over the natural numbers generated by zero, successor, projection, composition, primitive recursion, and bounded minimisation.'
wiki = 'https://en.wikipedia.org/wiki/Recursive_function'

