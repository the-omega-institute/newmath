key = 'derivedcat'

aliases = ['DerivedCatUp']

constructive_story_zh = '导出范畴对象由一个展示链复形对象与态射历史的 CategoryUp 证书, 配上一条 CohomologyUp 行来标记用于局部化的拟同构见证而成. 承载只接纳由链复形对象行、同伦类态射行、roof 账本、锥与上同调行、拟同构见证组成的显示包; 原始商范畴、无标签弱等价和任何标准桥行都不在内. 两个显示代表同一, 通过由范畴态射分类器与上同调拟同构见证生成的有限 zigzag; 反向就是反转 zigzag, 传递就是连接 zigzag. 源谱是配对的范畴与上同调局部化表面, 模式谱记录 roof 形成、恒等 roof 单位、复合下降和可见精确读回, 账本保留 roof、弱等价见证、锥或上同调行以及复合见证这些有限数据. 五条命名证书义务成立, 因为空 zigzag 与恒等 roof 给出承载见证和自反性, zigzag 反转与连接给出对称和传递, 承载运输加复合下降把每个被分类的 roof 留在已接纳的局部化表面. 一条历史 h 落入 DerivedCatUp token p 的签名 GAP, 当源域接受这个可见局部化包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 展开后, 穿过范畴和上同调行的有限 zigzag 正是 p 编码的局部化证据. 本章把这种生成式 zigzag 局部化命名为 DerivedCatUp; 它不加入商构造子、未记录的弱等价 oracle 或标准导出范畴桥.'

[en]
label = 'DerivedCat'
desc = 'Localisation of a chain-complex category at quasi-isomorphisms.'
wiki = 'https://en.wikipedia.org/wiki/Derived_category'

