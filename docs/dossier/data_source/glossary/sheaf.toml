key = 'sheaf'

aliases = ['SheafUp']

constructive_story_zh = '一个层行从 TopologyUp 的 indexed-open 承载和 PreSheafUp 的限制表面开始, 然后在每个开指标上附加截面承载、截面分类器、限制映射、indexed cover 行、重叠交和局部性与黏合字段. 承载只接纳那些覆盖数据由拓扑账本展示、局部族满足重叠相容行的 indexed presheaf 包; 缺少包含行、重叠比较或黏合/局部性见证的覆盖展示都在层表面之外. 两个层展示相同, 是相关全局截面或受限截面经限制、细化、共同细化、受限开集和 base-change 方块输运后由截面分类器识别, 而不是识别宿主开覆盖或 stalk 商. 源谱是拓扑加预层覆盖表面, 模式谱记录限制恒等与复合、限制分类器稳定性、局部性、黏合、细化不变性、共同细化精确性、点 germ 行和下游访问轨迹, 账本保留覆盖指标、成员映射、包含证明、重叠限制、base-change 路线和消费者投影. 五条命名证书义务由 indexed section 承载及其分类器族给出: 已接纳截面表面居住承载, 每个局部分类器自反、对称、传递, 限制和细化输运把已分类代表留在同一展示覆盖-黏合接口中. 一个层包 h 落入 SheafUp token p 的签名 GAP, 当源域接受其 indexed cover 与截面数据, 签名关系把它配对到答案层包和证据账本, token 引入关系把答案命名为 p; 具体说, 相容局部族、其黏合以及所有细化或受限开行必须正是 p 编码的行. 已检查桥把同一批 indexed section、限制、局部性与黏合行读成下游环化空间和概形消费者的标准层接口, 但仍拒绝宿主 powerset 相等、覆盖商、stalk 商和外部 sheafification.'

