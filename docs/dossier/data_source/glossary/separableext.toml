key = 'separableext'

aliases = ['SeparableExtUp']

constructive_story_zh = '一个可分扩张通过把 FieldExtUp 扩张包和同一显示生成元上的 PolynomialUp 极小多项式包放在一起构造, 再附上由导数或 gcd 风格的有限历史计算见证的单根行. 承载只接受这个带共享 BHist 与 Pkg 来源的联合源表面, 排除未携带的宿主域代数、外部根集、分裂域数据和 Galois 作用. 两个被接受行通过扩张包上的继承 FieldExt 分类器、极小多项式行上的继承 Polynomial 分类器, 以及生成元、导数、单根和来源面的 hsame 输运来分类. 源谱是 FieldExt 加 Polynomial 的依赖行, 模式谱是可见的极小多项式单根见证, 账本通过 Cont 与包来源把原始导数或 gcd 计算对齐到公共可分性面. 五条命名证书义务在这个局部表面供应: 被接受的联合行给出承载见证, hsame 给出三条等价关系动作, 分类器稳定性把单根见证输运回同一承载. 一条历史 h 落入 SeparableExtUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案行和证据账本, token 引入关系把答案标识为 p; 投影后, 这就是说 h 是共享扩张与极小多项式端点, 且其单根见证正是显示的多项式账本. 本章把这一构造命名为 SeparableExtUp; 不闭合公共可分性定理、任何 FieldExt 或 Polynomial 桥、Galois 桥或标准桥.'

[en]
label = 'SeparableExt'
desc = 'Field extension whose minimal polynomials all have simple roots.'
wiki = 'https://en.wikipedia.org/wiki/Separable_extension'

[zh]
label = '可分扩张'
desc = '极小多项式只有单根的域扩张.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%8F%AF%E5%88%86%E6%89%A9%E5%BC%A0'
