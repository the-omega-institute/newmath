key = 'galoisext'

aliases = ['GaloisExtUp']

constructive_story_zh = '一个 Galois 扩张被组装成有限历史包: 第一面是 FieldExtUp 源行, 第二面是在同一显示扩张上的 SeparableExtUp 单根行, 其余面记录正规性、可分性、保基自同构源、作用行、分类器输运、账本条目和包来源. 承载只接受那些正规性与可分性面能通过依赖证书读回的包, 而需要环境代数闭包、宿主域相等或自同构商的行没有字段可放. 两个被接受的包相同, 仅当它们的 FieldExt、SeparableExt、正规性、可分性、自同构、分类器、来源和有限账本面都在同一个签名表面内由 hsame 输运. 源谱是整个被接受包, 模式谱是可见的正规且可分域扩张形状以及自同构源表面, 账本用 Cont 与 Pkg 来源把每个原始依赖行对齐到它的可见公共面. 被接受包提供端点, hsame 提供自反、对称、传递, 分类器输运行把任何被分类端点重包进同一承载, 因而五条命名证书义务在这个局部表面成立. 一条历史 h 落入 GaloisExtUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案包和证据账本, token 引入关系把答案命名为 p; 展开后, FieldExt 承载、SeparableExt 单根行、正规性行和保基作用行必须共享同一份有限 BHist 来源. 本章把这一构造命名为 GaloisExtUp; 不闭合 Galois 对应、代数闭包、自同构商或标准桥.'

[en]
label = 'GaloisExt'
desc = 'Normal and separable field extension.'
wiki = 'https://en.wikipedia.org/wiki/Galois_extension'

[zh]
label = '伽罗瓦扩张'
desc = '正规且可分的域扩张.'
wiki = 'https://zh.wikipedia.org/wiki/%E4%BC%BD%E7%BD%97%E7%93%A6%E6%89%A9%E5%BC%A0'
