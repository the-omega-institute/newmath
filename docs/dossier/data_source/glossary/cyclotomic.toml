key = 'cyclotomic'

aliases = ['CyclotomicUp']

constructive_story_zh = '分圆根层被生成成有限包 C_zeta=(N,n,p,S,zeta,alpha,lambda,rho): NumFieldUp 源行、正一元指数、X^n-1 的有理多项式账本、该账本上的 SplittingFieldUp 源、原始根端点、接受与分解 Cont 行、基行 hsame 比较, 以及 Pkg 来源. 承载恰好接纳这个显示元组, 排除根商、宿主域相等、赋值行、类域互反数据、自同构群、完备化和调节子行. 两个已接纳包同一, 当数域源、指数、多项式账本、分裂域源和原始端点由逐分量 hsame 运输, 并由显示的接受行与来源行支撑. 源谱就是同一个根层元组, 模式谱记录源覆盖、多项式账本精确性、原始端点确定性、分解覆盖和下游消费者穷尽, 账本让指数、多项式、根、分解、基比较和来源作为同一包保持可见. 五条命名证书义务由已接纳的根元组、各分量运输的自反对称传递, 以及根层分类器运输定理给出, 后者把被运输行重新打包成另一个已接纳承载. 一条历史 h 落入 CyclotomicUp token p 的签名 GAP, 当源域接受根层包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 在这里, h 的正指数、X^n-1 多项式账本、分裂域根行、原始端点和来源就是 p 命名的那些行. 本章把这种有界根义务构造命名为 CyclotomicUp; 它给下游数论消费者一个有限源包, 但不提供公开的分圆域商、Galois 桥、类域桥或标准分裂域模型.'

