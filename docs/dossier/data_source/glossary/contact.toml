key = 'contact'

aliases = ['ContactUp']

constructive_story_zh = '接触表面建立在共享的 ManifoldUp 与 DiffFormUp 来源之上: 它展示一个奇数维流形行、一个承载的一形式 alpha、它的超平面行、外导数输入 d alpha、楔积阶梯 alpha wedge (d alpha)^k, 以及最高次数楔积行. 一条历史只有通过这些被路由的形式行才进入承载; 两个已接纳表面相同, 是 hsame 同时保持共享流形端点、一形式、超平面行、外导数输入和每一级楔积阶梯. 源覆盖的正是流形加被路由的一形式数据, 模式记录维数 2n+1 上最高楔积非退化条件, 账本让图册行、一形式来源、导数输入、楔积阶梯、最高楔积和局部非可积见证保持对齐. 公开证书义务就是展示承载行、受限分类器的自反、对称、传递, 以及所有列出的形式行在该分类器下的封闭性, 精确账本提供覆盖、可靠性和完备性. 一条历史 h 落入 ContactUp token p 的签名 GAP, 当源域接受 h 的这种形式表面, 签名关系把它配对到答案表面和证据账本, token 引入关系把答案命名为 p; 展开后, h 携带的奇数维端点、一形式、导数输入、楔积阶梯和非退化最高楔积就是 p 编码的数据. 这个表面把非可积条件读成最高楔积行, 而不是单独的原件, 并且不导出标准桥. 本章把这一被路由的一形式构造命名为 ContactUp; 不假定闭合承载实现、宿主接触流形或独立非可积定理.'

[en]
