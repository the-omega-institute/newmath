key = 'matrix'

aliases = ['MatrixUp']

constructive_story_zh = '这个闭合边界上的矩阵只有一个被接纳的端点: 一条历史必须与空历史相等才能进入, 任何带可见 b0 或 b1 append 因子的端点都会被分类器排除行挡在外面. 分类器 rho_emp 不从外部表格读取行列项, 而是同时要求两个端点的承载见证和底层 hsame 链接, 所以所有已接纳矩阵都塌回同一个空历史代表. 源、模式和账本在这里都是同一个单点谓词: 源只覆盖空端点, 模式记录零、单位矩阵、加法、乘法、单位律、结合律、同余以及可见因子排除这些端点计算, 账本把展示的维度和项数据系回原始空历史. 因为空历史本身居住承载, hsame 给出自反、对称、传递, 而承载输运只是经空历史作传递, 五条命名证书义务不需要另造矩阵对象就成立. 一条历史 h 落入 MatrixUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案端点和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 与空历史相等, 答案仍是同一个空端点, p 命名单点矩阵证书. 本章把这一单点空历史表命名为 MatrixUp; 矩阵运算是在既有历史表面上的 append 与端点律, 不引入一般有限维矩阵承载、行列式理论、秩计算或宿主环矩阵 API.'

[en]
label = 'Matrix'
desc = 'Matrices over a ring.'
wiki = 'https://en.wikipedia.org/wiki/Matrix_%28mathematics%29'

