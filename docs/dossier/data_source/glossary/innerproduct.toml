key = 'innerproduct'

aliases = ['InnerProductUp']

constructive_story_zh = 'InnerProductUp 对象由已经展示的 VecSpaceUp 历史承载开始, 保留它的标量端点源, 再在已承载向量历史的有序对上加入一个标量值形式行; 缺少向量空间源、标量分类器、共轭对称行、半双线性行、正定行和可见账本的包都不被接纳. 两个这样的包只有在展示的 BEDC 行逐分量一致时才被分类为同一个: 向量承载与分类器、标量端点分类器、形式值、运算行、共轭对称、线性、正定性、正交性和账本条目都要由保留的分类器匹配, 而不是由宿主等距或外部内积相等来识别. 源覆盖向量空间承载、标量历史和形式行; 模式记录对称性、线性、正定性、范数和度量种子、平行四边形种子、正交封闭、双向量 Gram 包和消费者阈值, 账本保留每个向量端点、标量端点、形式值、输运行和正定见证. 五条命名证书义务由展示源提供: 具体单点形式给出居住见证, 分量分类器给出自反、对称、传递, 每条输运行让向量、标量和形式字段在已识别端点变化后仍留在已接纳承载中. 一个历史包 h 落入 InnerProductUp token p 的签名 GAP, 当源域接受展示的向量空间加形式数据, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 只能消费列出的形式律、零分类和正交行. 纸面终端桥把唯一宿主向量送到空历史, 并把每个单点已承载端点解码回唯一宿主向量, 同时保持承载、标量端点、形式、零左正交和公开导出行. 本章把这一展示的标量形式包命名为 InnerProductUp; 不加入 NormUp 闭合、Hilbert 完备性、Banach 完备化、谱理论、非终端标准模型或 bridgeChecked 宿主定理.'

