key = 'quantumchannel'

aliases = ['QuantumChannelUp']

constructive_story_zh = '一个从 Hilbert 源 H 到 Hilbert 目标 K 的 quantum channel 由两条 trace-class 承载之间的 LinearMapUp code 构成, 再加两条 CPTP 行: 对每个有限 ancilla 的 complete positivity, 以及每个 trace-class 端点上的 trace preservation. 承载只接纳带有 linear 行、complete-positivity 行和 trace-preservation 行的映射; 分类器通过 trace-class 与 linear-map 分类器逐点比较 channel, 并保持同一批 density-matrix image、composition、affine-mixture、identity 和 unitary-conjugation 账本. 因而源覆盖 DensityMatrixUp 表面之间的 trace-class linear map, 模式记录 density-matrix image closure、composition closure 和 associativity、有限 convex mixture closure、identity-channel unit laws 以及 unitary conjugation, 账本保持底层 HilbertUp、OperatorIdealUp、LinearMapUp、DensityMatrixUp、RealUp、ListUp 和 UnitaryGroupUp 行可见. 由于依赖分类器和逐点 trace-class 比较都是等价关系, CPTP 行又按展示对 composition、convex combination、identity 与 unitary conjugation 稳定, 一个已接纳 channel 给出承载见证, 分类器自反、对称、传递, 被分类替换后的映射仍是已承载 channel. 一条映射行 h 落入 QuantumChannelUp token p 的签名 GAP, 当源域接受其 linear trace-class map 与 CPTP 账本, 签名关系把它配对到答案 channel 和证据账本, token 引入关系把答案命名为 p; 展开后, h 把每个已承载 density matrix 送到 p 编码的已承载 density matrix 和 channel 行为. 这里不导出标准 quantum-information 桥. 本章把这一 CPTP-map 构造命名为 QuantumChannelUp; channel 是带 positivity 与 trace 账本的展示 linear trace-class map, 不引入 Stinespring dilation、外部 channel category 或宿主 quantum-information 原件.'

[en]
label = 'QuantumChannel'
desc = 'Completely positive trace-preserving (CPTP) map between density matrices.'
wiki = 'https://en.wikipedia.org/wiki/Quantum_channel'

