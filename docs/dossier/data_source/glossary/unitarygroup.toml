key = 'unitarygroup'

aliases = ['UnitaryGroupUp']

constructive_story_zh = '一个酉群元素由一条 HilbertUp 承载行和一条 LieGroupUp 自同构行配对而成, 然后要求展示的自同构保持 Hilbert 内积分类器. 承载只接纳那些源与目标 Hilbert 行分类兼容、且乘法、逆和单位见证来自同一 LieGroupUp 运算表面的受限自同构包; 分类器通过两个依赖证书和 hsame 输运来比较 Hilbert 端点、自同构端点、运算行和保持性见证. 因而源覆盖保持 Hilbert 承载的自同构行, 模式记录乘法、逆、单位、内积保持以及在受限分类器下的运算稳定性, 账本恰好暴露 Hilbert 行、LieGroupUp 行、保持性见证、分类器输运和依赖行. 由于底层 Hilbert 与 LieGroupUp 分类器都是等价关系, 保持性行又随已接纳历史一起输运, 一个已接纳受限自同构给出承载见证, 分类器自反、对称、传递, 且乘积、逆、单位和分类替换都仍在承载中. 一个包 h 落入 UnitaryGroupUp token p 的签名 GAP, 当源域接受其 Hilbert 行、受限自同构行、运算见证、保持性见证和账本, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, h 表示的自同构正是 p 编码的内积保持群元素. 这个 scoped 层级没有标准桥. 本章把这一受限自同构构造命名为 UnitaryGroupUp; 群表面继承自 LieGroupUp 并由 HilbertUp 保持性收窄, 不引入 spectral theorem、operator-algebra 包或宿主 unitary group.'

[en]
label = 'UnitaryGroup'
desc = 'Lie group of inner-product-preserving Hilbert-space automorphisms.'
wiki = 'https://en.wikipedia.org/wiki/Unitary_group'

[zh]
label = '酉群'
desc = '保内积的 Hilbert 空间自同构构成的李群.'
