key = 'catlimit'

aliases = ['CatLimitUp']

constructive_story_zh = '一个范畴极限建立在已经认证的范畴和函子图式之上: 展示一条锥, 包括顶点历史、到每个图式值的分量态射历史, 以及说明这些分量尊重每条图式箭头的比较行. 承载只接受带有这些可见分量见证以及泛性质比较行的锥; 缺少分量账本或泛比较行的锥不进入这个表面, 两个已接受比较是否相同则由 CategoryUp 继承来的态射分类器判断. 源是固定图式上的锥谓词, 模式记录恒等锥态射、复合封闭、顶点比较恒等、图式等价输运和 whiskering 下降, 账本把顶点、分量复合与泛比较态射保持为可见历史, 而不是替换成外部极限对象. 对这个 seed 表面来说, 命名证书义务由同一批行读出: 给定的极限锥给出承载端点, 继承的态射等同给出自反、对称、传递, 输运定理保证在分类器替换后锥和锥态射仍被接纳. 一条历史 h 落入 CatLimitUp token p 的签名 GAP, 当源域把 h 识别为这个固定图式锥包, 签名关系把它配对到答案锥及其分量账本, token 引入关系把那条答案命名为 p; 展开后, h 正好展示通向极限顶点的泛箭头以及 p 编码的唯一性比较行. 这里没有附带标准桥, 因此外部的范畴极限读法只停留在内部 CategoryUp 与 FunctorUp 比较表面上. 本章把这一固定图式锥构造命名为 CatLimitUp; 极限是在已有历史上的泛比较包, 不引入完备性公理、宿主极限对象或外部范畴库.'

