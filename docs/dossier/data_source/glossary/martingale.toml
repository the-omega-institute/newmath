key = 'martingale'

aliases = ['MartingaleUp']

constructive_story_zh = '一个 martingale 包在有限一元时间脊上装配而成: 每个展示时间放一条已承载 RandomVarUp 端点 X_n, 每个后继面放一条已承载 CondExpUp 行, 再加 filtration 可见性行、共享 Pkg 来源以及有限 Cont/hsame 账本. 承载只接纳随机变量行、条件期望行、塔边界行、来源和有限输运账本全部在场的元组; 分类器通过被消费的 RandomVarUp 与 CondExpUp 分类器, 并对剩余展示行逐分量用历史相等, 来比较两个包. 因而源覆盖展示概率源上的有限 adapted 端点序列, 模式是后继比较 E_{n+1|n} 与 X_n 的 RealUp 分类相等, 以及 filtration 可见性和塔边界记账, 账本保持有限时间行、端点序列、条件期望序列、来源和输运行可见. 因为每个依赖证书已经给出分类器输运, 有限元组分类器又是逐分量的, 一个已接纳 adapted 序列给出承载见证, 分类器自反、对称、传递, 前缀限制或行输运都仍留在承载中. 一个有限包 h 落入 MartingaleUp token p 的签名 GAP, 当源域接受其时间脊、端点行、条件期望面、filtration 行和有限账本, 签名关系把该包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, 每个后继面都说下一端点的条件期望与 p 编码账本中的前一端点分类相同. 本闭合层级没有标准随机过程桥, 所以下游 Brownian 消费者只能读取这些展示包行. 本章把这一有限 adapted 序列构造命名为 MartingaleUp; martingale 律是 RandomVarUp 端点上的有限 CondExpUp 账本, 不引入 stopping-time、收敛或宿主过程原件.'

[en]
label = 'Martingale'
desc = 'Adapted integrable sequence with conditional expectation equal to the previous value.'
wiki = 'https://en.wikipedia.org/wiki/Martingale_%28probability_theory%29'

