key = 'continuousmap'

aliases = ['ContinuousMapUp']

constructive_story_zh = '一个连续映射被构造成六条历史的包: source、map、target、modulus、cert 和 distance, 其中前五条形成 ContinuousFunctionCarrier, 最后一条是 source 与 target 之间的 MetricDistanceWitness. 承载只接受能分解为范畴 hom 行、目标侧模量见证和度量距离行的包; 缺少图延拓、模量延拓或距离账本的数据都在表面之外. 两个包由六个可见历史上的逐分量 hsame 分类, 隐藏的规范距离行把展示 distance 与端点 append 识别, 供恒等和复合读取. 源是范畴、连续性和度量三元组, 模式是六字段连续映射承载, 账本记录图、模量、证书、距离、规范距离精确性、恒等、复合行和结合括号. 五条命名证书义务来自空恒等承载给出的居住, 历史相等给出的自反、对称、传递, 以及字段输运加复合封闭对已接纳承载的保持. 一个包 h 落入 ContinuousMapUp token p 的签名 GAP, 当源域接受它的范畴-连续-度量行, 签名关系把六历史承载配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录的是同一映射、模量、证书、目标和规范距离账本. 范畴-度量终端扩张桥在扩张终端模量证书后读取同一个承载; 本章把这一包命名为 ContinuousMapUp, 不引入宿主函数、函数空间拓扑、逐点收敛、一致收敛或标准拓扑桥.'

[en]
label = 'ContinuousMap'
desc = 'Continuous map between metric / topological spaces.'
wiki = 'https://en.wikipedia.org/wiki/Continuous_function'

[zh]
label = '连续映射'
desc = '度量/拓扑空间之间的连续映射.'
wiki = 'https://zh.wikipedia.org/wiki/%E8%BF%9E%E7%BB%AD%E5%87%BD%E6%95%B0'
