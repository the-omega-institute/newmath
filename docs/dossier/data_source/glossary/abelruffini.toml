key = 'abelruffini'

aliases = ['AbelRuffiniUp']

constructive_story_zh = '一个 AbelRuffiniUp 标记 命名一个数域 K 上次数为五的可分首一多项式 P, 配三条见证: 不可约行、无有理根行, 以及 Galois 群标识行 Gal(P/K) ≅ S_5. 承载接纳一份不可经由根式求解的证书, 当 Gal(P/K) 在 NameCert_{GaloisGroupUp} 与 NameCert_{SymGroupUp} 的意义下同构于 S_5, 且 S_5 的导出列在 A_5 处停下, 不到达平凡子群. 分类器是 Galois 群标识行上的 hsame; 源覆盖多项式系数历史、分裂域承载行、Galois 群元素、导出列子群与有理根排除行; 模式记录不可约性、S_5 标识、导出列精确性、非根式塔排除以及次数五可纳入行; 账本让多项式系数、不可约见证、S_5 标识与导出列账本保持可见. 五条命名证书义务由 GaloisGroupUp 链加可解群结构供给: 有居住的恒等证书是固定多项式 x^5-x-1 在 Q 上; 分类器稳定性是 Galois 标识上自反、对称、传递的 hsame; 输运把 Galois 作用通过多项式输运重新打包; 账本精确性把承载行与 S_5 导出列账本同一; 扩张边界固定非根式塔行. 一条历史 h 落入 AbelRuffiniUp 标记 p 的签名缺口, 当源域接纳多项式系数历史, 签名关系把它配对到不可解 Galois 标识, 标记 引入把那条标识命名为 p. 本章把这一基于有限 Galois 群的不可解性表面命名为 AbelRuffiniUp; 它是一个次数五的 S_5-Galois 对象, 不给出一般次数 n 的分类, 不证 A_5 单性, 不做 resolvent 化简, 不引入超越方法, 也不通往标准根式塔桥.'

