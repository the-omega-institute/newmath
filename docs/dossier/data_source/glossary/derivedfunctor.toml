key = 'derivedfunctor'

aliases = ['DerivedFunctorUp']

constructive_story_zh = '一个 DerivedFunctorUp 端点由五类历史生成: 加法函子轨迹、选定有限 resolution 轨迹、homology 轨迹、一元次数行和中间 resolved 行, 并用两段 Cont 先把函子接上 resolution, 再把 resolved 行接上 homology 读回. 承载只接受次数为一元历史且 resolution、homology、exact-triangle 和 splice 账本都通过 AbelianCatUp 与 HomologyUp 证书读取的包; 复形商和外部 abelian-category 相等不在承载内. 两个包的分类器要求函子、resolution、homology、次数、resolved 行与端点都能通过 hsame 和两段延拓展示重新打包, 因而公共相等是运输后的 resolution 上的边界感知 homology 读回. 源是 AbelianCatUp 与 HomologyUp 的耦合证书表面, 模式是有限 resolution 脊、cycle-boundary 行和 long-exact splice 行, 账本保留 Cont 迁移、connecting 行、一元次数和 Pkg 来源. 五条义务由已接纳 resolution 包给出承载居住, 由历史相等和 homology 边界比较给出自反、对称、传递, 由分类器稳定性把同一延拓行输运为另一个已接纳包. 一个端点 h 落入 DerivedFunctorUp token p 的签名 GAP, 当源域接受函子、resolution、homology 和次数行, 签名关系把它们配对到答案端点和证据账本, token 引入关系把答案命名为 p; 具体展开后, p 记录的是同一条 resolution 脊上给定一元次数处的 derived homology 行. 本章把这一 resolution 与 homology 的耦合构造命名为 DerivedFunctorUp; 不引入 derived-category calculus、复形商或标准桥.'

[en]
label = 'DerivedFunctor'
desc = 'Right- or left-derived R^iF / L_iF of an additive functor between abelian categories.'
wiki = 'https://en.wikipedia.org/wiki/Derived_functor'

