key = 'geomquantization'

aliases = ['GeomQuantizationUp']

constructive_story_zh = '一个几何量子化包由一条已认证的 SymplecticUp 源行与一条已认证的 HilbertUp 端点行装配, 配展示的预量子线丛行、极化分类器、metaplectic 账本、有限延拓读回、历史相同性输运与包来源记号. 源包仅接纳这些行, 因此公开消费者可投影共享依赖与所携带的分类器和账本面, 而环境量子化函子、宿主 Hilbert 构造、未携带的辛几何与标准桥都留在展示承载之外.'

[en]
label = 'GeomQuantization'
desc = 'Hilbert space from a symplectic manifold via prequantum line bundle and polarisation.'
wiki = 'https://en.wikipedia.org/wiki/Geometric_quantization'

[zh]
label = '几何量子化'
desc = '由前量子线丛与极化由辛流形构造 Hilbert 空间.'
