key = 'functor'

aliases = ['FunctorUp']

constructive_story_zh = '这个公开构造中的函子是两个已认证 CategoryUp 包之间的载体, 具体桥接特化为固定前缀自函子: 它把一元对象 a 送到 append(p, a), 并通过对应端点索引的 hom carrier 搬运态射尾部. 承载只接受那些对象映射和态射映射确实落在余域对象与 hom 承载中, 且单位保持与复合保持都在余域分类器下有见证的行; 只保持未分类原始复合的裸映射会被有限反例行排除. 两个函子展示逐点分类: 对象像用目标对象分类器比较, 态射像用输运端点上的目标 hom 分类器比较, 因而不形成宿主函数相等或函子商. 源、模式和账本记录源范畴与目标范畴证书、对象/态射映射、单位与复合保持、分类器替换稳定性, 以及复合函子用到的单位、单位律和结合律账本. 五条命名证书义务来自已展示的固定前缀数据、范畴分类器逐点自反/对称/传递, 以及同一批逐点分类器行给出的 carrier transport. 一个展示函子行 h 落入 FunctorUp token p 的签名 GAP, 当源域接受源/目标范畴数据, 签名关系把对象和态射映射包配对到答案载体与保持性账本, token 引入关系把答案命名为 p; 具体说, 固定前缀、所有对象像和所有态射像都必须匹配 token 编码的数据. 标准桥把它读成普通固定前缀自函子及其认证复合包, 再只读回同一批 CategoryUp 分类器数据. 本章把这一尊重分类器的映射构造命名为 FunctorUp; 函子性是一份落点与保持性账本, 不引入外部函子范畴、宿主映射相等、伴随理论或 Kan 扩张表面.'

