key = 'observable'

aliases = ['ObservableUp']

constructive_story_zh = '一个 observable 展示为有限包 (H,A,S,E,W,rho,lambda): Hilbert 源 H 从 HilbertUp 消费, 算子端点 A 与自伴见证 W 是该源上的可见历史, spectral 行 S 从 SpectralTheoremUp 消费, 期望输入 E 通过 QuantumStateUp 读取. 这里编码的承载谓词只接纳 Hilbert、spectral、expectation、自伴性、来源和输运行全都展示出来的包; 分类器恰好通过 hsame 和三个依赖证书输运这些行, 而不是比较宿主算子. 因而源覆盖这个 Hilbert-operator 包, 模式是自伴算子加 spectrum、projection-measure、functional-calculus 和状态期望读回, 账本把 H、A、S、E、W、rho、lambda 保存为精确公共清单. 在这个义务表面内, 一个已接纳包给出承载见证, 逐分量历史相等和依赖分类器给出自反、对称、传递, 而每条可见行被同来源的分类行替换后仍保持承载稳定. 一个包 h 落入 ObservableUp token p 的签名 GAP, 当源域接受 Hilbert 行、算子端点、自伴见证、spectral 数据、期望行和有限账本, 签名关系把该包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录同一个展示算子及其已认证的 spectral 与 expectation 行. 本章不导出标准桥或完整 observable 证书. 本章把这一编码算子包命名为 ObservableUp; observable 是 HilbertUp 来源的 BHist 算子加 spectral 与状态期望账本, 不引入宿主算子相等、环境 Hilbert 相等或外部 spectral 原件.'

[en]
label = 'Observable'
desc = 'Self-adjoint operator with spectrum and expectation pairing with quantum states.'
