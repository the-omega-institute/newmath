key = 'densitymatrix'

aliases = ['DensityMatrixUp']

constructive_story_zh = '一个 Hilbert 源 H 上的 density matrix 通过 OperatorIdealUp 读取 trace-class 承载, 然后只保留那些同时展示 positivity 且 trace 被分类为实数单位的端点 rho. 承载正是 positive trace-class trace-one 端点; 分类器是继承来的 trace-class 分类器, 但限制在两端都仍处于 density 承载的对上, 所以等同从不来自展示行之外的宿主矩阵恒等. 因而源覆盖 Hilbert 索引的 trace-class 端点, 模式记录 positivity、trace-one 读回、二元和有限 affine mixture 封闭以及 constant-mixture exactness, 账本在形成 mixture 时保持 trace-class 见证、positivity 见证、trace-one 见证、受限分类器比较、实数权重、list 位置和 affine bracketing 数据可见. 由于 trace-class 分类器自反、对称、传递, carrier 行又能通过 HilbertUp、OperatorIdealUp 和 RealUp 表面输运, 一个已接纳 density 端点给出承载见证, 被分类替换后的端点仍 positive、trace-class 且 trace one. 一条行 h 落入 DensityMatrixUp token p 的签名 GAP, 当源域接受其 Hilbert 源、trace-class 端点、positivity 行、trace-one 行以及任何有限 affine 账本, 签名关系把该行配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, 该端点正是 p 编码的 positive trace-one trace-class operator, 有限 mixture 由展示的 affine spine 求值. 这里没有标准桥. 本章把这一 trace-class trace-one 构造命名为 DensityMatrixUp; mixed quantum state 由 OperatorIdealUp 与 HilbertUp 上的 positivity 和 trace 账本认证, 不引入 spectral decomposition、purification、channel action 或宿主 density-matrix 类型.'

[en]
label = 'DensityMatrix'
desc = 'Positive trace-class operator of trace one (mixed quantum state).'
wiki = 'https://en.wikipedia.org/wiki/Density_matrix'

