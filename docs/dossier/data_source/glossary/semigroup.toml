key = 'semigroup'

aliases = ['SemigroupUp']

constructive_story_zh = 'SemigroupUp 保留 magma 层的同一批一元历史和同一个 append 运算, 然后记录额外事实: 三个可见 append 步骤可以由内核延拓结合律重新加括号. 承载只接纳 b1 生成的一元脊并排除 b0 头历史, 分类器仍是带承载的 R_U: 两个端点只有在都一元且底层历史 hsame 时才相同. 因而源、模式和账本覆盖一元端点及二元乘积树; 模式加入封闭性、乘积同余、三元结合律、四重一致性、通向相邻代数层的遗忘行, 以及通过交换每个二元节点两个输入得到的 opposite 运算行. 因为空历史居住承载, 历史相等给出自反、对称、传递, 一元 append 封闭性加端点承载见证又让每个已分类代表留在承载内, 五条命名证书义务就是被结合律加强后的一元脊义务. 一条一元乘积历史 h 落入 SemigroupUp token p 的签名 GAP, 当源域接受相关一元乘积树, 签名关系把展示的 append 结果配对到答案历史和证据账本, token 引入关系把答案命名为 p; 展开后, h 是 p 编码的 append 端点, 加括号方式只在 R_U 下可见. 纸面桥把它读成自由一元 append semigroup, 遗忘接口只是在同一承载上删去或保留若干行, 不改变底层历史. 本章把这一结合的一元 append 构造命名为 SemigroupUp; 不引入单位、逆元、交换律、环结构、域结构或已检查标准桥验证.'

