key = 'markovchain'

aliases = ['MarkovChainUp']

constructive_story_zh = '一个 Markov 链包由展示的 ProbSpaceUp 源、一元时间账本、携带的 RandomVarUp 行、DistributionUp 律行、转移行、Cont 展示、hsame 输运与 Pkg 来源记号生成. 承载只接纳那些下一律行从相邻携带随机变量行取来的有限转移账本, 因此宿主随机过程对象、滤波、条件期望原件与标准核桥都留在证书之外.'

[en]
label = 'MarkovChain'
desc = 'Sequence whose conditional distribution depends only on the previous step.'
wiki = 'https://en.wikipedia.org/wiki/Markov_chain'

[zh]
label = '马尔可夫链'
desc = '条件分布只依赖前一步的随机序列.'
