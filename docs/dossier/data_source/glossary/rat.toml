key = 'rat'

aliases = ['RatUp']

constructive_story_zh = '在 RatUp 这一层, 一个有理数活成了一条分母历史外加一对隐藏却有见证的分子-符号对: 分母必须是一个正一元尾部 (形如 Eone(tail) 而 tail 自身一元, 所以分母至少为一), 并且必须存在一个底层三元组 —— 符号标记、分子历史、分母 —— 才能让这条分母进入承载. 传统数学会等同的对, 比如 (2, 4) 与 (1, 2), 在这里仍是不同的分母; 不把它们塌缩到等价类里, 而是让分类器去问底层带符号分子数据是否满足交叉乘积条件, history-sameness 再把这一识别透过任何两对可互换的上下文输运过去. 因为历史相等是等价关系且承载在其下封闭, 命名证书的五条义务基本上是承载这样设定的免费后果. 一个 RatUp token p 的签名 GAP 收集那些分母 d, 使源域接受 d, 签名关系把 d (连同其隐含的分子与符号) 配对到一个答案分母与一份证据账本, token 引入关系把那条答案标识为 p —— 具体地说, 这意味着底层三元组在交叉乘积等价下命名 p 编码的同一个有理数. 本章把 RatUp 配上一个四见证的桥接闭合义务包 (代表稳定性、符号归一化、分母正性, 以及下游消费者读回), 然后把整套构造命名为 RatUp; 有理数完全活成一条带见证的分母, 永远不是等价分数的等价类, 任何商都不被形成.'

[en]
label = 'Rat'
desc = 'Rationals as Int / positive Nat pairs.'
wiki = 'https://en.wikipedia.org/wiki/Rational_number'

