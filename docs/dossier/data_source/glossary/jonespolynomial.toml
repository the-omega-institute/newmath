aliases = ['JonesPolynomialUp']

constructive_story_zh = 'Jones 多项式包由一个已接纳 KnotUp 图式行、局部 skein 窗口中的正交叉、负交叉和平滑边界行、一个由 PolynomialUp 承载的 Laurent 多项式端点、有限 Bundle skein 账本、Pkg 来源行和有限 Cont 延拓账本生成。承载只接纳这样的包：四个结行共享展示来源、环境、端点和包范围，并且多项式端点通过规范有限系数承载读取；宿主结商、宿主 Laurent 多项式相等或完整不变量行被排除。两个包通过主图式和边界图式上的 KnotUp Reidemeister 账本分类器、多项式行上的 PolynomialUp 端点分类器，以及对 skein 账本的有限归纳来分类，局部标签防止正、负和平滑条目混淆。源是位于 KnotUp、PolynomialUp 和 SOneUp 命名证书之上的有限 skein 账本，模式记录 Reidemeister 输运、skein 端点穷尽、局部窗口复合、分类器确定性和无混淆，账本保留每个结边界、多项式端点、局部面、延拓行和来源行。这个 seed 表面的命名证书义务由已接纳包给居住性，由继承的结与多项式分类器加有限 bundle 归纳给自反、对称、传递，并由输运与穷尽行给分类 Reidemeister 移动和多项式端点移动下的封闭。一条历史 h 落入 JonesPolynomialUp token p 的签名 GAP，当源域接纳它的 skein 包，签名关系把它配对到答案包和证据账本，token 引入关系把该答案命名为 p；具体说，p 命名同一批局部 skein 面、四个结行、多项式端点和有限账本。本章把这一有限 skein 账本构造命名为 JonesPolynomialUp；不引入完整 Jones 不变量、图式商、Reidemeister 完备标准模型、标准桥或 Lean 验证目标。'

