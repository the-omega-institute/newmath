key = 'topgroup'

aliases = ['TopGroupUp']

constructive_story_zh = '一个拓扑群包把已认证的 GroupUp 来源和 TopologyUp 来源放入同一个有限 BHist 行, 并同时展示乘法图、取逆图、邻域输运、延拓账本和来源. 承载只接纳那些群端点、拓扑开集、乘积端点、逆端点、连续性路线和来源都来自展示来源的包; 包之外的环境拓扑、额外运算或邻域对象都被排除. 两个已接纳包相同, 是在群、拓扑、乘法、取逆、邻域和来源行上逐分量 hsame, 并由有限 Cont 账本承载连续性比较, 而不是外部拓扑群相等. 源谱是成对的群/拓扑证书表面, 模式谱记录乘法连续性、取逆连续性、根来源兼容、source-fiber 导出、operation-source 行以及两族运算连续性, 账本让 product-neighbourhood 和 inverse-neighbourhood 输运保持可见. 在这个 seed 层级, 命名证书义务可见但尚未导出为闭合包: 已接纳包给出承载居住, 继承的群和拓扑分类器逐分量给出自反、对称、传递, 根兼容行说明分类替换后仍留在同一公开边界内. 一个包 h 落入 TopGroupUp token p 的签名 GAP, 当源域接受展示的群/拓扑行, 签名关系把该包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, 乘法和取逆连续性账本正是 p 编码的两族运算行. 本章把这一有限连续性包构造命名为 TopGroupUp; 它不引入标准桥、完整拓扑群理论, 也不加入展示的乘法与取逆连续性账本之外的第三个运算行.'

[en]
label = 'TopGroup'
desc = 'Group with topology making multiplication and inversion continuous.'
wiki = 'https://en.wikipedia.org/wiki/Topological_group'

