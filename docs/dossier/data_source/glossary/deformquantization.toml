key = 'deformquantization'

aliases = ['DeformQuantizationUp']

constructive_story_zh = '形变量子化包建立在一个已接受的 SymplecticUp 边界和一个已接受的 HopfAlgUp 形式乘积行之上, 然后展示形式乘积端点、零阶乘积、两个一阶系数端点、它们的交换子端点、Poisson 括号义务行, 以及二者之间的精确性比较. 承载只接受这个一阶星积账本, 连同它的 Cont 交换子面、HSame 比较、系数行和来自两个依赖项的 Pkg 来源; Kontsevich 形式性、解析收敛性以及可见一阶账本之外的完整星积构造都不是承载数据. 两个已接受包在辛结构和 Hopf 行可输运, 且零阶端点、两个一阶端点、交换子端点和 Poisson 行都沿展示的 HSame 比较输运时才分类在一起, 因而源谱是给定的依赖对, 模式谱是反对称一阶端点与括号行比较的形式乘积账本. 账本把原始系数历史和交换子历史同公开括号端点并排保持可见: 每个括号读取都必须先经过交换子行、Poisson 行和精确性比较. 一旦这样的账本被展示, 五条命名证书义务由继承的依赖证书和逐分量输运行给出: 账本给出承载见证, 分类器在已接受端点上自反、对称、传递, 被输运后的系数和括号行仍落在同一个一阶表面内. 一条历史 h 落入 DeformQuantizationUp token p 的签名 GAP, 当源域接受其辛边界、Hopf 形式乘积行、系数账本和精确性行, 签名关系把它配对到答案账本和证据, token 引入关系把那条答案命名为 p; 展开后, h 中的一阶交换子必须与 p 编码的 Poisson 括号行 HSame. 本章把这一一阶账本构造命名为 DeformQuantizationUp; 不加入解析形变对象、形式性定理、收敛见证、标准桥或独立 Poisson 括号源.'

[en]
label = 'DeformQuantization'
desc = 'Formal star product on a Poisson manifold whose first-order term is the Poisson bracket (Kontsevich).'
wiki = 'https://en.wikipedia.org/wiki/Deformation_quantization'

[zh]
label = '形变量子化'
desc = 'Poisson 流形上的形式 ⋆-积, 一阶项为 Poisson 括号 (Kontsevich).'
