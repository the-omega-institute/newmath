key = 'algclosure'

aliases = ['AlgClosureUp']

constructive_story_zh = '一个根见证只有在同一 BEDC 来源上已经展示 FieldExtUp 扩张行和 PolynomialUp 非常数多项式请求行之后才生成. 承载接纳的有限包包含该域扩张行、多项式请求、已承载根端点、hsame 输运行、有限根满足账本和唯一 Pkg provenance 行; 需要环境代数闭包对象、商根或未列出根承载的东西都在包外. 两个已接纳包相同, 是先输运 FieldExtUp 来源, 再在被输运的来源上读取 PolynomialUp 请求, 随后沿同一逐分量比较带走根端点、根账本和 provenance. 源谱是已消费的域扩张与多项式请求表面, 模式谱是展示端点满足所请求非常数多项式, 账本保留系数行、继承的域运算、根端点、满足行、输运和 provenance. 五条命名证书义务继承自依赖分类器和有限重打包定理: 已接纳包给出承载居住, hsame 逐分量给出自反、对称、传递输运, 被输运的根满足行能重打包为已接纳包. 一个包历史 h 落入 AlgClosureUp token p 的签名 GAP, 当源域接受它的域扩张与多项式请求行, 签名关系把它配对到答案根包和证据账本, token 引入关系把答案命名为 p; 展开后, 根端点和满足行就是 p 编码的有限根见证. 本章把这一有限多项式根包命名为 AlgClosureUp; 不引入全局代数闭包承载、商根对象或 choice 选出的宿主根.'

[en]
label = 'AlgClosure'
desc = 'Field extension in which every nonconstant polynomial has a root.'
wiki = 'https://en.wikipedia.org/wiki/Algebraic_closure'

[zh]
label = '代数闭包'
desc = '每个非常数多项式都有根的域扩张.'
wiki = 'https://zh.wikipedia.org/wiki/%E4%BB%A3%E6%95%B8%E9%96%89%E5%8C%85'
