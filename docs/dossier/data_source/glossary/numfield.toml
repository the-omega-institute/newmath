key = 'numfield'

aliases = ['NumFieldUp']

constructive_story_zh = '这里闭合的数域表面是反身有理扩张: 从 RatUp 历史端点出发, 基域和环境域都使用同一个 RatUp 承载与分类器, 并消费 FieldExtUp 的恒等扩张行, 其嵌入把每个有理端点送回它自身. 一条历史只有在已经是这个一次扩张中的 RatUp 承载历史时才被接受; 多项式根、第二个基向量、代数整数端点或独立环境承载都不被接纳. 分类器就是 RatUp 历史分类器, 通过恒等嵌入和右单位坐标读回输运, 因而两个展示的数域端点相同, 精确地说就是底层有理历史被分类为同一个有理数. 源谱是 RatUp 域运算表和反身 FieldExtUp 接口, 模式谱是恒等嵌入、单点一元基、由 RatUp 乘法给出的标量作用、坐标读回、基穷尽和端点精确分类, 账本保留承载、运算表、有限扩张、基、坐标、嵌入、标量作用和来源行. 五条命名证书义务继承自 RatUp 与 FieldExtUp: 已接受有理端点居住承载, RatUp 分类器给出自反、对称、传递, 恒等输运让每个已接受端点仍留在同一个一次包内. 一条历史 h 落入 NumFieldUp token p 的签名 GAP, 当源域接受 h 为这个反身扩张中的有理端点, 签名关系把它配对到答案端点和单点基证据账本, token 引入关系把答案命名为 p; 展开后, h 是 p 编码的有理坐标, 其嵌入坐标仍是同一个 RatUp 端点. 本章把这一次反身构造命名为 NumFieldUp; 不引入非平凡数域、Galois 结构、代数整数理论、公共对象闭合或标准桥.'

