key = 'chernweil'

aliases = ['ChernWeilUp']

constructive_story_zh = '一个 Chern-Weil 包由已认证的 CurvatureUp 源和已认证的 DeRhamUp 目标组装出来: 展示曲率边界、不变多项式行、曲率多项式求值端点、闭代表和类行、所选联络账本面、有限 Cont 投影, 以及一个 Pkg 来源包. 承载只接受这个从曲率到 de Rham 的历史包; 坐标联络形式、环境多项式代数、外部上同调商和微分形式的宿主等式, 若不是列出的 BEDC 行, 都不被接纳. 两个已接受包在曲率源沿 HSame 输运且 de Rham 分类器在携带的 Cont 投影后返回同一特征类行时才被分类在一起, 而所选联络仍是账本数据, 不是公开等同的一部分. 因而源谱覆盖 CurvatureUp 到 DeRhamUp 的包, 模式谱是不变多项式求值后读回 de Rham 类并带有联络变化精确性的形状, 账本让原始曲率、多项式、代表、类、联络、投影和来源行与可见特征类对齐. 五条命名证书义务闭合, 因为一个已接受包给出承载见证, 继承的 HSame 和 de Rham 分类给出自反、对称、传递, 联络或代表输运会把同一批有限行重新包装成另一个已接受包. 一条历史 h 落入 ChernWeilUp token p 的签名 GAP, 当源域接受 h 为这个曲率到上同调的包, 签名关系把它配对到答案特征类包和证据账本, token 引入关系把那条答案命名为 p; 具体说, h 必须展示 p 编码的曲率行、不变多项式、de Rham 端点、精确边界或联络账本、Cont 投影和来源. 本章把这一有限特征类账本命名为 ChernWeilUp; 不引入解析 Chern-Weil 定理、标准桥、外部多项式演算或独立上同调商.'

[en]
label = 'ChernWeil'
desc = 'Characteristic cohomology classes of a principal bundle as polynomial expressions in curvature.'
wiki = 'https://en.wikipedia.org/wiki/Chern%E2%80%93Weil_homomorphism'

