key = 'spectralseq'

aliases = ['SpectralSeqUp']

constructive_story_zh = '一个 SpectralSeqUp 包是有限页面账本: 历史分别命名 abelian-category 来源、homology 来源、页面对象账本、微分账本、homology 读回、收敛行、页面迁移行和包来源. 承载只接受页面与微分行是一元历史、由有限 Cont 步连接并由 Pkg 签名封住的包; exact couple、无限迁移账本和环境商对象都被排除. 两个页面包相同, 当 abelian 来源、页面对象、微分、homology 读回、收敛数据、迁移账本和来源都逐分量通过 hsame 或列出的延拓比较输运, 而不是靠外部 spectral sequence 相等. 源是 AbelianCatUp 与 HomologyUp 的配对证书表面, 模式记录 successive page differential 以及下一页由上一页微分的展示 homology 得到, 账本保留每个有限迁移、filtration、读回和来源条目. 五条命名证书义务来自空的一页包给出的承载居住, 组件分类器的自反、对称、传递, 以及 successor-page transport 对已接纳包的封闭. 一个包 h 落入 SpectralSeqUp token p 的签名 GAP, 当源域接受 abelian、homology、页面、微分和收敛行, 签名关系把有限包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录同一份有限页面账本和 homology-to-successor 读回. 本章把这一有限页面账本构造命名为 SpectralSeqUp; 它给出 scoped 证书表面, 不闭合完整收敛理论或标准 spectral-sequence 桥.'

[en]
label = 'SpectralSeq'
desc = 'Sequence of bigraded objects with differentials whose successive cohomologies converge.'
wiki = 'https://en.wikipedia.org/wiki/Spectral_sequence'

[zh]
label = '谱序列'
desc = '带微分的双分次对象序列, 逐级上同调收敛于目标.'
