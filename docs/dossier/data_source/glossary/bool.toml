key = 'bool'

aliases = ['BoolUp']

constructive_story_zh = '在 BoolUp 这一层, 一个布尔值就是内核两元标记类型上的一个标记, b0 或 b1, 之外不叠任何结构. 既然类型只有两元, 上面的等同自然就是字面相等, 而所有可记的事实也只剩下"每个标记等于自身, b0 与 b1 不相等"这四条 (双向都成立), 可见的标记永远就是原始的那一个. 因为承载非空, 等同又自动是等价关系, 命名证书要求的五件事 —— 承载有元素, 分类器自反、对称、传递, 承载在分类器下封闭 —— 一起就成立, 不需要额外的功夫. 一个布尔 token p 的签名 GAP 收集那些标记 m, 使源域接受 m, 签名关系把 m 配对到一个答案标记与一份证据账本, token 引入关系把那条答案标识为 p; 一旦走过模式与账本两道平凡机关, 这一条件就只剩下 m = p. 本章把这一切命名为 BoolUp; 内核的标记类型与它的等同之外没有任何东西进入, 完整的布尔代数 (运算、消去子、可判定谓词) 明确留在本闭合层级之外.'

