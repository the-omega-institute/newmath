key = 'projectivespace'

aliases = ['ProjectiveSpaceUp']

constructive_story_zh = '射影点先是一个被 VecSpaceUp 接纳的向量空间历史，再经过 FieldUp 的非零守卫，从而在任何缩放比较之前排除零代表。承载接纳的是带有标量来源、向量来源和标量作用账本的穿孔向量行；零行或没有非零守卫的向量代表不会成为射影端点。两个已接纳代表命名同一个射影点，当且仅当一个已认证非零标量通过 VecSpaceUp 的标量作用把其中一个送到另一个；标量一给自反性，带见证的逆元给对称性，域乘法和标量作用结合律给传递性。源覆盖穿孔向量承载，模式是带非零标量见证和作用链的缩放轨道展示，账本把代表选择、标量见证和缩放链来源保留为证据，而不是公开承载数据。五条命名证书义务由已接纳穿孔代表给非空性，由缩放分类器给自反、对称、传递，并由标量作用输运给承载在分类替换下的封闭。一条历史 h 落入 ProjectiveSpaceUp token p 的签名 GAP，当源域接纳 h 为带守卫的向量代表，签名关系把它配对到答案代表和证据账本，token 引入关系把该答案命名为 p；展开后，h 是与 p 编码代表位于同一认证缩放轨道中的非零向量行。纸面桥把这个表面读成通常的非零向量模非零缩放展示，并通过同一代表和标量作用账本读回；本章把它命名为 ProjectiveSpaceUp，但不闭合完整射影几何或 bridgeChecked 验证。'

[en]
label = 'ProjectiveSpace'
desc = 'Quotient of a punctured vector space by the multiplicative-scalar action.'
wiki = 'https://en.wikipedia.org/wiki/Projective_space'

