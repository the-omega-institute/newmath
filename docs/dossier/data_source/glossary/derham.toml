key = 'derham'

aliases = ['DeRhamUp']

constructive_story_zh = '一个 de Rham 边界建在 DiffFormUp 与 CohomologyUp 之上: 展示一条上链微分 d_dR、一个零端点、已承载微分形式行, 以及把连续外微分输出识别为同一个微分作用结果的图比较. 承载只在某个上链原像 a 被展示且 b 与 d_dR(a) 历史相等时接受边界行, 双重外微分包还携带两个形式输入、平方为零行、零端点行和上同调 cocycle 读回; 商上同调类和 de Rham 同构数据都不存在. 分类器是通过端点 hsame 输运的展示边界谓词, 保留同一个上链原像和同一条微分行, 而不是比较商代表. 源是带上链微分的微分形式与上同调证书表面, 模式是平方为零边界与 cocycle 包, 账本记录边界原像、零端点、有限图行、cocycle 读回和包来源. 五条命名证书义务由已接纳边界包给出承载居住, 由历史相等给出端点移动的自反、对称、传递, 由零端点边界输运定理给出边界谓词在分类代表下的封闭. 一条行 h 落入 DeRhamUp token p 的签名 GAP, 当源域接受它的形式、上链、边界和 cocycle 行, 签名关系把这些行配对到答案边界包和证据账本, token 引入关系把答案命名为 p; 展开后, 同一个原像、平方为零端点和 cocycle 账本就是 p 记录的数据. 标准边界桥只读取并读回这个谓词与账本表面, 不导出宿主上链复形、商承载、选定代表或 de Rham 同构; 本章把构造命名为 DeRhamUp.'

