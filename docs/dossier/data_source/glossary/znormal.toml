key = 'znormal'

aliases = ['ZNormalUp']

constructive_story_zh = '一条 Zeckendorf 正规形历史由四个结构动作生成: 接纳空历史, 对任意正规历史叠加 Ezero, 接纳单独的 Eone(空), 并且只有当尾部已经是 Ezero 头且正规时才允许叠加 Eone. 因而承载只接受这些规则生成的历史, 并排除任何隐藏的 Eone 接 Eone 步骤; 展示词 word_011 被拒绝而 word_100 被接纳正是这个边界的见证. 分类器是限制在已接受正规历史上的 HSame, 所以源谱是闭生成的正规形谓词, 模式谱是同一套构造子纪律, Fibonacci 数值或算术权重都不参与等同. 账本让原始正规形历史与可见类保持对齐, 使零扩展反演、相邻一反演以及进位窗口的拒绝或接纳都能直接从构造子表面读出. 五条命名证书义务直接来自闭生成和受限 HSame: 空历史给出承载非空, 分类器在已接受历史上自反、对称、传递, 输运后的历史仍正规, 因为输运不会制造未列出的构造子. 一条历史 h 落入 ZNormalUp token p 的签名 GAP, 当源域接受 h 为结构正规形, 签名关系把它配对到答案正规历史和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 由四个正规构造子生成, 并与 p 编码的正规词 HSame. 本章把这一结构正规形构造命名为 ZNormalUp; 不引入 Fibonacci 数值保持、算术值唯一性、外部数解释或额外分类器构造子.'

[en]
label = 'ZNormal'
desc = 'Zeckendorf normal-form predicate: no two adjacent E1-extensions.'

[zh]
label = 'Zeckendorf 正规形'
desc = 'Zeckendorf 正规形谓词: 不出现相邻两个 E1-extension.'
