key = 'series'

aliases = ['SeriesUp']

constructive_story_zh = '一个级数源由 SeqUp 求和项流和一个加法承载行共同承载, 并且在每个一元指标处展示该项观测以及部分和将落入的加法行. 分类器逐分量工作: 项流由 SeqUp 逐点分类器比较, 加法承载行由 hsame 比较, 所以宿主序列、外部实数承载或外部可求和谓词都不进入承载. 源覆盖序列证书、求和项流、加法承载和一元观测作用行; 模式把部分和生成为有限的 Cont 相容前缀, 空前缀是加法零行, 后继前缀则通过加法运算接上下一项观测. 账本保留 SeqUp 源证书、隐藏的求和项前缀行、部分和行、显式一元收敛模量、流分类器输运和加法分类器比较, 这些行继承逐点输运从而给出非空性、自反/对称/传递比较和承载封闭. 一条历史 h 落入 SeriesUp token p 的签名 GAP, 当源域接受它的求和项流与加法行, 签名关系把展示的部分和族和模量账本配对到一条答案历史, token 引入关系把那条答案命名为 p; 展开后, h 的有限前缀和模量行必须匹配 p 的级数包. 本章把这一部分和账本构造命名为 SeriesUp; 不引入超出 scoped rows 的公开证书定理、不与 ComplexSeriesUp 比较、不引入宿主可求和定理或标准桥.'

