key = 'list'

aliases = ['ListUp']

constructive_story_zh = '一条列表是一条有限脊: 要么停在 nil, 要么再走一个 cons 步并携带来自源类型 A 的载荷; 这是这一批里唯一用宿主归纳 List A 而不是历史谓词作承载的证书, 因为有限列表正是一元增长在每一步附带数据. 两条这样的脊只有在 nil/cons 形状相同, 并且每个 cons 步上的载荷都被 A 的源侧等价识别时, 才被分类为同一条列表. 源是整个列表类型, 模式记录 nil/cons 分支、append、reverse、length、构造子映射和端点读回, 账本让可见列表等于被结构检查的原始列表. 既然源等价自反、对称、传递, 结构归纳把这三件事提升到列表上, nil 给了承载见证, 并说明被分类器识别的列表仍在承载中. 一条列表 xs 落入 ListUp token p 的签名 GAP, 当源域接受 xs, 签名关系把它配对到一条答案列表与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, xs 的每个 cons 载荷都必须匹配 p 编码的对应载荷, nil 也必须匹配 nil. 有限脊桥随后把 append、reverse、length 读成同一条带载荷脊上的运算, 而不是宿主列表公理. 本章把这一带载荷脊构造命名为 ListUp; 列表运算归约为脊运算, 不引入商原则、排序 API 或任意宿主列表理论.'

[en]
label = 'List'
desc = 'Lists over a base type, as Hist sequences.'
wiki = 'https://en.wikipedia.org/wiki/List_%28abstract_data_type%29'

