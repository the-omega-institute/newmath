key = 'kolmogorov'

aliases = ['KolmogorovUp']

constructive_story_zh = '一个 KolmogorovUp 标记 命名一个确定性前缀无关解码 TuringMachineUp, 配一个展示的一元长度上限 ℓ 与一个目标输出历史 h. 承载接纳见证, 当存在一元长度至多 ℓ 的前缀无关描述历史 d, 使得在 NameCert_{ComputableUp} 的意义下解码器跑 d 停机并读回 h. 分类器是固定一元上限下输出历史上的 hsame; 源覆盖一元描述长度、上限值、解码器配置、前缀无关行与解码读回历史; 模式记录前缀无关可纳入、上限可纳入、解码读回精确性、上限单调性与解码器确定性行; 账本让描述 d、上限 ℓ、解码轨迹与读回行保持可见. 五条命名证书义务由有界仿真证书加前缀无关描述结构供给: 有居住的恒等证书是空描述平凡解码器; 分类器稳定性是固定上限下自反、对称、传递的 hsame; 输运把描述通过前缀扩展重新打包; 账本精确性把已接纳行与展示上限下的解码读回同一; 扩张边界固定上限单调性. 一条历史 h 落入 KolmogorovUp 标记 p 的签名缺口, 当源域接纳前缀无关解码读回, 签名关系把它配对到解码输出, 标记 引入把该输出命名为 p. 本章把这一前缀无关描述-上限表面命名为 KolmogorovUp; 它是一个描述长度对象, 不证通用解码器最优性, 不给资源上限变体 (K^t, K^s), 不做随机性提取, 也不通往信息论标准桥.'

[en]
