key = 'cstaralg'

aliases = ['CStarAlgUp']

constructive_story_zh = '一个 CStarAlgUp 行通过把已认证 BanachUp 行与已认证 RingUp 乘法行放在同一 BHist 源上构成, 再加入展示的对合行、范数平方相容行、输运行、有限延续读回和依赖来源. 载体只接纳 Banach、ring、involution、norm 与来源字段全部出现在该有限包中的历史; 宿主 *-代数等式、谱数据、弱算子闭包和 Hilbert 空间表示行都不是载体字段. 两条已接纳行按 Banach 载体、乘法、对合、范数平方见证、Cont 账本和 Pkg 来源的逐分量 hsame 输运共同分类, 而不是按环境代数中的等式分类. 源规范是成对的 Banach 与 ring 依赖表面, 模式规范记录乘法、对合和范数平方法则 |a^*a|=|a|^2, 账本保持乘法与对合观测及其有限读回可见. 五个命名证书义务来自给出居留性的已接纳包、展示分量分类器的等价律, 以及说明每个被输运分量都会重建同一 CStarAlgUp 载体行的稳定性定理. 一个包历史 h 落入 CStarAlgUp token p 的签名 GAP, 当源域接纳它的 Banach-ring-involution 表面, 签名关系把它配对到答案包和证据账本, token 引入关系把该答案命名为 p; 展开后, 被输运的乘法、对合和范数平方行正是 p 编码的行. 本章把这个展示的 Banach-ring-involution 构造命名为 CStarAlgUp; 它不引入宿主星代数原件、谱、Gelfand 变换或标准桥.'

