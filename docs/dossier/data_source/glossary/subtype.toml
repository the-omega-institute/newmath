key = 'subtype'

aliases = ['SubtypeUp']

constructive_story_zh = '子类型从父 SetUp 命名证书开始, 父承载为 S、分类器为 sim_S, 然后用一个在父分类器下稳定的谓词 P 切出子承载. 一条历史 h 被接纳, 正好在它同时带有 S(h) 和 P(h) 两份证据时成立; 缺少父成员或谓词见证的历史都不在受限承载中. 两个子类型端点仍由同一个父比较 h sim_S k 分类, 因而谓词证明本身不再被第二套相等比较, 也不形成商式子类型外延性. 源由父证书、谓词、展示端点和 P 的稳定性行组成; 模式记录限制、到父层的投影、已承载端点之间父比较的纳入行和谓词输运, 账本把父见证与谓词见证作为可见配对保留. 五条命名证书义务就是展示端点给非空性, 父分类器给受限分类器的自反、对称、传递, 父 carrier transport 加 P 的稳定性给承载封闭. 一条历史 h 落入 SubtypeUp token p 的签名 GAP, 当源域同时接受 S(h) 和 P(h), 签名关系把这个受限端点配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, h 是 p 编码的父元素并带有所需谓词见证. 标准桥把同一数据读作普通子类型: 投影到父证书, 并且只读回那些谓词见证已展示且稳定的端点. 本章把这一谓词切分构造命名为 SubtypeUp; refinement 是既有证书上的承载限制, 不引入宿主子类型相等、商外延性或第二个父源.'

[en]
label = 'Subtype'
desc = 'Type carved out by a predicate; { x : T // P x }.'
wiki = 'https://en.wikipedia.org/wiki/Subtyping'

[zh]
label = '子类型'
desc = '由谓词刻出的类型; { x : T // P x }.'
