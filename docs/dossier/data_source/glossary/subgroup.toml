key = 'subgroup'

aliases = ['SubgroupUp']

constructive_story_zh = '本章中的子群是在已经许可的 GroupUp 历史表面内部生成的: 固定一条历史 a, 只接纳那些与 a 交换的已承载群端点; 单位端点因为与 a 交换而进入, 乘积由群乘法行进入, 逆元由逆元行进入, 没有展示中心化见证的历史留在外面. 两个已接纳子群元素由环境历史相等限制到这个中心化子承载来分类, 所以等同既不是新的子群等同, 也不是环境群的商, 而是同一个 hsame 比较加上两边的成员见证. 源是环境群加中心化子谓词, 模式记录单位、乘积、逆元、输运、换位子纤维精确性、交、链复合、平凡子群和一步子群判据, 账本保留固定元素 a、交换见证和继承的群运算行. 五条命名证书义务闭合, 是因为单位给出承载居住元, 环境 hsame 给出已承载端点上的自反、对称、传递, 中心化子输运行把成员资格沿任何被识别的端点比较移动过去. 一条历史 h 落入 SubgroupUp token p 的签名 GAP, 当源域接受 h 为已承载中心化子或相关子群端点, 签名关系把它配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, h 必须满足对应成员行, 答案由受限环境分类器识别. 已检查桥包随后暴露中心化子商纤维、对角商展示和身份纤维读回, 供下游商消费者使用, 但始终通过同一批成员和分类器行. 本章把这一继承的中心化子和子对象构造命名为 SubgroupUp; 不引入任意子群格、Sylow 理论、一般同构定理或展示群历史表面之外的独立子群承载.'

[en]
label = 'Subgroup'
desc = 'Subset of a group closed under the group operation.'
wiki = 'https://en.wikipedia.org/wiki/Subgroup'

[zh]
label = '子群'
desc = '群中对群运算闭合的子集.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%AD%90%E7%BE%A4'
