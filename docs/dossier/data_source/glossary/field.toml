key = 'field'

aliases = ['FieldUp']

constructive_story_zh = '这个边界上的域元素仍然是一条 RatUp 分母历史, 只是逆元数据只有在元素旁边带着显式远离零见证时才可以出现. 因而承载是有理分母承载, 分类器是有理分类器再加上逆元比较必须保留守卫见证, 并不存在一句笼统的经典 a 不等于 0 检验. 源是有理分母谓词, 模式记录证书记录行、最终行清单、独立于选择子的退出行、具体的加法/负元/乘法/逆元表、远离零逆元行、分母归一化、端点精确性以及外部携带分离保证, 账本把可见域元素系回原始有理形. 既然 RatUp 已经给出命名证书, 而带守卫的逆元谓词在保留远离零见证时尊重有理分类器, 承载有代表, 分类器自反、对称、传递, 被识别的代表仍是有效域数据. 一个有理分母 d 落入 FieldUp token p 的签名 GAP, 当源域接受 d, 签名关系把 d 配对到一个答案分母与一份证据账本并可能携带逆元证据, token 引入关系把那条答案命名为 p; 展开后, d 是一个有理承载元素, 且正好在 p 编码非零元素时出现逆元见证. 保守纸面桥把这份记录穿过 RatUp、CommRingUp、FieldUp 与内核历史类型读回, 但不改变底层分母承载. 本章把这一证书记录边界命名为 FieldUp; 逆元证据只通过带守卫的行进入并与原始延拓数据分开, 不引入任意域、扩张论、估值论或经典非零 oracle.'

[en]
label = 'Field'
desc = 'Field: commutative ring + multiplicative inverses for nonzero.'
