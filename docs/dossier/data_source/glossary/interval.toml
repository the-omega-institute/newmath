key = 'interval'

aliases = ['IntervalUp']

constructive_story_zh = '一个区间端点是从已有实数式历史表面出发, 给它附上一个下边界谓词和一个上边界谓词; 在已检查的空边界实例中, 两个谓词都迫使同一个端点, 所以被承载的历史正是与空历史相等的那些. 分类器是限制在满足两个边界见证的历史上的实数相等或历史相等, 而在空边界特化中, 它等价于两个端点都被分类为空历史. 源是有界实数子承载, 模式记录通过上下界形成子承载、边界弱化以及排除零扩展的行, 账本保存原始端点、可见端点以及输运两个边界见证的 hsame 链接. 因为空端点居住承载, 受限 hsame 自反、对称、传递, 并且承载成员资格沿历史相等输运时保留两个边界, 五条命名证书义务都在同一历史层内闭合. 一条历史 h 落入 IntervalUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案端点和边界账本, token 引入关系把那条答案命名为 p; 在这里展开后, h 是边界端点, 其上下界见证匹配 p, 而空边界行进一步塌缩为 h 与空历史相等. 边界弱化映射可以用显式逐点映射把强区间谓词移到弱区间谓词, 但本章不声称到外部实区间的标准桥. 本章把这一有界子承载构造命名为 IntervalUp; 区间不是原始几何对象, 不引入区间算术、紧致性、完备性或 Heine-Borel 数据.'

[en]
label = 'Interval'
desc = 'Closed interval [a, b] over a totally-ordered carrier.'
wiki = 'https://en.wikipedia.org/wiki/Interval_%28mathematics%29'

[zh]
label = '区间'
desc = '全序载体上的闭区间 [a, b].'
