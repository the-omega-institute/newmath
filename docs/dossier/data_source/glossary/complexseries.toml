key = 'complexseries'

aliases = ['ComplexSeriesUp']

constructive_story_zh = '一个复级数由一条一元指标进入 ComplexUp 历史族生成, 然后用封闭递归构造部分和: 从选定零历史开始, 每遇到一个 b1 后继就把当前项接到前一个部分和之后. 承载只接受那些项族, 其部分和序列带有收敛到某个已承载极限的见证; 在一元指标处没有复项、没有封闭部分和或没有收敛行的族都留在表面之外. 两个已接纳级数相同, 当它们展示的极限在实部和虚部上逐分量 hsame; 源谱是收敛项列行, 模式谱是带显式模量的部分和正则 Cauchy 收敛, 账本保留项列、部分和、绝对模量和、Cauchy 乘积与逐点加法行. 五条命名证书义务由零部分和递归给出居住, 由极限上的 hsame 等价律给出分类器自反、对称、传递, 并由逐点相等项具有分类部分和及相同收敛目标的输运结果给出封闭性. 一个项族历史 h 落入 ComplexSeriesUp token p 的签名 GAP, 当源域接受它的收敛部分和包, 签名关系把它配对到答案极限和证据账本, token 引入关系把这个极限命名为 p; 展开后, h 的部分和必须用展示模量收敛到 p 编码的复极限. 本章把这一部分和收敛构造命名为 ComplexSeriesUp; 不引入任意级数承载的完备性定理、解析延拓机制或标准桥.'

[en]
label = 'CplxSer'
desc = 'Convergent infinite complex sums.'
wiki = 'https://en.wikipedia.org/wiki/Series_%28mathematics%29'

