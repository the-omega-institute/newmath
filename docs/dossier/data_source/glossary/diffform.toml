key = 'diffform'

aliases = ['DiffFormUp']

constructive_story_zh = '一个微分形式被生成为固定 ManifoldUp 与 TensorProductUp 来源之上的六坐标 BHist 行: 一元次数、有限切向探针 ProbeBundle、多线性张量行、标量端点、反对称置换账本和来源账本. 承载只接受探针由流形来源承载、张量与标量端点由张量和标量来源认证、反对称与来源都被展示的行; 隐藏 alternating-map 对象、商、闭性谓词和算子恒等式都被排除. 两个已承载形式由次数 hsame、通过保留来源分类器匹配的张量与标量比较, 以及反对称、张量和来源账本上的可见 hsame 分类. 源是流形加张量证书表面, 模式记录次数/探针/张量/标量/反对称形状以及楔积和外微分输入路由, 账本保留楔积串接、次数记账、置换行和外微分候选输入. 五条命名证书义务由展示的已承载形式给出居住, 由 hsame 和保留标量分类器逐分量给出自反、对称、传递, 由承载和分类器输运给出被识别代表下的封闭. 一条行 h 落入 DiffFormUp token p 的签名 GAP, 当源域接受它的六坐标形式数据, 签名关系把它配对到答案形式和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录同一次数、探针、张量、标量、反对称、楔积和外微分输入行. 本章把这一展示形式表面命名为 DiffFormUp; 下游 de Rham、symplectic 和 contact 消费者只能读取这些 BEDC 账本, 不在这里引入 d²=0、闭性、非退化、接触非可积或标准桥.'

