key = 'dedekind'

aliases = ['DedekindUp']

constructive_story_zh = '一个 Dedekind 整环由共享的 BHist 源承载: CommRingUp 表面与 IdealUp 表面先使用同一个承载和分类器, 然后再附上整闭、Noether、非零素理想极大这三条定义域定律行. 承载只接受这个共享的交换环与理想源, 以及三条见证行; 商表示、经典选择数据和标准桥字段都不在包内. 两个被接受的展示只有通过 CommRing 与 Ideal 源表面共用的分类器才算相同, 而三条定义域定律都必须能沿这个分类器稳定输运. 源谱是 CommRing 与 Ideal 的成对依赖表面, 模式谱是位于该表面上的三条可见定义域定律见证, 账本只暴露这些源、见证、分类器输运行和精确边界行. 五条命名证书义务由公共表面安排: 共享承载给出承载非空见证, hsame 与继承分类器行给出自反、对称、传递, 分类器稳定性把任何已输运的定义域定律见证重包进同一个被接受承载. 一条历史 h 落入 DedekindUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案 Dedekind 包和证据账本, token 引入关系把答案命名为 p; 具体地说, CommRing 源、Ideal 源、整闭行、Noether 行、素极大行、输运行与账本边界都必须是 h 的显示行. 本章把这一构造命名为 DedekindUp; 不加入商构造、经典选择展示、标准桥或单独验证目标.'

[en]
