key = 'catcolimit'

aliases = ['CatColimitUp']

constructive_story_zh = '一个范畴余极限通过反转展示锥的方向来构造: 在已认证范畴和固定认证图式上, 一个余锥携带顶点历史、从每个图式值进入该顶点的分量态射, 以及说明每个分量如何穿过余锥态射分解的比较账本. 承载只接受带有这些可见分量见证以及余泛性质行的余锥; 缺少分量账本或余泛比较行的数据不属于这个表面, 比较之间的同一性继承自 CategoryUp 的态射分类器. 源是固定图式上的余锥谓词, 模式记录恒等余锥态射、余锥态射复合封闭、余极限比较恒等、自然变换 prewhiskering 下降和逐点图式等价输运, 账本把顶点、分量复合和比较箭头留在 BEDC 历史表面. seed 义务也通过这些行得到: 给定的余极限余锥占据承载表面, 态射等同给出自反、对称、传递, 输运定理在分类代表替换后仍保留已接纳余锥与余锥态射. 一条历史 h 落入 CatColimitUp token p 的签名 GAP, 当源域把 h 接纳为这个固定图式余锥包, 签名关系把它配对到答案余锥和证据账本, token 引入关系把那条答案命名为 p; 具体说, h 展示从余极限顶点射出的余泛箭头以及 p 编码的唯一性行. 这里没有标准桥, 所以本章不把该包翻译成宿主余极限构造. 本章把这一对偶的固定图式余锥构造命名为 CatColimitUp; 余极限是已有历史上的余泛比较行, 不引入余完备性公理、商顶点原件或外部范畴库.'

