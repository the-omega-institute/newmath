key = 'weylgroup'

aliases = ['WeylGroupUp']

constructive_story_zh = '一个 Weyl 群元素由两个已认证表面合成: RootSystemUp 的有限支撑行给出简单根与反射闭包数据, singleton GroupUp 承载给出用于复合展示简单反射的词端点和 append 运算. 承载只接受那些由简单反射行的有限列表生成、并把对已承载根的作用记录为 BHist 端点的词; 缺少根系支撑、singleton 群词、有限根账本或反射闭包见证的行都不在表面内. 两个 Weyl 词通过受限 hsame 比较分类, 它必须保留已承载根端点、singleton 群词端点、Coxeter 账本行和作用迹, 而不是把宿主词按 Coxeter 关系取商. 源覆盖根系有限支撑和 singleton 群词承载, 模式记录简单反射词闭包、append 闭包、Coxeter 词账本、作用分类器稳定性和公开导出, 账本保留 Cartan 端点、生成元出现、braid 行和作用读回. 五条命名证书义务从 RootSystemUp 与 GroupUp 继承: 它们有居住的承载给出端点, 它们的分类器给出自反、对称、传递输运, 简单反射闭包与作用稳定性把输运后的词重新打包成已承载 Weyl 端点. 一条历史 h 落入 WeylGroupUp token p 的签名 GAP, 当源域接受它的根支撑和词行, 签名关系把它配对到答案词和证据账本, token 引入关系把答案命名为 p; 展开后, 有限简单反射词、Coxeter 账本和对已承载根的诱导作用就是 p 编码的数据. 纸面桥把已承载词读成有限反射词展示, 并通过同一个 singleton group append 表面读回; 终端桥把宿主对象限制在终端读回中. 本章把这一构造命名为 WeylGroupUp; 不引入非终端 Coxeter 商、宿主词相等或完整传统分类.'

[en]
label = 'WeylGroup'
desc = 'Finite reflection group generated by simple roots of a root system.'
wiki = 'https://en.wikipedia.org/wiki/Weyl_group'

[zh]
label = '外尔群'
desc = '由根系简单根所生成的有限反射群.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%A4%96%E5%B0%94%E7%BE%A4'
