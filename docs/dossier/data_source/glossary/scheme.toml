key = 'scheme'

aliases = ['SchemeUp']

constructive_story_zh = '概形从已经承载在 BHist 上的 RingedSpaceUp 行出发, 加上认证的 CommRingUp 仿射图行, 再记录一份有限仿射覆盖账本, 其中限制与重叠路线都作为 Cont 和 Pkg 数据显示. 承载只接纳包含局部环化空间源、图环行和覆盖包的历史; 宿主概形对象、宿主谱对象、覆盖商、开集相等和外部层化行都不在里面. 两个已接纳展示同一, 当环化空间分类器匹配底层点、开集、截面、限制和局部环行, 且各仿射图分类器在显示的细化与重叠运输后相互同意. 源谱是环化空间行加认证仿射图及其覆盖账本, 模式谱记录覆盖、限制相容、局部性和粘合, 账本保留原始覆盖包、限制路线、重叠见证和图环分类器, 供后续簇消费者读取. 五条命名证书义务成立, 因为一个显示的仿射覆盖行给出承载见证, 继承的环化空间和图分类器给出自反、对称、传递, 覆盖账本又把所有分类器稳定的运输行重新打包进同一个承载谓词. 一条历史 h 落入 SchemeUp token p 的签名 GAP, 当源域接受这个仿射覆盖包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 展开后, h 的局部环化空间行以及每个图和重叠行都要匹配 p 编码的覆盖展示. 标准桥把同一批 BEDC 行读成显示的仿射覆盖展示, 也能把这样的展示按原行读回; 本章把这种覆盖账本构造命名为 SchemeUp, 不加入隐藏谱承载或外部概形相等.'

