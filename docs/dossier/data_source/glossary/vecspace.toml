key = 'vecspace'

aliases = ['VecSpaceUp']

constructive_story_zh = '向量空间包保留 ModuleUp 的单点标量-向量对, 只是把标量证书从 RingUp 换成 FieldUp. 一个对 (s, v) 只有在两项都与空历史相等时才进入, 作用仍把每个承载对送到空历史, 对分类器现在在标量侧使用 FieldUp 分类器, 并与向量侧单点分类器合取. 源是单点对谓词, 模式记录标量作用、回到 ModuleUp 的投影、AbGroupUp 加法承载投影以及标量作用像语义证书, 账本把可见对与原始端点对对齐. 因为两侧都是单点证书, (空, 空) 见证非空性, 对分类器自反、对称、传递, 且被识别的标量-向量对仍被接纳. 一个对 (s, v) 落入 VecSpaceUp token p 的签名 GAP, 当源域接受该对, 签名关系把它配对到一个答案对与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, 两项都与空历史相等, p 是单点向量空间 token. 终态单对象桥数据行把它读成外部的单对象向量空间, 而由逆元索引的标量推理是空的, 因为这个单点没有可检查的非零见证域. 本章把这一终态单点包命名为 VecSpaceUp; 承载是在域标量纪律下的同一个端点对, 不引入有限维坐标论、基包、解析向量空间或非单点向量空间断言.'

[en]
label = 'VecSpace'
desc = 'Vector space over a field.'
wiki = 'https://en.wikipedia.org/wiki/Vector_space'

