key = 'gelfandduality'

aliases = ['GelfandDualityUp']

constructive_story_zh = '一个谱配对包由酉交换 CStarAlgUp 来源行 A 和紧谱 TopologyUp 行 X 并排生成, 随后展示 character 行、evaluation 行、代数侧与拓扑侧输运、provenance 和有限延拓读回路线. 承载只接受带有这些行的包 (A,X,chi,epsilon,rhoA,rhoX,P,lambda); 外部 Gelfand 变换、宿主紧 Hausdorff 定理、第二个谱承载或宿主层谱相等都不是包字段. 两个已接纳包相同, 是把代数面、拓扑面、character 族、evaluation 族、两个输运行、Pkg provenance 和有限 Cont 路线逐分量 hsame 输运. 源谱是配对的 CStarAlgUp 与 TopologyUp 依赖表面, 模式谱是 character 与 evaluation 构成的谱配对, 账本让 chi、epsilon、rhoA、rhoX、P 和 lambda 对代数与拓扑消费者保持可见. 五条命名证书义务由已接纳包给出居住, 由继承的分量等价给出自反、对称、传递, 并由输运精确性定理把每个被输运的谱读回重打包进同一批展示行. 一个包历史 h 落入 GelfandDualityUp token p 的签名 GAP, 当源域接受它的代数-拓扑谱表面, 签名关系把它配对到答案谱包和证据账本, token 引入关系把答案命名为 p; 展开后, character 与 evaluation 行正是 p 编码的配对数据. 本章把这一谱配对包命名为 GelfandDualityUp; 不引入标准紧 Hausdorff 桥、Gelfand 变换桥或宿主谱相等.'

[en]
label = 'GelfandDuality'
desc = 'Unital commutative C*-algebras ↔ compact Hausdorff spaces (spectrum).'
wiki = 'https://en.wikipedia.org/wiki/Gelfand_representation'

[zh]
label = '盖尔范德对偶'
desc = '酉交换 C*代数 ↔ 紧 Hausdorff 空间 (谱).'
