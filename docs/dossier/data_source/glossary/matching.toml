key = 'matching'

aliases = ['MatchingUp']

constructive_story_zh = '匹配在一个展示 GraphUp 承载内生成：先选择一个边谓词，再用 FinSetUp 的有限脊见证把所选边界定住。承载只接纳那些谓词，其中每条被选历史都是图边，并且任何两条被选边若关联到同一个已承载顶点，就必须通过图边分类器塌缩为同一条边；含有未承载边或未分类共享顶点的数据被排除。两个匹配展示通过边分类器以及有限子集或兼容并账本比较，因此单边分类类、有限子谓词和兼容 toggle 都留在同一个图证书表面内，而不会变成宿主边集。源是图承载上的有限边子集，模式记录遗传子集封闭、兼容并封闭、空边谓词、单边谓词、增广 toggle 和二分覆盖消费者边界，账本保留被选边、关联见证、成员侧、有限枚举和分类器比较。五条命名证书义务由空谓词或单条已承载边给非空例子，由边证书给自反、对称、传递，并由有限子集与兼容并封闭把被分类的所选边重新打包为匹配。一条历史 h 落入 MatchingUp token p 的签名 GAP，当源域接纳它的有限边谓词，签名关系把它配对到答案匹配和证据账本，token 引入关系把该答案命名为 p；具体说，h 选择的每条边都是已承载图边，任何共享顶点冲突都按 p 记录的方式被边分类器解决。本章把这一有限关联构造命名为 MatchingUp；最大匹配、顶点覆盖对偶、外部图论桥和环境宿主边集都留在 scoped 证书之外。'

[en]
label = 'Matching'
desc = 'Vertex-disjoint edge subset; max-matching / min-vertex-cover duality on bipartite graphs.'
