key = 'integral'

aliases = ['IntegralUp']

constructive_story_zh = '一个积分端点只通过可见 BEDC 行承载: MeasureUp 源证书、该测度上的可积函数承载行、ContourUp 比较边界、端点历史、它的 Pkg 来源以及暴露运算表面的探针包. 两个承载被积函数分类在一起, 当测度可见定义域行与轮廓比较行在同一 hsame 和包来源下相符; 隐藏的分割、近似、收敛选择和宿主函数相等都不是分类器数据. 源覆盖这些展示出来的测度和函数包, 模式记录测度相容稳定性、运算精确性、依赖行和公开消费者表面, 账本把分割选择、近似行、收敛见证和运算展示附在使用它们的行上. 可见承载行在有被接受端点时给出非空性, 分类器义务通过源证书给出自反、对称、传递, 测度相容输运让被分类的端点继续留在承载中. 一条历史 h 落入 IntegralUp token p 的签名 GAP, 当源域接受它的测度、函数和轮廓包, 签名关系把积分端点配对到一条答案历史与证据账本, token 引入关系把那条答案命名为 p; 展开后, token 只看见公开积分行, 看不见隐藏宿主选择. 保守标准桥把同一批公开行读成通常积分接口包, 并且只接纳带有这些展示行的包读回. 本章把这一测度相容运算表面命名为 IntegralUp; 不引入收敛定理、宿主被积函数相等或 bridgeChecked 验证.'

[en]
label = 'Integral'
desc = 'Integration operator; Riemann, Lebesgue, Bishop-style.'
