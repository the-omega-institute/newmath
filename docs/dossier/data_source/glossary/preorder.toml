key = 'preorder'

aliases = ['PreorderUp']

constructive_story_zh = 'BEDC 中这个具体预序从一元历史脊开始: 空历史和它的反复 b1 扩展被接纳, 任何 b0 分支都不在承载中. 比较关系说一条一元历史低于另一条, 当存在一条一元延拓尾部把前者接到后者; 已承载端点上的分类器是带承载的 hsame, 而不是把可比较历史取商. 因而源域就是同一个一元承载, 模式是带端点替换同余的自反、传递前缀比较, 账本记录见证每个展示比较的延拓尾部以及原始一元端点. 五条命名证书义务来自一元脊本身: 空历史居住承载, 历史相等给出分类器的自反、对称、传递, 一条与已接纳历史相同的历史仍留在一元承载中. 一条历史 h 落入 PreorderUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一条答案历史和比较账本, token 引入关系把那条答案命名为 p; 展开后, h 是一元历史, 记录的前缀延拓正是 p 编码的序证据. 纸面桥把这一表面读成有限一元词前缀预序, 其中前缀尾部就是一个有限一元词延长另一个的普通见证, 再读回到同一份延拓数据. 本章把这一延拓序构造命名为 PreorderUp; 关系由 BEDC append 与 hsame 生成, 不引入任意预序承载、全序字段、反对称商或序拓扑.'

[en]
label = 'Preorder'
desc = 'Preorder: reflexive + transitive.'
