key = 'sum'

aliases = ['SumUp']

constructive_story_zh = '一个和类型值是直接在载荷上标出选择: 来自 L 的左载荷 l 变成 b0 扩展 Ezero(l), 来自 R 的右载荷 r 变成 b1 扩展 Eone(r). 这两个标签就是历史的一部分, 所以分类器先检查两边是否落在同一分支, 然后才用左源或右源的分类器比较载荷; b0 标记的左值与 b1 标记的右值永不相遇. 同一个带标签历史谓词就是源, 模式记录左右分支、两种标签形以及 no-confusion 行, 账本让每条可见和历史与产生它的原始带标签载荷对齐. 因为历史相等与两个源侧分类器都是等价关系, 注入见证给了承载, 分支内分类器自反、对称、传递, 且被分类器识别的代表仍在同一带标签承载里. 一条历史 h 落入 SumUp token p 的签名 GAP, 当源域接受这条带标签历史, 签名关系把它配对到一条答案历史与一份证据账本, token 引入关系把那条答案命名为 p; 检查标签后, h 要么是左注入且载荷匹配 p 编码的左侧, 要么是右注入且载荷匹配 p 编码的右侧. 本章把这一带标签载荷构造命名为 SumUp; 不交并就是内核层的同一个 b0/b1 选择带上载荷, 不引入独立余积类型、消去子或宿主不交并构造.'

