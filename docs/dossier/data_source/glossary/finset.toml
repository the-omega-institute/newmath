key = 'finset'

aliases = ['FinSetUp']

constructive_story_zh = '有限集合由一个 SetUp 承载 A 加一条有限 ListUp 脊 xs 生成, xs 的每个条目都是被 A 承载的 BEDC 历史. 一个查询历史 z 属于有限集承载, 当 A(z) 成立, 并且 xs 的某个有限位置含有一个由集合分类器与 z 识别的条目; 不在源承载中或在该分类器意义下未出现在脊里的历史都被排除. 两个有限脊展示分类为同一个有限集, 当它们对每个查询历史给出同一个枚举成员谓词, 所以位置的认证置换和重复插入不可见, 但脊和位置仍是显式账本数据. 源是固定 SetUp 证书加有限脊, 模式记录出现、位置读回、置换不变性、重复插入和 append-union 行, 账本保留 Pos(xs)、条目、枚举见证和分类器证据供下游使用. 五条命名证书义务由展示的有限脊和源证书给非空性, 由枚举成员等价的逐点自反、对称、传递给分类器律, 由底层集合分类器输运给承载封闭. 一条脊 xs 落入 FinSetUp token p 的签名 GAP, 当源域接受集合承载和有限列表展示, 签名关系把枚举配对到答案脊和证据账本, token 引入关系把答案命名为 p; 展开后, xs 枚举的分类器类恰好就是 token 编码的那些类. 标准桥是有限脊枚举桥: 它把有限集读成该脊枚举的谓词, 再通过同一批位置、条目、重复、置换和并集行读回. 本章把这一有限脊构造命名为 FinSetUp; 有限性是一份显式枚举账本, 不引入基数理论、幂集、宿主有限集或把隐藏顺序数据提升为承载.'

[en]
label = 'FinSet'
desc = 'Finite-set interface with cardinality.'
wiki = 'https://en.wikipedia.org/wiki/Finite_set'

