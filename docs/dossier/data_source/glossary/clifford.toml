key = 'clifford'

aliases = ['CliffordUp']

constructive_story_zh = '一个 Clifford 行是在 VecSpaceUp 来源、TensorProductUp 张量词来源和给出二次型 q 的 BilinFormUp 对角行之上生成的有限 BHist 词包. 承载只接受单位行、已接纳向量历史的向量注入行、由 Cont 合成张量词的乘积行, 以及把可见平方 v·v 放到标量单位端点 q(v)·1 旁边的边界行; 宿主商代数和解析模都在承载之外. 分类器是由张量词同余、乘积同余、双线性型输运、局部二次边界行以及同一承载表面内的自反、对称、传递闭合生成的最小展示关系. 源是向量、张量和双线性证书三元组, 模式记录有限词生成、乘积稳定性、二次边界汇合和泛因子化, 账本记录向量字母成员、张量括号、双线性对角标量、单位/向量/乘积构造子以及生成的分类器见证. 五条命名证书义务成立, 因为单位和向量构造子给出承载居住, 生成的分类器自带等价关系行, 乘积关系稳定性让每个被分类识别的代表在左右张量上下文下仍被接纳. 一个词包 h 落入 CliffordUp token p 的签名 GAP, 当源域接受它的向量字母、张量括号和二次边界行, 签名关系把该词配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录的正是按展示关系 v·v=q(v) 分类后的生成词. 本章把这一生成词与边界构造命名为 CliffordUp; 不导出 Spin 或 Pin 群、宿主商代数、解析 Clifford 模或标准桥.'

[en]
label = 'Clifford'
desc = 'Universal associative algebra on a vector space mod v · v = q(v).'
wiki = 'https://en.wikipedia.org/wiki/Clifford_algebra'

