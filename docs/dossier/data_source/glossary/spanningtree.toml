key = 'spanningtree'

aliases = ['SpanningTreeUp']

constructive_story_zh = '一个 spanning-tree 包从展示的图证书和树证书读出: 投影顶点行、图边行、树边行、关联见证、带根或无根数据、有限可达路径、无环证据和来源. 分类器只通过 hsame 和源证书分类器输运这些可见行. 在带权情形中, 边权通过展示的 RealUp 行以及选定树边上的有限求和账本读出. 因而该证书把 spanning-tree 表面播种为 GraphUp、TreeUp 和 RealUp 上的有限账本包, 没有隐藏宿主图、未列出边族、外部极小元或无限图对象.'

[en]
label = 'SpanningTree'
desc = 'Maximal acyclic spanning subgraph; minimum-weight via Kruskal/Prim.'
