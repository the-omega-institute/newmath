key = 'cstaralgebra'

aliases = ['CStarAlgUp', 'cstaralg']

constructive_story_zh = '一条 C*代数行由同一 BHist 来源上的 BanachUp 行和 RingUp 乘法行并排放置生成, 再加入展示的对合行、范数平方兼容行、输运行、有限延拓读回和依赖 provenance. 承载只接受 Banach、环、对合、范数和 provenance 字段都在这个有限包中的历史; 宿主 *-代数相等、谱数据、弱算子闭包和 Hilbert 空间表示行都不是承载字段. 两个已接纳行相同, 是逐分量输运 Banach 承载、乘法、对合、范数平方见证、Cont 账本和 Pkg provenance, 而不是在环境代数中判断相等. 源谱是配对的 Banach 与环依赖表面, 模式谱记录乘法、对合和范数平方律 ||a*a|| = ||a||^2, 账本保持乘法与对合观察及其有限读回可见. 五条命名证书义务由已接纳包给出居住, 由展示分量分类器的等价律给出自反、对称、传递, 并由稳定性定理说明每个被输运分量都会重建同一条 CStarAlgUp 承载行. 一个包历史 h 落入 CStarAlgUp token p 的签名 GAP, 当源域接受它的 Banach-环-对合表面, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, 被输运的乘法、对合和范数平方行正是 p 编码的数据. 本章把这一展示 Banach-环-对合构造命名为 CStarAlgUp; 不引入宿主星代数原件、谱、Gelfand 变换或标准桥.'

[en]
label = 'CStarAlg'
desc = 'Banach algebra with involution satisfying ‖a* a‖ = ‖a‖^2.'
wiki = 'https://en.wikipedia.org/wiki/C%2A-algebra'

