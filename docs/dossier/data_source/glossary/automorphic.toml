key = 'automorphic'

aliases = ['AutomorphicUp']

constructive_story_zh = '一个自守图从两条已接纳的 AdeleUp 历史开始: 一条作为定义域端点, 一条作为取值端点, 再由内核延拓展示它们生成的图历史; 缺少两个 adele 承载或延拓见证时, 这条历史不在承载中. 分类器是这些已承载图端点上的普通历史相同, 而可见上下文定理会剥掉或替换左右上下文, 让底层定义域、取值和图核心仍然确定. 源、模式和账本是同一个图承载谓词: 源接受 adele 定义域、adele 取值和延拓包, 模式记录非空性、上下文确定性、端点读回和结果分解, 账本保留隐藏的定义域、取值、延拓和上下文见证. 因为 adele 承载有居住且非空, 可以用同一条 adele 端点居住图承载; hsame 给出自反、对称、传递, 延拓结果输运又让分类后的图端点保持在承载中. 一条历史 h 落入 AutomorphicUp token p 的签名 GAP, 当源域接受 h 为这样的 adele 图, 签名关系把它配对到答案图和证据账本, token 引入关系把答案命名为 p; 具体展开后, 取消任何可见上下文得到的中心图有 p 编码的定义域和取值. 可见上下文行给出通常自守不变性语言隐藏的构造内容: 加上下文不会改变可恢复的核心、定义域或取值, 除非通过声明的分类器. 本章把这一 adele 延拓图构造命名为 AutomorphicUp; 不引入 Langlands 桥、自守表示理论、谱分解或 L 函数解析延拓.'

[en]
