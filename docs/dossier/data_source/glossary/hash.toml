key = 'hash'

aliases = ['HashUp']

constructive_story_zh = '哈希证书由一个消息承载、来自 FinSetUp 的有限摘要承载和 FuncUp 供应的确定性函数行组合而成，然后把每次求值记录为从消息历史到摘要历史的可见 transcript。承载只接纳求值、碰撞、第二原像和无碰撞行，当且仅当消息与摘要端点被承载、函数行给出求值账本，并且消息与摘要分类器给出区分或相等比较；未记录的随机性、宿主比特串和概率空间被排除。两个 transcript 通过消息分类器、有限摘要分类器和确定性函数行比较，所以反转碰撞或把第二原像转成碰撞用的是分类器对称性，而不是外部字符串相等。源是展示求值 transcript 表面，模式记录求值确定性、碰撞对称、第二原像推出碰撞、无碰撞性、消息上的非自反性和共享抗性边界，账本保留两次求值、两个摘要端点、消息区分见证、摘要比较、Cont 读回和 Pkg 来源。五条命名证书义务由已接纳 transcript 行给承载见证，由消息和摘要命名证书给自反、对称、传递，并由分类器稳定性说明输运后的摘要或消息端点仍保持成功谓词。一条历史 h 落入 HashUp token p 的签名 GAP，当源域接纳它的求值或抗性 transcript，签名关系把它配对到答案 transcript 和证据账本，token 引入关系把该答案命名为 p；具体说，p 记录同一批已承载消息、有限摘要、求值行以及碰撞或第二原像边界。本章把这一确定性 transcript 构造命名为 HashUp；不引入密码学归约、概率对手模型、外部复杂性假设或宿主比特串计算。'

