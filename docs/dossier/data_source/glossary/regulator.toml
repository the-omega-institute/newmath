key = 'regulator'

aliases = ['RegulatorUp']

constructive_story_zh = '调节子根包把一个已认证的 DirichletUnitUp 源放在一个已认证的 NumFieldUp 源旁边, 再加入可见单位和逆元行、一元秩见证、有限对数基行, 以及由有限 Cont 读回连接起来的行列式布局行. 承载只接受那些单位侧行来自 Dirichlet-unit 证书、数域行来自 NumField 证书、行列式侧行只是展示布局账本的包; 解析调节子值、宿主对数映射、行列式求值、Beilinson 数据和桥接行都没有槽位. 两个已接受包只通过继承的依赖分类器以及展示的秩、基、布局、读回和来源行上的 HSame 输运来分类, 因而源谱覆盖这些根输入, 模式谱是建在其上的有限行列式/对数布局. 账本让原始依赖行和可见调节子行保持对齐: 消费者能看见 Dirichlet-unit 投影、NumField 投影、秩、对数账本、行列式布局账本、读回和 Pkg 来源, 但看不见一个已计算的解析数值. 给定这样的包, 五条命名证书义务在展示数据上闭合: 包见证承载非空, 逐分量分类器自反、对称、传递, 沿它们输运仍保留同一个有限根输入形状. 一条历史 h 落入 RegulatorUp token p 的签名 GAP, 当源域接受 h 为这个根包, 签名关系把它配对到答案包和证据账本, token 引入关系把那条答案命名为 p; 具体说, h 中的依赖行、秩、对数基、行列式布局、延拓读回和来源必须匹配 p 编码的包. 本章把这一有限行列式账本构造命名为 RegulatorUp; 不引入宿主调节子值、对数等式、行列式计算、标准桥或独立解析承载.'

[en]
label = 'Regulator'
desc = 'Determinant of unit logarithms (number field); Beilinson generalisation to higher K-theory.'
wiki = 'https://en.wikipedia.org/wiki/Regulator_%28mathematics%29'

[zh]
label = '调节子'
desc = '数域单位对数的行列式; Beilinson 至高阶 K 理论的推广.'
