key = 'curvature'

aliases = ['CurvatureUp']

constructive_story_zh = '曲率行从一个已承载的 ConnectionUp 包开始, 选择两条展示的切向导数路线, 并把它们的交换子边界记录成 BHist 括号端点. 只有这个括号承载能投影回联络来源、两条导数行、反对称括号行和有限来源行时, 历史才被接纳; 两个已接纳行相同, 是联络分类器与 hsame 输运所有括号、边界和来源投影. 源覆盖这些联络边界包以及由它们导出的 Chern-Weil 包络行, 模式记录反对称性、Bianchi 账本输运、张量性截面输运和消费者覆盖, 账本保存联络来源、括号端点、有限延拓路线与 Chern-Weil 交接行. 承载由展示的边界来源居住, 分类器义务是 hsame 的自反、对称、传递输运加上联络承载稳定性, 因而承载封闭只是同一条被输运括号行的重新包装. 一条历史 h 落入 CurvatureUp token p 的签名 GAP, 当源域接受 h 的展示曲率括号, 签名关系把它配对到答案括号和证据账本, token 引入关系把答案命名为 p; 展开后, 联络来源、切向对边界、括号端点与 Chern-Weil 包络投影匹配 p 编码的行. 消费者行允许下游 Chern-Weil 与账本精确性论证读取曲率包, 但坐标曲率张量、de Rham 代表、特征类和标准桥都不在这个表面中. 本章把这一边界括号构造命名为 CurvatureUp; 曲率在这里是有限联络账本行, 不是外部假定的宿主张量场.'

