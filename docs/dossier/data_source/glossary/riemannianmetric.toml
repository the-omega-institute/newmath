key = 'riemannianmetric'

aliases = ['RiemannianMetricUp']

constructive_story_zh = '黎曼度量只有在先展示 ManifoldUp 点行、再在同一历史上放置切纤维行、并在该纤维上附加 InnerProductUp 行之后才被接纳; 缺少这三行任意一行的历史都留在承载之外. 两个度量包相同, 是点历史由流形分类器和 hsame 匹配, 切向行沿该点匹配输运, 内积端点在被输运的切向见证上逐纤维分类. 源因此只覆盖带切纤维和内积行的流形点, 模式记录这些纤维上的正定性、对称性、双线性和图册重叠兼容性, 账本只保留点来源、切向见证来源和纤维内积来源. 非空性来自展示的来源纤维行, 自反、对称、传递和承载封闭逐分量由 hsame、ManifoldUp 与 InnerProductUp 继承, 所以五条命名证书义务不需要宿主度量空间. 一条历史 h 落入 RiemannianMetricUp token p 的签名 GAP, 当源域接受 h 的流形点和纤维包, 签名关系把它配对到答案包与证据账本, token 引入关系把答案命名为 p; 展开后, p 记录的是同一个承载点、切纤维和正定兼容内积行. 纸面桥把这个包读成切纤维上的通常光滑正定内积场, 再由同三类来源行读回. 本章把这一逐纤维构造命名为 RiemannianMetricUp; 长度、测地线、曲率和宿主度量对象都不属于原始数据.'

[en]
label = 'RiemannianMetric'
desc = 'Smooth field of positive-definite inner products on tangent fibres.'
wiki = 'https://en.wikipedia.org/wiki/Riemannian_manifold'

[zh]
label = '黎曼度量'
desc = '切丛纤维上的光滑正定内积场.'
