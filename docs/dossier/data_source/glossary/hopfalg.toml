key = 'hopfalg'

aliases = ['HopfAlgUp']

constructive_story_zh = '一个 HopfAlgUp 包由展示的 RingUp 行和 TensorProductUp 行装配: 张量来源通过 Cont 读成乘法和余乘法账本, 再把 unit、counit 与 antipode 历史接到同一个 bialgebra 端点上. 承载只接受代数行由 RingUp 承载、张量行由 TensorProductUp 承载, 且乘法、余乘法、unit、counit 都有 Cont 见证的 BHist 包; 外部代数对象或宿主张量范畴不属于承载. 两个 Hopf 行逐分量按 bialgebra 行、张量行、antipode 行、unit 账本和 counit 账本上的 hsame 分类, antipode 输运还要由左右 convolution 延拓落到同一个 unit-counit 端点来检验. 源是 ring 与 tensor-product 证书的配对表面, 模式记录 bialgebra 来源和两侧 convolution-inverse 面, 账本保留乘法、余乘法、antipode、unit、counit 和包依赖行. 五条义务由已接纳 bialgebra 行给出承载居住, 由逐分量 hsame 给出自反、对称、传递, 由张量行稳定性和 convolution 输运把被分类代表重新打包为 Hopf 行. 一个包 h 落入 HopfAlgUp token p 的签名 GAP, 当源域接受它的 ring 与 tensor 行, 签名关系把 bialgebra-antipode 包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 命名的正是乘法、余乘法、unit、counit 和双侧 antipode convolution 见证. 本章把这一 convolution 账本构造命名为 HopfAlgUp; 不引入标准 Hopf algebra 桥、外部张量语义或独立 antipode 原件.'

[en]
label = 'HopfAlg'
desc = 'Bialgebra with antipode satisfying the convolution-inverse axiom.'
wiki = 'https://en.wikipedia.org/wiki/Hopf_algebra'

