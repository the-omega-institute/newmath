key = 'fisherinfo'

aliases = ['FisherInfoUp']

constructive_story_zh = '一个 Fisher 信息包被承载为八个展示行: 已认证分布族、已认证黎曼度量包、参数行、score 行、score 平方期望端点、度量分量端点、共享 Pkg 来源和把这些行连起来的有限延拓账本. 只有当 score 与期望通过 DistributionUp 推前表面读出, 度量分量通过 RiemannianMetricUp 消费, 且所有坐标都是 BHist 行时, 这包才被接纳; 宿主密度、环境概率空间、积分原件、score 选择和坐标度量张量都留在承载之外. 两个包通过逐分量 hsame、DistributionUp 分类器和 RiemannianMetricUp 纤维分类器输运分布、参数、score、期望和度量行来分类, 因而同一性是账本化端点比较, 不是解析公式相等. 源覆盖分布、score、期望、度量、来源和有限延拓行, 模式记录 score 平方期望与度量纤维分量的汇合, 账本让推前、RealUp 端点、来源和延拓读回保持可见. 五条命名证书义务成立, 因为依赖证书给出已接纳的分布与度量端点, hsame 及其分类器提供等价式输运, 期望到度量行又把输运后的端点重新打包为已接纳 score 包. 一条历史 h 落入 FisherInfoUp token p 的签名 GAP, 当源域接受这个包, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, h 展示的分布族、score、score 平方期望行、度量分量、共享来源和有限账本就是 p 编码的数据. 本章把这一 score-期望-度量构造命名为 FisherInfoUp; Fisher 信息是被复用为度量纤维行的展示期望端点, 不引入宿主密度、解析积分、外部概率律、坐标度量对象或标准桥.'

[en]
label = 'FisherInfo'
desc = 'Riemannian metric on a parametric family from squared score expectations.'
