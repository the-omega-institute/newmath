key = 'expmap'

aliases = ['ExpMapUp']

constructive_story_zh = '指数映射行被生成为两个依赖证书上的图包: 一个 LieAlgebraUp 切向来源历史、一个 LieGroupUp 目标历史, 以及通过 Cont 与 hsame 把它们连接起来的有限局部流账本. 只有两个端点都由来源证书许可且流见证本身属于展示历史数据时, 包才被接纳; 两个包相同, 是代数来源分类器、群目标分类器和有限流账本输运逐分量一致. 源覆盖的正是这些切向到群的图包, 模式记录零切向到单位元、可复合流行和图稳定性, 账本保存两个依赖证书、切向行、端点行、有限延拓路线和逐分量历史相等. 非空性由零流图给出, 自反、对称、传递和承载封闭由两个来源分类器、hsame 输运以及展示流行的 Cont 结合性继承. 一条历史 h 落入 ExpMapUp token p 的签名 GAP, 当源域接受 h 的图包, 签名关系把它配对到答案图和证据账本, token 引入关系把答案命名为 p; 展开后, 切向输入、群端点和有限流路线正是 p 编码的图. 纸面桥把这个包读成从 g 到 G 的标准有限流图表面, 但只通过同一批依赖、来源、目标和账本行读取. 本章把这一有限流图构造命名为 ExpMapUp; 不假定解析指数唯一性或宿主光滑映射相等.'

[en]
label = 'ExpMap'
desc = 'Canonical map from Lie algebra to connected Lie group.'
wiki = 'https://en.wikipedia.org/wiki/Exponential_map_%28Lie_theory%29'

[zh]
label = '指数映射'
desc = '从李代数到连通李群的标准映射.'
wiki = 'https://zh.wikipedia.org/wiki/%E6%8C%87%E6%95%B0%E6%98%A0%E5%B0%84'
