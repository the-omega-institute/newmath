key = 'nuclear'

aliases = ['NuclearUp']

constructive_story_zh = '一个 NuclearUp 算子由一对已认证 BanachUp 来源和目标历史、一个 OperatorIdealUp 给出的 compact-operator 行, 以及记录有限 rank-one prefix 的一元 rank-index 账本生成. 承载只接受算子证据通过这些可见 compact prefix 分解, 且 expansion 账本展示 coefficients、vector observations、rank-one projections、partial sums 和 tail-modulus 行的 BHist 端点; trace-class 原理、spectral 原理、choice、宿主 compactness 和未记录的 infinite sequence 都被排除. 两个 nuclear 包通过 Banach 来源和目标输运、可见 rank-one 账本以及 compact-prefix 见证分类, 因而换代表就是在 hsame 下重新打包同一批有限 expansion 行, 不是比较宿主算子. 源是 BanachUp 与 OperatorIdealUp 证书对, 模式记录 compact-prefix support 和 rank-one-sum ledger exactness, 账本保留一元 rank indices、coefficient bounds、vector rows、compact-prefix endpoints、partial-sum continuations 和 tail moduli. 五条义务由已接纳 compact-prefix 包给出承载居住, 由 Banach 与 operator-ideal 分类器给出自反、对称、传递输运, 由 rank-ledger exactness 证明被分类的有限 prefix 仍被接纳. 一个包 h 落入 NuclearUp token p 的签名 GAP, 当源域接受 Banach 端点、compact-operator 行和 rank-one 账本, 签名关系把可见 nuclear 包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录同一个 compact prefix 与 coefficient-tail modulus 数据. 本章把这一 compact-prefix rank-one 构造命名为 NuclearUp; 它是下游分析的 scoped 依赖边界, 不是 public export、trace-class theorem、spectral theorem 或标准桥.'

