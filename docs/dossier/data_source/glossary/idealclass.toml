key = 'idealclass'

aliases = ['IdealClassUp']

constructive_story_zh = '一个理想类从显示的 DedekindUp 源和 QuotientGroupUp 边界上的携带式分式理想端点构造出来, 非零、可逆和商运算证据在形成任何商对象之前就作为证书行保留. 承载只接受那些 Dedekind 来源和商群来源识别同一个分式理想边界的 BHist 行, 脱离来源的代表和宿主商类型都不进入源. 两个被接受端点相同, 当它们之间的商乘积在同一批 Dedekind 与 QuotientGroup 行内被见证为主理想; 因而理想类相等是一条可见主理想见证关系, 不是消去到商集合. 源谱是成对的 Dedekind 与 QuotientGroup 表面, 模式谱是带单位和逆元下降的分式理想乘法, 账本只隐藏主理想见证, 同时保留端点、分类器、hsame 和 Pkg 来源行. 五条命名证书义务由局部源证书供应: 一个被接受的分式理想端点给出承载见证, 主分类器从商边界继承自反、对称、传递, 承载输运来自同一批 Dedekind 与 QuotientGroup 源行. 一条历史 h 落入 IdealClassUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案分式理想行和证据账本, token 引入关系把答案命名为 p; 具体地说, h 必须携带 Dedekind 分式理想来源、商边界和识别其类的主理想见证账本. 本章把这一构造命名为 IdealClassUp; 不闭合公共 NameCert 表面、标准桥或完整理想类接口的单独 Lean 定理.'

[en]
label = 'IdealClass'
desc = 'Quotient group of fractional ideals modulo principal ideals over a Dedekind domain.'
wiki = 'https://en.wikipedia.org/wiki/Ideal_class_group'

[zh]
label = '理想类群'
desc = 'Dedekind 整环上分式理想模主理想的商群.'
wiki = 'https://zh.wikipedia.org/wiki/%E7%90%86%E6%83%B3%E7%B1%BB%E7%BE%A4'
