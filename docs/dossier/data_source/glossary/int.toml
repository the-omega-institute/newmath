key = 'int'

aliases = ['IntUp']

constructive_story_zh = '一个整数被展示为一个符号标记挨着一条一元大小: 标记是 b0 或 b1, 大小是一条 NatUp 脊, 两个部分都可见时才进入承载. 分类器先用标记等同比较符号、用历史等同比较大小, 然后只把一个歧义折回去: (b0, 空) 与 (b1, 空) 识别为同一个零, 让两种写法的零命名同一个整数. 有了这条规则, 源侧就是同一个带符号一元谓词, 模式记录符号/大小分支、大小侧在 append 上下文中的行为以及零符号塌缩, 账本则沿大小侧的 history-sameness 输运可见对. 命名证书五条义务由 (b0, 空) 给出承载见证, 由标记等同和历史等同给出等价关系, 再由零规则在对称与传递下稳定得到. 一个带符号对 (s, m) 落入 IntUp token p 的签名 GAP, 当源域接受这个对, 签名关系给出一个答案对和证据账本, token 引入关系把那条答案标识为 p; 展开后, 该对具有 p 编码的符号和大小, 只是零允许任一符号. 标准桥把同一份数据读成带符号一元词并读回, 因而 RatUp 后续可以把它用作分子读回, 其他代数包也能复用而不改变承载. 本章把这一构造命名为 IntUp; 整数是一个符号标记挨着一条一元脊, 不是自然数对的商, 唯一施加的等价就是显式零符号归一化.'

[en]
label = 'Int'
desc = 'Integers as signed pairs of Nat.'
wiki = 'https://en.wikipedia.org/wiki/Integer'

