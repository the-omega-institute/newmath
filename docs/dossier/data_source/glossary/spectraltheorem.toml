constructive_story_zh = '一个 SpectralTheoremUp 包从已认证 HilbertUp 算子行开始, 用展示的 self-adjoint-or-normal 见证限制它, 再通过 MeasureUp 来源附上 spectrum、projection-valued measure 和 functional calculus 的测度侧行. 承载只接受 operator、spectral support、projection、calculus 和 provenance 行都展示在同一个 Hilbert-measure 包中的历史; 完整宿主 spectral theorem 或 bridge-checked 标准模型不属于承载. 两个包相同, 当 Hilbert operator 分类器识别算子行, 且谱数据位于同一个测度侧上, 从而 spectrum、projection-valued-measure 和 calculus 账本被输运, 而不是外部地等同环境算子. 源是 HilbertUp 与 MeasureUp 的配对证书表面, 模式记录 self-adjoint-or-normal 限制以及 spectrum、projection 和 calculus 义务, 账本保留隐藏 spectrum、projection-valued-measure、calculus、依赖和 provenance 见证. 五条命名证书义务由展示 singleton 边界中的受限算子承载给出居住, 由 Hilbert 与 measure 分类器的等价行为给出自反、对称、传递, 由输运定理把谱数据重新打包到被分类端点上. 一个包 h 落入 SpectralTheoremUp token p 的签名 GAP, 当源域接受 Hilbert 算子和测度谱行, 签名关系把它们配对到答案谱包和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录同一个算子及其展示的 spectrum、projection measure 和 calculus 行. 本章把这一 Hilbert-measure spectral-data 包命名为 SpectralTheoremUp; 它闭合 BEDC 证书表面, 不导入完整外部 spectral theorem.'

