key = 'group'

aliases = ['GroupUp']

constructive_story_zh = '群表面以单点历史群为锚: 每个承载端点都与空历史分类, 乘法是延拓 append, 单位是空历史, 逆元是常值回到空历史; 在一般历史层群律之上, 中心包再切出那些与每个测试历史交换的端点. 单点承载只接纳空端点类中的历史, 中心承载只接纳某个环境历史层群运算中的展示中心端点; 缺少单点见证或全称交换行的端点都不进入对应表面. 分类器始终是在已接纳承载上受限的 hsame, 由乘法同余、逆元同余和中心化子输运移动代表, 而不是导入的群相等. 源谱是幺半群加逆元的历史表面以及单点与中心见证, 模式谱记录 append 乘法、空单位、常值逆元、逆元律、换位子塌缩、共轭不变、正规化子作用、中心正规性和中心交换行, 账本保留生成表达式、中心端点、共轭路径和两个乘积次序. 五条命名证书义务由空历史和继承的 hsame 等价给出: 非空性来自空端点或展示中心端点, 分类器自反、对称、传递逐分量成立, 乘法、逆元、共轭与中心化子输运让被分类的代表仍留在承载中. 一条历史 h 落入 GroupUp token p 的签名 GAP, 当源域接受单点或中心包行, 签名关系把 h 配对到答案群端点和证据账本, token 引入关系把答案命名为 p; 展开后, h 是 p 编码的单点端点或中心端点, 并带有其运算和交换账本. 已检查桥把单点表面读成终端群, 把中心包读成普通交换正规中心行; 本章把这一构造命名为 GroupUp, 不引入非单点群承载、子群格、商群、任意同态或原始逆元对象.'

