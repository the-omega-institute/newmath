key = 'nattrans'

aliases = ['NatTransUp']

constructive_story_zh = '自然变换在这里是两个固定前缀函子之间的分量族: 给定一元前缀 p 和 q, 每个一元对象 a 都得到一条从 append(p, a) 到 append(q, a) 的 CategoryUp hom carrier 态射 eta_a. 承载只接受那些分量历史, 其源端与靶端正是两个函子像, 并且自然性、恒等变换、纵向复合、横向复合、whiskering 与 prewhiskering 都通过既有函子和范畴分类器见证. 两个分量族逐分量分类, 使用 NatTransPrefixComponentClassifier_{p,q,a}, 也就是承载分量数据加上每条展示分量历史上的 hsame, 而不是宿主变换相等. 源、模式和账本是两份函子账本加上分量态射账本、自然性方块读回、复合与 whiskering 账本, 以及两个分量循环分类为空单位的前缀自然同构行. 五条命名证书义务逐分量组装: 恒等分量族给非空性, 分量分类器给自反、对称、传递, 分量输运与纵向复合稳定性给承载封闭. 一个分量族历史 h 落入 NatTransUp token p 的签名 GAP, 当源域接受两个函子端点和每个分量行, 签名关系把这个族配对到答案族与证据账本, token 引入关系把答案命名为 p; 展开后, 每个一元对象都必须携带 token 编码的对应分量态射和自然性证据. 标准桥把该包读成固定前缀函子之间的普通自然变换, 再读回同一批逐分量 hom-carrier 和分类器行. 本章把这一分量族构造命名为 NatTransUp; 自然性由可见分量账本承载, 不依赖宿主函数外延性、任意 representable、伴随数据或外部变换类型.'

[en]
label = 'NatTrans'
desc = 'Natural transformation.'
