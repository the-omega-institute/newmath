key = 'totalorder'

aliases = ['TotalOrderUp']

constructive_story_zh = '这个 OrderUp phase object 不是自然数上的第二个序; 它是给消费者投影出来的一元前缀 TotalOrderUp 表面, 承载是 UnaryHistory, 分类器是 rho_u, 关系是 PreorderPrefixLE. 一条历史只有作为一元 BHist 端点才被接纳, 有限承载脊是这些端点上的 ListCarrier 脊, 非一元历史、宿主自然数、商序和另一个比较关系都被排除. 两个端点在这个包里相同, 当 rho_u 分类它们, 等价地说当它们在前缀关系下双向比较; 因而 exactness 是从同一批一元前缀行读出的, 不是从宿主序读出的. 源是继承来的一元前缀全序证书, 模式记录预序、反对称、构造性 strict-left/same/strict-right 比较、有限有界区间覆盖、端点唯一性、exactness 和有限词桥边界, 账本保留承载成员、选出的端点、界比较和延拓见证. 五条命名证书义务是已有一元包的投影: 空历史居住承载, rho_u 给出自反、对称、传递的分类器移动, 被分类的端点仍然一元, 同一个前缀关系仍是唯一序行. 一条历史 h 落入 OrderUp token p 的签名 GAP, 当源域接受它为这个包中的一元端点, 签名关系把它配对到答案端点和有限比较账本, token 引入关系把答案命名为 p; 展开后, 它的前缀比较、区间见证和端点读回就是 p 编码的数据. 桥把同一承载读成有限一元词, 把同一关系读成初段序; 本章把这一消费者投影命名为 OrderUp, 不引入已检查 Lean OrderUp 命名空间定理、宿主 Nat 序、商相等或经典三分律.'

