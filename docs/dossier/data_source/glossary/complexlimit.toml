key = 'complexlimit'

aliases = ['ComplexLimitUp']

constructive_story_zh = '一个复极限由一份展示包承载: 源历史里有带一元模量的正则复数列, 也有候选复目标与它的收敛见证; 缺少正则列、目标行或模量比较的历史都不进入承载. 分类器不借外部拓扑来识别极限, 而是在实部和虚部历史上用 hsame 逐分量比较目标点; 源谱正好覆盖这些正则列加极限的成对数据, 模式谱记录在一元指标越过 M(k) 后的距离行. 账本把原始数列、目标和模量数据保持可见, 并检查常值列、逐点和、逐点积以及分量装配时如何拼接模量, 而不是用选择原则隐藏收敛过程. 常值列给出非空见证, 逐分量 hsame 给出自反、对称、传递, 稳定行说明正则性、极限状态和模量比较沿同一批分量历史输运, 因而五条命名证书义务一起闭合. 一条历史 h 落入 ComplexLimitUp token p 的签名 GAP, 当源域接受这份正则列和极限包, 签名关系把它配对到一个答案目标与证据账本, token 引入关系把那条答案命名为 p; 展开后, 目标分量必须就是 p 编码的分量, 账本也必须展示证明每个精度最终距离足够小的模量. 本章把这一正则列收敛构造命名为 ComplexLimitUp; 不引入完备性原则、选择式极限点抽取或标准复分析桥.'

[en]
label = 'CplxLim'
desc = 'Convergence of complex sequences with explicit modulus.'
wiki = 'https://en.wikipedia.org/wiki/Limit_of_a_sequence'

[zh]
label = '复极限'
desc = '带显式模量的复数列收敛.'
wiki = 'https://zh.wikipedia.org/wiki/%E6%95%B0%E5%88%97%E6%9E%81%E9%99%90'
