key = 'quotientgroup'

aliases = ['QuotientGroupUp']

constructive_story_zh = '一个商群行由历史层 GroupUp 运算和展示的中心化子-正规化子塔生成: 上层代表承载是正规化子 N_a, 下层核承载是中心化子 Z_a, 可见账本记录代表端点、相对核见证 Z_a(mul(inv(x),y))、运算行和塔来源. 承载只在代表属于 N_a, 或单点/中心化子陪集端点带有展示承载见证与端点比较时接纳它们; 任意陪集、宿主商元素、缺少核或正规化子见证的展示都不进入. 两个代表命名同一个商元素, 当展示的核分类器把它们相关, 等价地说 orbit-coset 行与 kernel 行通过已检查的 iff 对齐, 而端点输运仍是在代表历史上的内部 hsame. 源谱是 GroupUp 上的中心化子-正规化子子群塔, 模式谱记录单点塌缩、陪集分类器输运、身份纤维、核证书、身份纤维正规性、交换情形全体性、终端投影和代表乘积封闭, 账本保留代表对以及陪集或核见证. 五条命名证书义务由语义证书给出: 单位代表居住承载, 商分类器在 N_a 上自反、对称、传递, 乘积、逆元、单位和已分类端点输运仍留在代表承载与身份纤维包中. 一个代表包 h 落入 QuotientGroupUp token p 的签名 GAP, 当源域接受其正规化子代表和相对核账本, 签名关系把它配对到答案商代表和证据账本, token 引入关系把答案命名为 p; 展开后, h 携带的正是 p 编码的陪集/核比较和运算行. 纸面桥把同一批代表与核数据读成普通陪集判据, 但本章把构造命名为 QuotientGroupUp 时并不形成宿主商类型, 不调用泛性质, 也不闭合任意商群 API.'

[en]
label = 'QuotientGroup'
desc = 'G / N for a normal subgroup N of G.'
wiki = 'https://en.wikipedia.org/wiki/Quotient_group'

