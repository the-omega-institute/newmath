key = 'presheaf'

aliases = ['PreSheafUp']

constructive_story_zh = '一个预层表面由 BHist 上的带索引开拓扑生成: 开对象是带索引的成员行, 箭头是认证包含见证, 每个包含 j <= i 都携带从 i 上截面对象到 j 上截面对象的限制行. 承载只接受展示的开索引源、命名源、截面承载、截面分类器、限制映射、恒等行、复合行、分类器稳定行和精确账本; 宿主开集相等、覆盖商、茎商、粘合数据和 sheafification 数据都被排除. 两个截面或限制展示通过截面分类器以及沿开集、包含和目标 hom 行的 hsame 输运来分类, 所以限制比较是目标范畴分类器行, 不是宿主映射相等. 源是 CategoryUp、FunctorUp 与 TopologyUp 的开索引机制, 模式记录反变恒等、复合和限制稳定性, 账本保留带索引开集、包含见证、截面行、限制来源、恒等见证和复合限制见证. 五条命名证书义务由已承载截面分类器承担: 自反、对称、传递行分类截面, functoriality 定理输运恒等与复合延拓数据, 并在分类器移动后重新打包同一个 indexed restriction surface. 一条历史 h 落入 PreSheafUp token p 的签名 GAP, 当源域接受这个 indexed restriction surface, 签名关系把它配对到答案表面和证据账本, token 引入关系把答案命名为 p; 展开后, h 携带的开集、包含、截面、限制、恒等、复合和输运行正是 p 编码的那些行. 标准桥把同一批行读成认证开索引范畴上的普通反变预层, 且只读回已经由这些行承载的展示; 本章把这一构造命名为 PreSheafUp, 不加入 sheaf locality、粘合、茎商或外部 sheafification.'

[en]
label = 'PreSheaf'
desc = 'Contravariant functor from open sets to a target category, with restriction maps.'
wiki = 'https://en.wikipedia.org/wiki/Sheaf_%28mathematics%29%23Presheaves'

[zh]
label = '预层'
desc = '从开集范畴到目标范畴的反变函子, 含限制映射.'
