key = 'holomorphic'

aliases = ['HolomorphicUp']

constructive_story_zh = '一个全纯数据作为可见开盘包承载: 函数历史、中心、半径和开盘 GAP 见证只有在 BEDC 的开盘行说明点留在半径内, 且函数满足开盘上全纯的源条件时才被接纳. 两个这样的包分类在一起, 当它们的开盘参数相容, 且内部点上的函数值逐点 hsame 等价; 因而分类器跟着展示出来的开盘和函数历史走, 不使用宿主函数相等. 源种子只覆盖这些带开盘 GAP 数据的 (f,z0,r) 包, 模式种子是该开盘上的一致模量复可微谓词, 账本保留原始函数、中心、半径、GAP 见证、模量见证、闭合行、Taylor 数据、Cauchy 界和密度见证. 源、模式、分类器的语义证书行与开盘输运引理一起完成五条命名证书义务: 一个已接纳开盘给出承载见证, hsame 给出自反、对称、传递, 半径和 GAP 输运让被识别代表留在同一表面中. 一条历史 h 落入 HolomorphicUp token p 的签名 GAP, 当源域接受它的开盘包, 签名关系把该包配对到一个答案函数与证据账本, token 引入关系把那条答案命名为 p; 展开后, 同一开盘必须携带 token 函数的一致复可微模量与相容的逐点值. 本章把这一开盘可微性导出命名为 HolomorphicUp; 不加入 Cauchy 积分理论、解析延拓、恒等定理闭合或标准桥.'

[en]
