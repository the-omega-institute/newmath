key = 'rootsystem'

aliases = ['RootSystemUp']

constructive_story_zh = '根系包从三个可见来源生成: InnerProductUp 的向量承载与分类器、FinSetUp 的有限根行枚举, 以及 Cartan 配对的 IntUp 端点. 一条历史只有在有限支撑中出现、由内积向量承载接纳、并带有非零见证时才是根; 两个根行相同, 是它们的有限支撑条目和向量代表分别由有限集分类器与向量分类器匹配. 源覆盖带反射与 Cartan 数据的有限非零向量行, 模式记录反射封闭、整数 Cartan 端点和非零读回, 账本让有限支撑、非零见证、反射路线和整数 Cartan 端点都下降到展示来源. 承载由展示的有限根行居住, 自反、对称、传递和承载封闭来自继承分类器, 再加上非零见证、反射向量和 Cartan 端点沿 hsame 的输运. 一条历史 h 落入 RootSystemUp token p 的签名 GAP, 当源域接受 h 的有限支撑根包, 签名关系把它配对到答案根系包和证据账本, token 引入关系把答案命名为 p; 展开后, 有限根表、向量代表、反射封闭行和整数 Cartan 账本都匹配 p 编码的数据. 成熟桥消费把这些行精确读入终端 WeylGroupUp 反射群桥, 而 Lie 代数分类和 crystallographic 分类仍在包外. 本章把这一有限支撑反射构造命名为 RootSystemUp; 不引入环境 Lie 代数、Weyl 群分类定理或隐藏宿主向量相等.'

[en]
label = 'RootSystem'
desc = 'Finite reflection-closed set of nonzero vectors with integer Cartan pairings.'
wiki = 'https://en.wikipedia.org/wiki/Root_system'

[zh]
label = '根系'
desc = '在反射下封闭的有限非零向量集, 含整数 Cartan 配对.'
