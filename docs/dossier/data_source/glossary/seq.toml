key = 'seq'

aliases = ['SeqUp']

constructive_story_zh = '一个带证书点承载上的序列, 被承载为从一元历史到点历史的可见观测函数: 每个被接纳的指标必须是 NatUp 一元历史, 每个观测值必须被固定点承载接受. 分类器不是宿主函数外延相等, 而是逐点分类: 两个序列源在每个一元指标处都要有两边的承载见证, 并且两次观测由点证书的分类器关联. 源覆盖这些带一元指标证据、点承载证据以及可选一元模量或有界性行的 BHist 观测函数; 模式记录逐指标投影、逐点比较、逐点输运和 series 与解析极限证书能读取的下游边界. 账本让一元指标见证、点承载见证和可选模量项保持可见, 所以非空性继承自任意已承载源, 自反、对称、传递逐指标继承自点证书, 承载封闭就是每个一元指标处的点承载输运. 一个历史包 h 落入 SeqUp token p 的签名 GAP, 当源域接受它的观测源, 签名关系把它的逐点观测和模量账本配对到一个答案包, token 引入关系把那个包命名为 p; 展开后, 每个一元指标都必须暴露 p 编码的点值和可选模量. 本章把这一逐点观测构造命名为 SeqUp; 不引入收敛、可求和、完备性、全纯性或宿主函数外延性.'

[en]
label = 'Seq'
desc = 'Sequence interface; indexed family over Nat.'
wiki = 'https://en.wikipedia.org/wiki/Sequence'

