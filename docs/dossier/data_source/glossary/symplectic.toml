key = 'symplectic'

aliases = ['SymplecticUp']

constructive_story_zh = '辛表面由共享一个 ManifoldUp 承载和一个 DiffFormUp 二形式行生成, 然后记录外导数输入、闭性行、偶数维见证以及同一承载上的非退化行. 一条历史只能通过这个联合的流形与形式表面被接纳; 两个已接纳读数相同, 是 hsame 保持共享端点、二形式、导数输入、闭性和非退化. 源覆盖的正是展示的 ManifoldUp 加 DiffFormUp 行, 模式记录该二形式在被输运承载上闭且非退化, 账本保持图册、次数、导数输入、楔积、配对和隐藏来源投影对齐. 五条命名证书义务由公开表面给出: 承载行给居住元, 受限分类器因每个分量由 hsame 输运而自反、对称、传递, 承载封闭只在闭性和非退化仍附着于同一展示表面时成立. 一条历史 h 落入 SymplecticUp token p 的签名 GAP, 当源域接受 h 的共享承载和二形式行, 签名关系把它们配对到答案表面和证据账本, token 引入关系把答案命名为 p; 展开后, h 携带的偶数维流形端点、闭二形式和非退化配对行就是 p 编码的数据. 下游 Hamiltonian 与 Poisson 消费者只能读取共享承载、形式、导数路由、配对账本和分类器输运, 不能从这里得到括号、流、具体闭性证明或标准模型. 本章把这一闭非退化二形式构造命名为 SymplecticUp; 不引入独立 Poisson 结构、Hamiltonian 动力学或宿主辛流形对象.'

[en]
label = 'Symplectic'
desc = 'Closed nondegenerate 2-form on an even-dimensional manifold.'
wiki = 'https://en.wikipedia.org/wiki/Symplectic_geometry'

