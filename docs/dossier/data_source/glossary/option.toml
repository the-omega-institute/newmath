key = 'option'

aliases = ['OptionUp']

constructive_story_zh = '一个可选值要么停在空历史表示缺席, 要么取一条已被源承载接受的载荷 a, 在它上面叠一个 b1 标记成为 Eone(a) 表示在场. 分类器顺着这个分支走, 而不是发明新的数据类型: 两个缺席值因为都在空端点而相同, 两个在场值只有在载荷被源侧分类器识别时才相同, 缺席端点与在场标签则永不混淆. 同一个谓词给出证书的源, 模式就是缺席/在场的 no-confusion 表和 b1 标记的在场形, 账本展示的是这条 option 历史本身, 不是隐藏的宿主值. 一旦源分类器是等价关系且历史相等是恒等, 空历史给了承载见证, 分类器在两支上自反、对称、传递, 并在识别到另一个代表时保持承载成员资格. 一条历史 h 落入 OptionUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一条答案历史与一份证据账本, token 引入关系把那条答案标识为 p; 具体说, h 要么是匹配缺席 token 的空端点, 要么是一个在场 b1 标签, 其载荷被识别为 p 编码的载荷. 本章把这一在场或缺席构造命名为 OptionUp; b1 标记被复用为在场标签, 不引入独立 option 类型、消去子、monad API 或宿主语言的 Maybe.'

[en]
label = 'Option'
desc = 'Optional values: none / some(x).'
wiki = 'https://en.wikipedia.org/wiki/Option_type'

