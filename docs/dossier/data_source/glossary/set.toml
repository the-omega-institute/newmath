key = 'set'

aliases = ['SetUp']

constructive_story_zh = '这个证书里的集合不是宿主子集, 而是 BEDC 历史的可见成员包: 一条历史 h 进入承载, 当公开 Pkg 边界展示了 h 的成员行. 两条已承载历史由该包的 psame 成员分类器分类, hsame 输运只移动展示的历史形态, 成员来源仍留在账本里. 源行就是同一个可见成员谓词, 模式记录所有比较都经过 psame 而不是宿主相等, 外延性账本说明哪些成员行和包边界公开、哪些见证继续隐藏. 五条命名证书义务由任意展示成员行给非空性, 由底层证书分类器的自反、对称、传递给分类器律, 由沿 hsame 和 psame 的成员输运行保证分类后仍在包内. 一条历史 h 落入 SetUp token p 的签名 GAP, 当源域接受它的可见成员行, 签名关系把该行配对到答案成员展示和证据账本, token 引入关系把答案命名为 p; 展开后, h 必须是被 token 成员行分类到的公开成员历史之一. 标准桥把这一表面读成可见 BEDC 行的普通成员展示, 再只读回已展示成员行, 保持 psame 和无宿主泄漏账本. 本章把这一成员可见构造命名为 SetUp; 集合性是历史上的公开承载/分类器边界, 不引入宿主集合对象、商承载、隐藏包见证或外部相等原则.'

[en]
label = 'Set'
desc = 'Set interface; predicate-as-set on a base type.'
