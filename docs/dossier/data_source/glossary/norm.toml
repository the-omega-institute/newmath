key = 'norm'

aliases = ['NormUp']

constructive_story_zh = '这里的 normed vector 是单点空历史向量空间端点: 向量承载 A_emp 只接纳被分类为空历史的历史, norm map 把每个展示向量历史都送到同一个由 RatUp 零见证生成的 e-one sealed RealUp 常值零端点. 两个已承载向量由 rho_emp 分类, 两个 norm 值由 Real constant-history classifier 分类, 且不会出现非零长度, 因为每个向量端点和每个 norm 端点都塌缩到单点行. 源是单点 VecSpaceUp 承载加常有理 RealUp 边界, 模式记录非负性、正定零精确性、绝对齐次性、三角不等式、scoped certificate 行和下游 Hilbert 兼容性, 账本只保留向量空间源、RatUp 零见证和 e-one RealUp seal. 五条命名证书义务来自单点向量空间证书与 Real 常值证书: 空历史居住承载, 两个分类器自反、对称、传递, 被输运的代表仍有同一个常值 norm 端点. 一条历史 h 落入 NormUp token p 的签名 GAP, 当源域接受已承载单点向量, 签名关系把它的常值 norm 端点配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, h 是单点向量, 答案是通过 0_Real^c 读出的标准零. 已检查标准桥把每个已承载向量送到单点 normed space 的唯一点, 把每个 norm 值读成零, 再在 rho_emp 下返回空历史. 本章把这一常值零单点 norm 命名为 NormUp; 不引入非单点 normed space、Banach 完备性、非平凡正 norm 或展示的一点读回之外的额外桥字段.'

[en]
