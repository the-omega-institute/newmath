key = 'continuous'

aliases = ['ContinuousFunctionUp', 'ContinuousUp', 'ContinuousFunctionCarrierUp']

constructive_story_zh = '这个局部连续函数承载由两条已经承载的图-模量行生成: 通过展示延拓合成它们的映射历史、模量历史和终端证书历史. 承载只在两条基础连续函数包以及候选复合的图复合、模量复合、目标到证书的延拓行都出现时接受该复合; 没有这些账本的平行复合没有被接纳的承载行. 这个 seed 的分类器是暴露出的复合图、复合模量和复合证书历史上的历史相等, 所以共享输入的两种平行展示只有在延拓确定性识别这三个输出时才相同. 源是带共享中间端点的两条连续函数承载, 模式是复合封闭加平行确定性, 账本记录两条图延拓、两条模量延拓和两条终端证书延拓. 五条命名证书义务在这个 seed 内部成立: 展示复合定理给出有居住的复合行, hsame 给出暴露历史比较的自反、对称、传递, 端点输运使被输运的复合仍留在承载中. 一个包 h 落入 ContinuousFunctionCarrierUp token p 的签名 GAP, 当源域接受两条基础承载和平行延拓账本, 签名关系把所选复合配对到答案承载和证据账本, token 引入关系把答案命名为 p; 展开后, 两个图复合、两个模量复合和两个终端证书都被历史相等识别. 本章把这一平行确定性 seed 命名为 ContinuousFunctionCarrierUp; 它只为后续 ContinuousMapUp coherence 提供局部账本, 不引入宿主函数外延性、公开连续映射桥或更高 coherence 包.'

