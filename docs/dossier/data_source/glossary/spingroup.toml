key = 'spingroup'

aliases = ['SpinGroupUp']

constructive_story_zh = '一条自旋行由展示的 CliffordUp 单位表面和单点历史 GroupUp 律表面配对生成, 并把 Clifford 端点、类单位端点、乘法与逆元输运、奇偶历史、投影行、延拓见证和 provenance 保存在一个有限包中. 承载只接受那些 Clifford、Group、UnaryHistory、Cont、hsame 和 Pkg 字段全部在场的 BHist 行; 宿主正交群、矩阵实现、Clifford 商或拓扑连通分支谓词都不是根边界的一部分. 两个已接纳自旋包相同, 是在 Clifford lift、群律行、奇偶账本、投影端点、乘法与逆元行和包 provenance 上逐分量 hsame, 并由有限延拓路线携带双覆盖和共轭读回. 源谱是组合的 CliffordUp 与 GroupUp 边界, 模式谱记录单位、乘法、逆元、偶奇偶、双覆盖纤维和共轭作用行, 账本保留 Clifford 单位比较、奇偶行、正交作用端点、投影见证和 provenance. 五条命名证书义务由根义务包给出: 已接纳包居住承载, 逐分量 hsame 给出分类器自反、对称、传递, 来源范围与账本穷尽性把每个被输运的单位、乘积、逆元和纤维行重打包到同一边界中. 一个包历史 h 落入 SpinGroupUp token p 的签名 GAP, 当源域接受它的 Clifford-群边界, 签名关系把它配对到答案自旋包和证据账本, token 引入关系把答案命名为 p; 展开后, 单位、乘法、逆元、奇偶、投影和纤维行正是 p 编码的数据. 本章把这一 Clifford 单位边界构造命名为 SpinGroupUp; 不引入完整双覆盖定理、拓扑连通性证明或标准桥.'

