key = 'randomvar'

aliases = ['RandomVarUp']

constructive_story_zh = '这个包里的随机变量是一条从展示的 ProbSpaceUp 源到展示的 MeasureUp 目标的已承载 BEDC 映射, 只有当证书命名的每个目标可测事件都有一个源可测原像并带有公共成员读回时才被接受. 两条已承载映射通过源事件和目标事件分类器来比较, 而不是通过宿主函数外延性: 它们的可见原像行必须分类为同一个源事件, 相关 RealUp 端点比较也从测度和概率账本中读取. 源谱覆盖已承载映射、源概率承载、目标测度承载、全集行和可测原像操作, 模式谱记录有限原像精确性、补与相对差精确性、空事件精确性、目标全集处的终端无损条件和可数并精确性. 账本保留每个目标事件、它的源原像、逐点成员等价、不交性输运、全集缺陷行和可数并见证, 因而不需要概率空间标准桥来恢复已检查内容. 五条命名证书义务来自给定的已承载映射以及 ProbSpaceUp 和 MeasureUp 的事件分类器: 当映射被展示时源与目标承载给出居住行, 自反、对称、传递继承到原像事件比较, 承载封闭正是沿这些分类器输运可测原像. 一条映射历史 h 落入 RandomVarUp token p 的签名 GAP, 当源域接受 h 为已承载可测映射, 签名关系把它配对到答案原像包和证据账本, token 引入关系把该包命名为 p; 展开后, 每个有限、终端或可数目标事件的原像都是 p 编码的源事件, 并带有同一分类器读回. 本章把这一已承载原像包命名为 RandomVarUp; 不引入独立性理论、条件期望、超出原像的分布包、宿主函数等同或标准概率空间桥.'

[en]
label = 'RandomVar'
desc = 'Measurable function from a probability space to a target measure space.'
wiki = 'https://en.wikipedia.org/wiki/Random_variable'

