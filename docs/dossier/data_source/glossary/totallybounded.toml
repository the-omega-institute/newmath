key = 'totallybounded'

aliases = ['TotallyBoundedUp']

constructive_story_zh = '一个全有界度量承载从已认证 MetricSpaceUp 承载出发, 并且对每个正 RatUp 容差历史 epsilon 展示一条闭合有限 ProbeBundle 中心名脊, 连同成员行、中心历史、半径历史、距离见证和有理上界账本. 一行只有在每个已承载源点都被分配到某个打包探针, 并带有可见 MetricDistanceWitness 且该距离被分类为不超过 epsilon 时才被接纳; 缺少正容差、闭合 bundle、中心承载、成员构造子或比较账本的数据都被排除. 两条网行相同, 当容差以及每条可见中心、半径、距离和比较行都通过 hsame 与 RatUp 分类器输运, 而同一条闭合 bundle 脊保持其成员分支可见. 源是底层度量承载及其点-距离证书, 模式是有限网覆盖包, 账本记录容差、bundle、成员、中心、半径、覆盖距离和有理不等式, 不把它们替换成外部有限集合. 五条命名证书义务成立, 因为空历史处的单点承载给出有居住的例子, 历史相等和有理分类给出自反、对称、传递比较, 覆盖稳定性把任何被分类的代表重新打包为已接纳网. 一个历史包 h 落入 TotallyBoundedUp token p 的签名 GAP, 当源域接受它的度量承载和有限网行, 签名关系把该行配对到答案网和证据账本, token 引入关系把答案命名为 p; 展开后, 同一批 ProbeBundle 中心以 p 编码的正容差覆盖每个源点. 本章把这一 ProbeBundle 网构造命名为 TotallyBoundedUp; 紧致度量组件桥把同一批有限账本交给下游读取, 不引入开覆盖紧致、有限子覆盖选择、序列紧致或宿主层中心列表.'

[en]
label = 'TotallyBounded'
desc = 'Totally bounded metric space; finite ε-net for any ε.'
wiki = 'https://en.wikipedia.org/wiki/Totally_bounded_space'

