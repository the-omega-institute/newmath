key = 'complexityclass'

aliases = ['ComplexityClassUp']

constructive_story_zh = '一个 ComplexityClassUp 标记 命名一个确定性 TuringMachineUp 接受机, 配一个展示的一元模 β 与一个资源类型标签 (时间、空间或交替深度). 承载接纳输入历史 h, 当接受机在 h 上的有界仿真 (在 NameCert_{ComputableUp} 的意义下) 在 β(|h|) 行轨迹内停在接受配置; 资源类型标签选定 β 是上限轨迹长度、读写头-单元足迹, 还是交替深度. 分类器是同一一元长度输入上的 hsame; 源覆盖一元输入长度、模值、配置-轨迹长度、读写头-单元足迹与交替行; 模式记录停机-接受、模单调性、足迹可纳入与交替深度可纳入行; 账本让模 β(|h|)、实现的轨迹长度或足迹、交替深度与停机判决保持可见. 五条命名证书义务由 NameCert_{ComputableUp} 的有界仿真证书加 β 单调性供给: 有居住的恒等证书是 β≡0 的平凡接受机; 分类器稳定性是固定长度输入上自反、对称、传递的 hsame; 输运把有界仿真通过输入输运重新打包; 账本精确性把已接纳行与有界仿真判决同一; 扩张边界固定 β 在一元输入长度中的单调性. 一条历史 h 落入 ComplexityClassUp 标记 p 的签名缺口, 当源域接纳有界资源仿真, 签名关系把它配对到停机判决, 标记 引入把该判决命名为 p. 本章把这一资源上限表面命名为 ComplexityClassUp; 它是一个确定性资源类对象, 不通往非确定性、随机化、平均情形、oracle 或交互式证明桥.'

[en]
label = 'ComplexityClass'
desc = 'Resource-bounded acceptance predicate parametrised by an explicit unary modulus on input length.'
wiki = 'https://en.wikipedia.org/wiki/Complexity_class'

[zh]
label = '复杂度类'
desc = '由输入长度的一元资源上界界定的可接受谓词类.'
