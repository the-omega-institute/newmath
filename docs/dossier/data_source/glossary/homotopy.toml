key = 'homotopy'

aliases = ['HomotopyUp']

constructive_story_zh = '同伦被组装成一个有限 BHist 包: 两个端点 ContinuousMapUp 行、一个 IntervalUp 参数行、端点之间的显示形变行、端点面账本、有限 Cont 读回账本, 以及两个依赖证书的 Pkg 来源. 承载只接纳端点映射、区间面、形变行、端点读回和来源都出现在同一个显示信封里的包, 排除宿主路径空间、导入路径相等、环境函数相等和映射商. 两个已接纳信封同一, 当 hsame 运输端点连续映射行、区间参数行以及读出形变端点的有限账本; 因而分类是带端点与区间运输的形变数据, 不是外部映射空间中的相等. 源谱是端点-形变-区间包, 模式谱记录端点确定性、反向、常值形变、复合、恒等和结合行, 账本让原始形变行与两个可见端点读回保持对齐. 五条命名证书义务由恒等形变给出非空性和自反性, 由反向给出对称, 由复合给出传递, 由源信封运输行给出分类器下的承载封闭. 一条历史 h 落入 HomotopyUp token p 的签名 GAP, 当源域接受这个形变包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 在本表面中, 这就是说 h 的两个端点映射、区间参数、形变行、端点读回和复合账本正是 p 编码的包. 本章把这种有限形变构造命名为 HomotopyUp; 它只使用 ContinuousMapUp、IntervalUp、BHist、hsame、Cont 和 Pkg 行, 不加入宿主路径商或完整同伦论.'

[en]
label = 'Homotopy'
desc = 'Equivalence-of-paths between continuous maps under continuous deformation.'
wiki = 'https://en.wikipedia.org/wiki/Homotopy'

[zh]
label = '同伦'
desc = '连续映射在连续形变下的路径等价关系.'
