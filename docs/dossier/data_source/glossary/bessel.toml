key = 'bessel'

aliases = ['BesselUp']

constructive_story_zh = '一个 Bessel 包由展示的 Bessel 微分方程 OdeUp 行和盘局部解历史的 HolomorphicUp 行并排生成, 再加入阶数与指标历史、解端点、递推项、输运行和包 provenance. 承载只接受这个有限包 (O,H,nu,sigma,tau,rho,kappa,pi); 宿主解析解算子、普通函数相等、函数空间商或标准 Bessel 模型都不属于该表面. 两个已接纳包相同, 是把 ODE 来源、全纯来源、阶数与指标行、解端点、递推账本和 provenance 逐分量用 hsame 输运, 并用有限 Cont 路线携带每个递推读回. 源谱是配对的 ODE 与全纯证书边界, 模式谱是带递推律的 Bessel 方程解表面, 账本保留阶数/指标行、解端点、递推路线、端点分类器和共享 Pkg 行. 五条命名证书义务由已接纳根包给出居住, 由分量分类器的等价律给出自反、对称、传递, 并由递推账本精确性说明每个被输运的递推读回都重打包为同一有限账本项. 一个包历史 h 落入 BesselUp token p 的签名 GAP, 当源域接受它的 ODE 与全纯行, 签名关系把它配对到答案 Bessel 包和证据账本, token 引入关系把答案命名为 p; 展开后, 阶数、解端点和递推账本正是 p 编码的行. 本章把这一 ODE 与递推包命名为 BesselUp; 不引入解析存在或唯一性定理、渐近展开包、宿主 Bessel 函数或标准桥.'

[en]
label = 'Bessel'
desc = "Holomorphic solutions to x^2 y'' + x y' + (x^2 - n^2) y = 0; integral representations."
wiki = 'https://en.wikipedia.org/wiki/Bessel_function'

