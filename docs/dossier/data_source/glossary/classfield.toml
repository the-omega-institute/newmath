key = 'classfield'

aliases = ['ClassFieldUp']

constructive_story_zh = '一个类域由一个源包承载: 可见行是 NumFieldUp 基域、AdeleUp 理元类源、阿贝尔扩张历史、选定分类器行和账本行, 并由一元历史证据与 Cont 复合连在一起. 承载只接受那些基域与理元类依赖证书供应前两行、扩张端点是延拓结果的历史; 互反律、极大阿贝尔扩张精确性和标准桥都不是这个包的字段. 它的分类器是在扩张端点上的 hsame, 再加上数域与 Adele 行的依赖分类器, 所以 Artin 与 Frobenius 数据只通过命名的源分类器和端点历史比较来输运. 源谱是 NumField 加 Adele 的承载表面, 模式谱是带有理元、局部素、Frobenius 与扩张展示代表的 Artin-Frobenius 行, 账本则用覆盖、可靠性、完备性义务把可见分类器行同隐藏代表分开. 五条命名证书义务由语义源承载供应: 显示的扩张端点给出承载见证, hsame 给出自反、对称、传递, 沿 hsame 的结果输运把同一个源承载重包到被分类的端点. 一条历史 h 落入 ClassFieldUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案扩张行和证据账本, token 引入关系把答案命名为 p; 在这里, 基域、理元类、扩张、Artin、Frobenius、分类器、隐藏代表与 ExactGlobalize 行都必须在同一个显示包中对齐. 本章把这一构造命名为 ClassFieldUp; 不闭合 Artin 映射定律、类域互反律、极大阿贝尔扩张唯一性或标准桥.'

[en]
label = 'ClassField'
desc = 'Maximal abelian extension of a number field; Artin map from idele class to Frobenius.'
wiki = 'https://en.wikipedia.org/wiki/Class_field_theory'

