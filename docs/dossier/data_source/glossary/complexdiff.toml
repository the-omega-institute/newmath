key = 'complexdiff'

aliases = ['ComplexDiffUp']

constructive_story_zh = '一条复可微记录从复函数历史、点历史、候选导数和对所有非零步长的显式一元控制开始; 只有展示 CplxDiffAt 行、非零步长差商以及与导数分类到一起的商结果的三元组才进入承载. 分类器不是宿主复数相等, 而是在函数、点和导数三个槽位上的逐分量 hsame, 差商见证与导数承载沿同一批比较输运. 源谱覆盖的正是这些可微三元组, 模式谱是每个已接纳非零步长上的唯一差商 CplxDiffQuot(f,z,h,q), 账本保留一元模量、差商延拓、导数读回、和、数乘、乘积、链式以及 Cauchy-Riemann 行. 五条命名证书义务由已接纳可微记录给出承载居住, 由三个槽位上的 hsame 等价律给出自反、对称、传递, 并由输运定理在分类替换后重建 CplxDiffAt 及其差商模式. 一条源历史 h 落入 ComplexDiffUp token p 的签名 GAP, 当源域接受它的可微包, 签名关系把该包配对到答案导数和证据账本, token 引入关系把这个导数命名为 p; 展开后, 每个展示的非零步长差商都必须分类到 p 编码的导数. 本章把这一显式差商构造命名为 ComplexDiffUp; 不引入复相等的经典分裂、商见证、宿主复分析相等或标准桥.'

[en]
label = 'CplxDiff'
desc = 'Complex differentiability + Cauchy-Riemann.'
wiki = 'https://en.wikipedia.org/wiki/Cauchy%E2%80%93Riemann_equations'

