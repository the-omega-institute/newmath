key = 'computable'

aliases = ['ComputableUp']

constructive_story_zh = '一个可计算偏图由一段确定性机器代码和一条展示的一元界模数承载: 对已接纳的 F(n, m) 行, 输入 n、界 beta_F(n) 与输出 m 都是一元历史, 并且有一条 SeqUp 配置迹沿着该界的一元前缀运行. 承载只接受这种有界模拟包: 零行是输入上的初始配置, 每个一步行遵守转移关系并允许停机配置重复, 端点已经停机并读回一元输出 m; 隐藏的精确运行时间、通用机和外部递归论对象都不是承载字段. 分类器使用 NatUp 历史分类器和 hsame: 同一认证输入与同一展示界上的已接纳输出在 history-sameness 下单值, 而恒等图就是空界停机代码, 其图谓词只是输入一元、输出一元和 n hsame m. 源覆盖一元输入、一元界、一元输出、确定性程序代码和 SeqUp 迹; 模式记录图精确性、单值性、恒等、有界模拟复合、复合结合性和分类器稳定性; 账本保留代码、模数值、迹、端点读回和 ContR 阶段边界. 五条命名证书义务由有居住的恒等证书、对一元历史的 hsame 自反对称传递控制, 以及在分类器移动后重新打包有界模拟的输运与复合行给出. 一条历史 h 落入 ComputableUp token p 的签名 GAP, 当源域接受有界图行, 签名关系把它配对到答案行和模拟账本, token 引入关系把答案命名为 p; 展开后, h 是确定性代码在展示界内产生的图值, 输出匹配 p 编码的一元值. 本章把这一有界模拟构造命名为 ComputableUp; 可计算性在这里是一份显式有时间界的迹证书, 不是全性主张、停机判定过程、递归论库或标准桥.'

