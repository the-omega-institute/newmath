key = 'abgroup'

aliases = ['AbGroupUp']

constructive_story_zh = '这一层的交换群沿用群标记里的空历史单点, 只是把端点读成加法语言. 一条历史只有与空历史相等才进入, 两条承载历史也由同一个单点相等来分类, 因而加法运算、零元与负元都回到这个端点. 源是单点谓词, 模式记录延拓作为加法、空历史作为单位、负元仍落到空历史, 以及交换律行: 先 a 后 b 与先 b 后 a 的延拓都拉回到端点; 账本让可见与原始单点历史对齐. 因为承载只有一个有居住元的类且历史相等是等价关系, 空历史给出非空性, 分类器自反、对称、传递, 并在承载中封闭. 一条历史 h 落入 AbGroupUp token p 的签名 GAP, 当源域接受 h, 签名关系把 h 配对到一条答案历史与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, h 与空历史相等, p 是单点交换群元素. 终态单点桥与扭子子群行随后都从同一个端点计算读出. 本章把这一单点交换群构造命名为 AbGroupUp; 交换律是单点承载上的端点塌缩, 不引入非单点交换群表面、商群或同态理论.'

[en]
label = 'AbGroup'
desc = 'Abelian group: commutative group.'
wiki = 'https://en.wikipedia.org/wiki/Abelian_group'

