key = 'probspace'

aliases = ['ProbSpaceUp']

constructive_story_zh = '一个概率空间由一个已承载的 MeasureUp 包得到: 保留它的可测事件族、全集事件和 RealUp 值测度行, 再加上一条把全集质量分类为所选单位端点 1_R 的归一化行. 承载只接纳那些测度、补集、相对差、序和加法行已经能通过 MeasureUp、RealUp 与 AbGroupUp 表面看见的事件包; 两个包相同, 当继承来的事件读回分类器和 RealUp 分类器能把所有测度端点、序比较、补集与差集输运到匹配行. 因而源覆盖的是公共事件包, 模式记录总质量归一化、补集加法、一减读回和单调界, 账本把原始 BHist 历史、Pkg 来源以及被消费的 NameCert 行同可见概率行对齐. 由于底层测度与实数分类器都是等价关系, 被输运的事件包又保持同一批承载条目, 一个已接纳的归一化包给出承载非空见证, 分类器自反、对称、传递, 并且在分类替换下仍封闭. 一个历史包 h 落入 ProbSpaceUp token p 的签名 GAP, 当源域接受这个展示的事件-测度包, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, h 正是 p 暴露的那个全集质量为 1_R 的归一化 MeasureUp 包, 带着同一批补集、差集和序行. 这里的纸面桥是保守的: 普通概率空间表面只通过展示的事件分类器和 RealUp 端点比较读出, 不通过宿主概率空间公理读出. 本章把这一归一化测度构造命名为 ProbSpaceUp; 概率就是 MeasureUp 账本加一条总质量行, 不引入独立随机变量、分布、条件期望或标准空间原件.'

