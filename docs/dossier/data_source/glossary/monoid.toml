key = 'monoid'

aliases = ['MonoidUp']

constructive_story_zh = '一元脊本身已经带着 monoid 运算: 用内核延拓把一条一元历史接在另一条之后, 一元封闭性说明结果仍在脊上, 空历史在左右两侧都充当空尾部. 两个承载元素相同, 只是在一元承载内部底层历史相等, 所以这个运算从不离开历史表面去借用外部代数集合. 源就是一元谓词, 模式记录二元 append、以空历史为单位的两条单位律、三条脊连续延拓的结合律, 账本把每个可见 monoid 元素与实现它的原始一元历史对齐. 因为历史相等是等价关系, 一元历史又在延拓下封闭, 空历史给了承载见证, 分类器自反、对称、传递, 被识别的代表也仍被接纳. 一条一元历史 h 落入 MonoidUp token p 的签名 GAP, 当源域接受 h, 签名关系把 h 配对到一条答案历史与一份证据账本, token 引入关系把那条答案命名为 p; 具体说, h 一元并且与 p 编码的脊历史相等. 同一包还把逆元障碍、因子读回在历史相等下的唯一性、对偶 monoid 与双对偶恒等都作为延拓的后果展示出来. 本章把这一一元 append 构造命名为 MonoidUp; monoid 律是已有内核延拓上的定理, 不引入外部代数承载、逆元原件或宿主 monoid 结构.'

[en]
