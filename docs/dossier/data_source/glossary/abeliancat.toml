key = 'abeliancat'

aliases = ['AbelianCatUp']

constructive_story_zh = '一个 AbelianCatUp 包由已经认证的 CategoryUp 表面和每个 hom 行上的 AbGroupUp 加法结构生成: 它只接受同时展示对象、态射、零态射、双积、hom 加法群、核、余核、像-余像比较以及 epi-mono 分解的 BHist 包. 被排除的是隐藏商、子对象分类器、模范畴、sheaf 模型和宿主范畴相等. 两个包相同, 只有当范畴承载、每个 hom 承载、加法行、核余核行和 exactness 账本都能逐分量用 hsame 输运, 所以分类器是有条件的展示行输运, 不是环境范畴的相等. 源是 CategoryUp 与 AbGroupUp 证书的配对表面, 模式是零对象、双积、核、余核、精确分解和 hom 零的完整清单, 账本保留原始范畴行、hom 行、结构态射、泛分解见证和重组见证. 五条命名证书义务由已接纳包给出承载居住, 由两个来源分类器的等价性给出自反、对称、传递, 由逐字段输运把被分类的展示重新打包为已接纳 AbelianCatUp 包. 一个包 h 落入 AbelianCatUp token p 的签名 GAP, 当源域接受它的范畴和 hom 加法行, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 编码的就是同一批核、余核、双积、hom 零和精确分解行. 本章把这一展示加法精确性表面命名为 AbelianCatUp; 不引入标准 abelian category、模范畴、sheaf 模型或外部相等.'

[en]
label = 'AbelianCat'
desc = 'Additive category in which every morphism has kernel/cokernel and the canonical factorisation is iso.'
wiki = 'https://en.wikipedia.org/wiki/Abelian_category'

[zh]
label = '阿贝尔范畴'
desc = '加性范畴, 每个态射有核 / 余核, 标准分解为同构.'
wiki = 'https://zh.wikipedia.org/wiki/%E9%98%BF%E8%B4%9D%E5%B0%94%E8%8C%83%E7%95%B4'
