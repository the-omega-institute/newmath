key = 'distribution'

aliases = ['DistributionUp']

constructive_story_zh = '一个分布由一个已承载的随机变量 X:S->T 构成: RandomVarUp 行先把每个目标可测事件 B 变成源侧可测事件 X^{-1}(B), 然后在该原像上读取源 ProbSpaceUp 的测度. 承载正是目标可测事件族连同端点赋值 B -> mu_S(X^{-1}(B)); 分类器只有在目标事件分类器匹配了事件且 RealUp 分类器匹配了所得测度端点之后, 才比较两条这样的行. 因而源覆盖从归一化概率源到可测目标的已承载随机变量, 模式是前推律以及总质量、空事件、非负性、加法性、单调性、sigma 加法性和从下连续行, 账本则把解释每个公共目标端点的原像事件藏为见证. 因为目标事件输运、随机变量原像输运、源测度输运和 RealUp 分类器都保持各自承载行, 证书有一个 inhabited 的前推承载, 行比较自反、对称、传递, 并且在分类替换下封闭. 一条行 h 落入 DistributionUp token p 的签名 GAP, 当源域接受已承载映射与目标事件表面, 签名关系把展示的前推赋值配对到答案行和证据账本, token 引入关系把答案命名为 p; 具体地说, h 的每个公共值都是 p 编码的相应已认证原像事件的源概率. 标准桥把这读作普通前推概率测度 X_*mu_S, 但仍只经过目标事件分类器和 RealUp 端点分类器. 本章把这一前推构造命名为 DistributionUp; 随机变量的 law 是 ProbSpaceUp 上的原像账本, 不引入独立宿主测度、分布收敛包或事件商.'

[en]
label = 'Distribution'
desc = 'Pushforward measure of a random variable on its target space.'
wiki = 'https://en.wikipedia.org/wiki/Distribution_%28mathematics%29'

