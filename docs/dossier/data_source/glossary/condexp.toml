key = 'condexp'

aliases = ['CondExpUp']

constructive_story_zh = '本章范围内的条件期望是一个 singleton 包, 由三条展示行拼成: RandomVarUp 对源与目标全集事件的总读回证书、HilbertUp 对可积端点 x 与投影端点 p 的 singleton 投影见证, 以及记录残差历史的延拓行 Cont(p,r,x). 承载只接纳带有这三个见证及其六个可见历史的包; 分类器在总读回历史、可积端点、投影端点和残差行都能由 hsame 以及被消费的 RandomVarUp 与 HilbertUp 证书输运时, 识别两个包. 因而源只覆盖已承载随机变量的总读回端点, 模式是带幂等性与残差零正交性的 Hilbert singleton 投影, 账本把终端原像 exactness 行和残差零内积行保存为可见投影的隐藏解释. 由于终端读回唯一性、singleton 投影输运和历史相等都在展示比较下稳定, 一个已承载 singleton 包给出非空见证, 分类器自反、对称、传递, 并且承载成员资格在分类替换下保存. 一个包 h 落入 CondExpUp token p0 的签名 GAP, 当源域接受总读回与投影包, 签名关系把它配对到答案包和证据账本, token 引入关系把答案命名为 p0; 展开后, 投影端点就是展示可积端点的 Hilbert singleton 投影, 残差行则是常零正交见证. 标准桥被刻意收窄, 只导出这个 singleton 条件期望边界, 不导出塔性质或非全集子 sigma 代数可测性. 本章把这一 singleton 投影构造命名为 CondExpUp; 条件期望是一条 RandomVarUp 读回加 Hilbert 投影账本, 不引入无限制宿主条件期望算子.'

[en]
label = 'CondExp'
desc = 'L^2 projection onto sub-σ-algebra-measurable functions.'
wiki = 'https://en.wikipedia.org/wiki/Conditional_expectation'

