key = 's1'

aliases = ['SOneUp']

constructive_story_zh = "一个圆周点由两条 RealUp 常历史 x 和 y 展示生成, 它们通过 product continuation 账本组合成点历史 p, 另有一条方程历史 e 证明单位关系 x² + y² 约等于 1; 空点、零头点以及没有单位方程见证的对都在承载之外. 分类器有意只暴露两个分量比较 hsame(x,x') 与 hsame(y,y'): 一旦这两条比较存在, 方程账本和点账本由承载定理确定并输运, 所以这里没有按角度或宿主 R/Z 表示取商. 源谱是两个实数见证的乘积以及形成单位方程所需的实代数行, 模式谱是由该对加已认证方程对象形成单位圆, 账本保留两个实常量的有理尾部、product continuation、方程见证和被输运的分量行. 五条命名证书义务化为逐分量历史相等: 一个带单位方程的已接纳对居住承载, 自反、对称、传递继承自两个实分量, 完整承载能输运是因为隐藏方程和点见证可由这些分量比较恢复. 一条点历史 h 落入 SOneUp token p 的签名 GAP, 当源域接受 h 为这样一个带单位方程账本的实数对, 签名关系把它配对到答案圆周点和证据账本, token 引入关系把答案命名为 p; 展开后, 两个实分量及其方程见证与 p 编码的点相匹配. 本章把这一分量加方程的构造命名为 SOneUp; 不引入三角函数库、绕数理论、覆盖空间商、拓扑群结构或标准桥."

[en]
label = 'S¹'
desc = 'Circle S^1 as a quotient of the unit interval.'
wiki = 'https://en.wikipedia.org/wiki/Circle_group'

[zh]
label = '单位圆'
desc = '圆 S^1, 作为单位区间的商.'
