key = 'monoidalcat'

aliases = ['MonoidalCatUp']

constructive_story_zh = '一个 MonoidalCatUp seed 是 unary-continuation category 上的张量: 已承载一元对象 a 与 b 的张量是 append(a,b), 已承载 hom 历史 f 与 g 的张量是 append(f,g), 单位对象是空历史. 承载只接受这个 singleton tensor instance, 其中对象和态射都已由 CategoryUp 的延拓表面接纳; 非 singleton monoidal category 和宿主 bifunctor 数据不在 seed 内. 两个张量行由范畴对象和 hom 行同用的历史相等分类, associator 与左右 unitor 是延拓结合律和空延拓单位律给出的 hsame 见证, 不是外部 coherence theorem. 源是 unary histories 上的 CategoryUp, 模式记录张量封闭、identity hom 保持、复合保持、associator、unitor、pentagon 与 triangle 行, 账本保留张量尾部和两条 coherence 路径账本. 五条命名证书义务由空历史承载、一元历史对 append 的封闭、hsame 的等价性以及 hom carrier 的输运稳定性一起给出. 一个行 h 落入 MonoidalCatUp token p 的签名 GAP, 当源域接受一元范畴和张量账本, 签名关系把 singleton tensor 包配对到答案包和证据账本, token 引入关系把答案命名为 p; 具体地说, p 编码延拓张量及其 associator、unitor 和 coherence 行. 本章把这一 singleton continuation tensor 命名为 MonoidalCatUp; 它只是 seed 证书, 不引入公开标准桥或一般 monoidal-category 承载.'

[en]
label = 'MonoidalCat'
desc = 'Category with tensor-product bifunctor, unit, coherent associator and unitor.'
wiki = 'https://en.wikipedia.org/wiki/Monoidal_category'

[zh]
label = '幺半范畴'
desc = '带张量积、单位以及 associator/unitor 一致性的范畴.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%B9%BA%E5%8D%8A%E8%8C%83%E7%95%B4'
