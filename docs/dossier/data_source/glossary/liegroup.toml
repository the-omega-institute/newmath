key = 'liegroup'

aliases = ['LieGroupUp']

constructive_story_zh = '这里的具体李群是单点历史承载 L_emp: 一条历史被接纳, 正是它与空历史 hsame, 而同一个谓词同时充当 GroupUp 承载、ManifoldUp 点承载和 LieGroupUp 承载. 两个已接纳历史通过受限行 R_emp 分类, 所以由 append 给出的乘法、返回空历史的逆元、单位元空历史和单点图册都留在同一个分类器中, 不需要在重复来源之间搬运. 源覆盖单一 BHist 承载及其群行和图册行, 模式记录单点群律、常值图册覆盖、光滑乘法与逆元读回和共轭来源行, 账本让空历史、hsame、Cont、append、单点图册值和常值过渡保持可见. 非空性由空历史见证, 自反、对称、传递来自限制到 L_emp 的 hsame, 承载封闭来自每个公开运算端点都再次被分类到空历史. 一条历史 h 落入 LieGroupUp token p 的签名 GAP, 当源域把 h 接受为单点群与流形行, 签名关系把它配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, h 与答案都是带展示运算、图册和共轭行的空单点端点. 纸面桥把这个包读成标准单点李群, 再通过同一单点承载、群律和图册行读回. 本章把这一单点光滑群构造命名为 LieGroupUp; 非单点李群、指数理论、表示论和根系理论都不属于原始包.'

[en]
label = 'LieGroup'
desc = 'Group whose underlying carrier is a manifold with smooth multiplication and inverse.'
wiki = 'https://en.wikipedia.org/wiki/Lie_group'

[zh]
label = '李群'
desc = '底载体为流形, 乘法和取逆构造性光滑的群.'
wiki = 'https://zh.wikipedia.org/wiki/%E6%9D%8E%E7%BE%A4'
