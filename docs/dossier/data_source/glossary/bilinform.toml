key = 'bilinform'

aliases = ['BilinFormUp']

constructive_story_zh = '一个双线性型行由 ModuleUp 与 VecSpaceUp 两个已认证来源生成: 展示左、右向量来源历史、标量作用与加法来源历史、一个标量端点, 以及把这些行系到两个来源证书上的包账本. 承载只接受由这份可见 BHist 账本得到的配对行; 宿主双线性映射、基、坐标矩阵、商代表或 Clifford 关系都不属于承载. 两行由左输入、右输入和标量端点上的 hsame 分类, 并且要求输运后的端点仍通过模和向量空间来源分类器留在同一个配对行中. 源是模证书与向量空间证书的配对表面, 模式记录左右加性、标量相容、所选择的对称或反对称行以及非退化读回, 账本保留两个来源证书、探针数据、标量作用来源、加法来源、端点行和延拓范围. 五条命名证书义务记录在这一表面上: 已接纳配对行给出承载居住, 逐分量 hsame 给出分类器自反、对称、传递, 承载输运把任何按来源分类器替换的代表用同一来源重新打包. 一条行 h 落入 BilinFormUp token p 的签名 GAP, 当源域接受它的两个输入和配对账本, 签名关系把它配对到答案配对行和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录的是同一个标量端点以及它的双线性、交换和非退化见证. 本章把这一带账本的配对表面命名为 BilinFormUp; 它仍是下游几何和 Clifford 消费者的 scoped 依赖边界, 不引入公开坐标表示、标准桥或独立宿主双线性型对象.'

