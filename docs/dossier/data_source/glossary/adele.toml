key = 'adele'

aliases = ['AdeleUp']

constructive_story_zh = '一条 adele 历史由一条常实数历史和一个 p-adic 素数尺度结果并排生成: 存在实分量 r、素数行 p、指数行 e 与尺度结果 s, 且可见端点 h 与 append(r, s) 历史相同, 才被承载接纳. 实数侧从 RealUp 常流表面读出, p-adic 侧从 PadicUp 素数尺度读出, 空尺度结果或形状不对的尺度结果由上游构造子分离与非空行排除. 两个 adele 通过 appended 历史上的 hsame 分类, 输运时则把实分量、素数、指数、尺度结果和 append 比较一起拆出并重新打包. 源、模式和账本都是同一个 adele 承载谓词: 源只接受这些实-padic append 包, 模式记录非空性、单位尺度、空尺度、素数交换和延拓读回, 账本让隐藏的实、素数、指数、尺度和 append 见证与可见端点对齐. 因为有理尾部给出常实数分量, 第一素数单位尺度给出 p-adic 分量, 承载非空; hsame 自反、对称、传递, 且承载输运能重用同一组见证, 所以五条命名证书义务成立. 一条历史 h 落入 AdeleUp token p0 的签名 GAP, 当源域接受这个实-padic append 行, 签名关系把它配对到答案 adele 与证据账本, token 引入关系把答案命名为 p0; 展开后, 它的常实数部分和素数尺度部分正是 p0 编码的分量. 本章把这一实-padic append 构造命名为 AdeleUp; 这是 BEDC 的限制积表面, 不引入乘积公式、自守理论、解析延拓或标准模型桥.'

[en]
label = 'Adele'
desc = 'Adele ring; restricted product of all completions of Q.'
wiki = 'https://en.wikipedia.org/wiki/Adele_ring'

