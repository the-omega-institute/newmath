key = 'simplicialset'

aliases = ['SimplicialSetUp']

constructive_story_zh = '单纯集被生成成一个有限 BHist 包: 函子源行消费从单纯形范畴方向来的 FunctorUp 展示, 有限单纯形行族通过 FinSetUp 消费, 面与退化端点则由显示账本记录. 承载接纳含有函子源、有限单纯形行、面与退化端点账本、包行、来源账本和延拓账本的包; 宿主预层、宿主单纯形范畴、环境面映射相等和未记录的单纯恒等式证明都在外面. 两个包同一, 当函子源行、每个有限单纯形行、每个面或退化端点、来源行和延拓账本都由可用的 hsame 与依赖分类器逐分量运输. 源谱就是这个六字段包, 模式谱记录反变函子边界、面与退化端点覆盖以及单纯恒等式账本行, 账本把原始函子读数、有限单纯形条目、端点路线和来源一起保持可见. 五条命名证书义务来自一个已接纳的有限包、运输行逐分量的自反对称传递, 以及账本稳定性说明每个被运输的面或退化端点仍留在承载中. 一条历史 h 落入 SimplicialSetUp token p 的签名 GAP, 当源域接受这个单纯形行包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 具体地说, h 的度数、有限单纯形条目、面与退化路线和恒等式账本就是 p 编码的行. 本章把这种显示函子加账本的构造命名为 SimplicialSetUp; 它只闭合有界的 FunctorUp、FinSetUp、BHist、hsame、Cont 和 Pkg 表面, 不引入标准桥或完整单纯同伦论.'

[en]
label = 'SimplicialSet'
desc = 'Contravariant functor from simplex category Δ to sets, with face/degeneracy maps.'
wiki = 'https://en.wikipedia.org/wiki/Simplicial_set'

