key = 'pde'

aliases = ['PdeUp']

constructive_story_zh = '一个偏微分方程在这里被承载为已有流形与导数证书上的展示行: 流形承载命名环境图册空间, 导数行命名可出现的偏导端点, 有限关系行和边界数据行说明哪些端点被比较. 只有这些可见部分、Pkg 来源和用于读取关系的探针包都在场时, 这一行才被接纳; 图册选择、坐标代表、导数见证、求解器展示和宿主函数都只留在账本中, 不是承载坐标. 两个已承载端点通过同一个 hsame 与上游 NameCert 比较来输运流形行、导数元组、有限关系行、边界行和来源, 而不是通过宿主方程或函数相等来分类. 源覆盖展示的流形、导数、关系、边界、来源和探针行, 模式是在这些导数端点上的有限 PDE 与边界形状, 账本则让每个隐藏的图册、阶数、代表和边界展示只作为这些展示行的证据保持可见. 五条命名证书义务由 ManifoldUp 与 DerivativeUp 的已接纳端点、hsame 的自反对称传递, 以及每个被输运的关系或边界行都能重新打包成同类承载源行来完成. 一条历史 h 落入 PdeUp token p 的签名 GAP, 当源域接受这个展示 PDE 行, 签名关系把它配对到答案行和证据账本, token 引入关系把答案命名为 p; 展开后, 同一个已认证流形上的有限导数关系和边界分类器必须正是 p 编码的数据. 保守标准桥把可见行读成普通 PDE 展示, 并且只在普通展示精确使用这些行时读回; 本章把这一构造命名为 PdeUp, 不引入解析存在性定理、解空间、求解器语义或宿主函数相等.'

