key = 'compact'

aliases = ['CompactUp']

constructive_story_zh = '这个有界包中的紧致见证是一份一元历史上的有限细化记录: 子集历史、定位账本、有限网账本、中间账本和紧致性账本由展示延拓连接起来, 而较简单的网见证则记录中心、精度和网, 并要求网由中心接上精度得到. 分类器是暴露出来的网端点或细化端点上的历史相等, 确定性行说明共享中心、精度、复合或最终账本时, 对应字段必须由 hsame 识别. 源是 BEDC 的紧致网或细化谓词, 模式记录有限与定位细化链、前缀封闭、端点精确性、空网和非空精度形状以及复合细化确定性, 账本让每个定位、有限、中间、紧致、精度和网延拓都保持可见. 因为一元中心和精度总能构造见证网 center 接 precision, hsame 提供分类器等价关系, 细化谓词又能沿确定的延拓相等输运, 语义紧致网证书的五条命名证书义务成立. 一条历史 n 落入 CompactUp token p 的签名 GAP, 当源域接受它为紧致网或最终细化见证, 签名关系把它配对到一个答案网和证据账本, token 引入关系把那条答案命名为 p; 展开后, n 一元, 通过展示延拓连接到自己的中心和精度, 并携带 p 编码的细化端点数据. 本章不声称标准桥, 所以开覆盖紧致、序列紧致、乘积紧致和函数空间紧致都留在闭合面之外. 本章把这一有限细化网构造命名为 CompactUp; 紧致性是一份显式一元细化账本, 不是外部拓扑紧致公理或宿主空间对象.'

[en]
label = 'Compact'
desc = 'Compactness: total boundedness + completeness.'
wiki = 'https://en.wikipedia.org/wiki/Compact_space'

