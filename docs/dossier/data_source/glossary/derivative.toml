key = 'derivative'

aliases = ['DerivativeUp']

constructive_story_zh = '一个导数见证由五条历史组成的度量商行承载: 函数码 f、点 z、非零步长 h、商 q 和距离记录 dist 在需要处都必须是一元历史, Cont(f,h,q) 展示差商, Cont(h,q,dist) 展示度量距离账本. 分类器按这些可见历史逐分量做 hsame 输运, 承载排除零步长、带 b0 头的一元矛盾, 以及任何不是由两条延拓行产生的商或距离值. 源就是这份导数度量商包; 模式记录复差商读回、度量距离深度、可见上下文读回、确定性、链式乘积复合和空函数边界行; 账本保留两条延拓以及每个被输运的可见上下文. 任意展示出来的商行给出承载见证, hsame 给出自反、对称、传递, 输运定理把被分类器识别的分量重新打包成新的导数商, 所以五条义务都留在延拓演算内部. 一个历史包 h0 落入 DerivativeUp token p 的签名 GAP, 当源域接受它的度量商行, 签名关系把商和距离包配对到一个答案导数历史与证据账本, token 引入关系把那条答案命名为 p; 展开后, 答案就是其非零步长和距离账本匹配 p 的商端点. 纸面桥把同一份包读成通常差商与链式乘积接口, 度量容差由可见距离行给出. 本章把这一构造命名为 DerivativeUp; 不引入完整微积分、积分理论、可微阶层或 bridgeChecked 外部证明.'

[en]
label = 'Derivative'
desc = 'Differentiation operator on functions.'
