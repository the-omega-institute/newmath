key = 'streamname'

aliases = ['StreamNameUp']

constructive_story_zh = '一个流命名由从一元 BHist 指标到有理历史的认证观测映射生成, 因而每个已接纳流在每个一元观测处都暴露一个 RatUp 承载行. 承载只接纳带有逐点有理历史见证的观测映射, 有限窗口表面只接纳那些打包一元观测的端点带有相应逐点 RatUp 分类器的行; 没有一元调度、没有有理端点见证或没有 bundle 成员行的映射都被排除. 两个流命名相同, 当两个端点流都被承载, 并且每个认证一元观测都由逐点有理分类器相关; 有限窗口只是把同一个分类器限制到展示的 ProbeBundle, 不制造第二套相等. 源谱是 BHist 上的 UnaryHistory 加 RatUp, 模式谱记录常值流、空窗口真空性、端点形状排除、one-tail 读回、有限窗口覆盖与穷尽、重索引、RatUp 保持的点映射和重索引复合, 账本保留观测指标、bundle 成员、端点承载、点分类器和输运见证. 五条命名证书义务来自逐点 RatUp 证书: 常值有理流给出承载居住, 自反、对称、传递在每个一元观测处证明, 逐点 hsame 输运把已分类的流和窗口重包为已接纳行. 一个流包 h 落入 StreamNameUp token p 的签名 GAP, 当源域接受其一元观测映射, 签名关系把它配对到答案流和证据账本, token 引入关系把答案命名为 p; 展开后, p 选择的每个有限观测都读出同一个有理端点和分类器账本. 已检查普通序列桥把公开 countable name 与有限窗口读成对应有理序列和有限前缀, 但本章把构造命名为 StreamNameUp 时不加入正则性、实数完成、度量完备性、算术/序闭合、商代表或独立序列承载.'

[en]
label = 'StreamName'
desc = 'Stream-name interface; co-inductive carrier for Real.'

[zh]
label = '流命名'
desc = '流命名接口; Real 的共归纳载体.'
