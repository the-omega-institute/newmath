key = 'real'

aliases = ['RealUp']

constructive_story_zh = '实数边界由四份已展示表面合接而成: DyadicRatCore 公开观测、StreamNameUp 可数名与有限窗口、RegSeqRat 正则流脊, 以及范围内的 RealUp 封缄/读回行. 承载只接纳这一二进制观测、有理流名、正则脊、常数历史行、端点输运与有限窗口账本的复合包; 完备化对象、商承载、宿主相等、算术包、序包或度量完备性行都不在被接纳边界之内. 两个已接纳实数包通过公开流名分类器、被输运的正则流分类器与同一一元观测和账本行上的实数常数/历史分类器分类, 而不通过标识外部 Cauchy 类. 源规约是这四包阶段边界, 模式规约记录二进制观测输运、公开 StreamName 导出、有限窗口精确性、正则脊封缄消费、公开实数导出、端点确定性与消费者边界穷尽, 账本让每一行二进制、流、正则性、封缄、端点与来源记号行保持可见. 五条命名证书义务通过这些分量证书读出: 一行展示的常数有理嵌入居住边界, 分量分类器提供自反、对称、传递, hsame、端点、流名与有限窗口输运把复合包保持在同一边界之内. 一份包 h 落入 RealUp 标记 p 的签名缺口, 当源域接纳四个公开包面之一, 签名关系把它配对到一份答案实数边界包与证据账本, 标记引入把该答案命名为 p; 展开后, 二进制观测、有理流名行、正则脊与封缄/读回项与 p 编码的行匹配. 已检桥标记仅附加到此处记录的常数有理嵌入与边界包; 本章把这一阶段实数构造命名为 RealUp, 不闭合完备性、完整算术、完整序、度量完备性、商构造、Classical 数据或标准模型桥.'

