key = 'approximation'

aliases = ['ApproximationUp']

constructive_story_zh = '一个逼近包由 ContinuousMapUp 给出的紧连续映射来源、PolynomialUp 给出的有界次数多项式候选, 以及一份有限误差账本生成, 账本命名被比较的来源端点、候选端点和误差端点. 承载只接受这份带 hsame 比较和 Cont 输运行的有限 BHist 包; 上确界对象、最佳候选选择器或由 choice 产生的最小化见证都没有槽位. 两个逼近包相同, 当连续来源、多项式候选和记录的误差端点能沿展示的 hsame 与延拓行逐分量输运. 源谱是紧连续映射证书表面, 模式谱是多项式候选行加已记录的逼近误差比较, 账本保留每个有限误差项、消费者窗口、端点精确性行和无 choice provenance 行. 五条命名证书义务由已接纳包给出承载居住, 由两个依赖证书的分量分类器给出自反、对称、传递, 并由账本精确性把被输运的来源、多项式和误差端点重打包为同一个逼近表面. 一个包历史 h 落入 ApproximationUp token p 的签名 GAP, 当源域接受它的连续来源和多项式候选行, 签名关系把它配对到答案逼近包和证据账本, token 引入关系把答案命名为 p; 展开后, p 只记录账本中真实存在的候选与有限误差行. 本章把这一有限误差账本构造命名为 ApproximationUp; 不引入上确界达到定理、最佳多项式选择泛函或 choice 数据.'

[en]
label = 'Approximation'
desc = 'Polynomial of bounded degree minimising sup-norm error (Weierstrass / Chebyshev).'
wiki = 'https://en.wikipedia.org/wiki/Approximation_theory'

