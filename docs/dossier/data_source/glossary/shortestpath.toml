constructive_story_zh = '一条 shortest-path 行由有限带权图包生成: 在同一个 BHist 载体中保留顶点行、边行、非负 RealUp 权重行、端点行、路径账本、松弛行、hsame 输运、Cont 路径和 Pkg 来源. 义务表面只记录 Dijkstra 或 Bellman-Ford 读回可用的有限账本数据; 不引入环境极小元、隐藏顶点序、无限松弛流或已完成的度量空间对象.'

