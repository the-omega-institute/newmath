key = 'manifold'

aliases = ['ManifoldUp']

constructive_story_zh = '本章闭合的流形对象是单点空图卡包: 从 TopologyUp 表面给出的空历史承载 C_emp 出发, 给它一个唯一图卡索引, 把图卡域读作 top open 行, 并把坐标与转移账本做成 RealUp 和 RealAnalyticUp 已认证的常值行. 只有这一个单点 atlas 包被承载接受, 两个已承载展示由承载上的受限 hsame 以及图卡域、坐标和转移行的逐分量输运来分类; 非终端 atlas 条目不被接纳. 源谱是被消费的 TopologyUp 承载、常实坐标边界和实解析常转移边界, 模式谱是图卡覆盖、域精确性、转移光滑性、图卡索引穷尽和转移账本穷尽, 账本保留拓扑行、图卡索引、坐标行、自交转移和可见 atlas 来源. 五条命名证书义务由空端点、受限历史分类器的自反/对称/传递, 以及证明承载、域、坐标、转移数据在分类展示替换下保持的 atlas 输运行给出. 一条历史 h 落入 ManifoldUp token p 的签名 GAP, 当源域接受 h 为这个单点 atlas 包, 签名关系把它配对到答案 atlas 和证据账本, token 引入关系把答案命名为 p; 具体说, h 是 p 编码的空图卡端点, 带有唯一域、坐标和自转移行. 终端标准桥把每个 BEDC 已承载端点送到终端光滑流形的唯一点, 再把该点读回为单点空图卡端点, 并保持与反映承载、分类器、图卡域、坐标、转移和账本行. 本章把这一终端 atlas 构造命名为 ManifoldUp; 不引入任意流形、非终端 atlas、宿主等同、宿主商或非终端光滑流形等价.'

