key = 'axisnat'

aliases = ['AxisNatUp']

constructive_story_zh = '零轴自然数从空历史开始, 只允许反复叠加 Ezero: 空历史被接纳, 已接纳的 h 之上叠一个 Ezero 后仍被接纳, 而第一次出现 Eone 头的历史就被排除在承载之外. 分类器是限制在零轴承载上的 HSame, 所以两个已接受历史只有作为 Ezero 脊上的历史相同时才算同一个; 源谱正是零轴历史, 模式谱就是从空历史用 Ezero 闭生成出来的形状. 账本保存每个可见 AxisNatUp 类背后的原始零轴历史, 同时保留它与 NatUp 所用 Eone 脊在内核上不同这一事实. 五条命名证书义务就是同一批闭生成事实的证书形式: 空历史给出承载非空, 受限 HSame 自反、对称、传递, 已接纳零轴历史沿 HSame 输运后仍被接纳. 一条历史 h 落入 AxisNatUp token p 的签名 GAP, 当源域接受 h 为零轴历史, 签名关系把它配对到一条答案历史和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 是有限个 Ezero 标记的堆叠, 其零轴深度匹配 p 编码的脊. 这里唯一提到的桥是否定性的: 与 NatUp 的任何比较都必须经过单独桥接, 因为两条脊在内部只在空历史处相交. 本章把这一零轴计数构造命名为 AxisNatUp; 不引入算术归纳、递归原则、RealUp 完备化、无限极限对象或空历史与 Ezero 叠加之外的新原件.'

[en]
label = 'AxisNat'
desc = 'Unary natural-number seed on the e0-spine; conservative parallel to NatUp.'

[zh]
label = '零轴自然数'
desc = 'e0-自旋上的一元自然数 seed; NatUp 的保守平行接口.'
