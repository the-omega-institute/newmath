key = 'linearmap'

aliases = ['LinearMapUp']

constructive_story_zh = '单点向量空间之间的线性映射由唯一能起作用的码表示: 空码, 它在每个已接纳输入向量上的求值都回到空端点. 两个映射码按逐点方式分类, 即每个已接纳输入上的求值结果都必须被余域分类器识别; 在单点求值器上, 这就塌缩为空历史处的历史相等. 源是单点码谓词, 模式记录零映射与恒等都是空码、空码复合仍是空码、求值总落在单点里, 以及核平凡判据因为只有一个承载向量而成立; 账本把每个可见码与原始码对齐. 既然逐点余域分类是等价关系, 求值器又从不离开单点, 空码给了承载见证, 分类器自反、对称、传递, 并且被识别的码仍被接纳. 一个码 c 落入 LinearMapUp token p 的签名 GAP, 当源域接受 c, 签名关系把 c 配对到一个答案码与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, c 是空码, p 是单点线性映射 token. 终态单点桥、公开空码精确性行、单点求值器读回以及模线性映射例子, 都是同一张空码表的读法. 本章把这一单点公开码包命名为 LinearMapUp; 不需要函数外延性, 因为每次求值都到同一个端点, 不引入秩-零度、对偶空间、矩阵、有界算子或非单点函数空间.'

[en]
