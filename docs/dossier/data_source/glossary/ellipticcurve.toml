key = 'ellipticcurve'

aliases = ['EllipticCurveUp']

constructive_story_zh = '椭圆曲线被生成成一个 BHist 包, 包含 FieldUp 源行、同一域上的 ProjectiveVarUp 源行、五个域系数行、齐次三次式与入射行、光滑亏格一边界行、选定基点行、两个源的分类器运输, 以及 Pkg 来源. 承载只接纳带有这些系数、三次式、光滑性、亏格一、基点、域、射影、延拓和来源行的包; 环境曲线对象、宿主判别式谓词、外部点集、群律、Weierstrass 标准桥和曲线模型之间的相等都被排除. 两个已接纳包同一, 当继承的域分类器运输系数与标量运算行, 继承的射影分类器运输三次式、入射、光滑性、亏格一和基点行, 并且逐分量 hsame 加 Cont 让每一行仍被接纳. 源谱就是这个域-射影承载包, 模式谱记录域源义务、射影亏格一义务、基点稳定性、分类器运输、光滑射影验证和域依赖账本, 账本保留原始系数行、三次式行、基点、源分类器和来源. 五条命名证书义务成立, 因为一个已接纳包给出承载见证, 继承的域与射影分类器给出自反对称传递, 分类器运输定理又把每个被运输的系数、入射和基点行重新打包成已接纳包. 一条历史 h 落入 EllipticCurveUp token p 的签名 GAP, 当源域接受这个包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 展开后, h 的域行、射影行、Weierstrass 系数、三次入射、光滑亏格一行和基点就是 p 编码的行. 本章把这种带基点的光滑射影亏格一包命名为 EllipticCurveUp; 它不引入椭圆曲线群运算、外部 Weierstrass 桥或独立曲线相等原件.'

