key = 'completemetric'

aliases = ['CompleteMetricUp']

constructive_story_zh = '一个完备度量见证建在已认证 MetricSpaceUp 承载之上: 它展示一条正则 StreamNameUp Cauchy 流、一个模量历史、一个已承载极限历史, 以及对每个正 RatUp 容差给出的阈值、后期观测距离和有界账本. 承载只接受观测始终留在度量承载中、并且后期观测到所提极限有可见 MetricDistanceWitness 且低于所请求容差的包; 没有流模量、已承载极限、阈值行、距离行或有理比较的包不在表面内. 分类器逐分量通过 hsame 和 RatUp 分类器输运流观测、模量、极限、阈值、距离和有理比较, 因而两个见证只有在展示的收敛账本能逐字段重新打包时才被识别. 源是带流观测的度量承载, 模式是显式 Cauchy 收敛到命名极限, 账本保留观测行、模量、阈值、后期距离和容差预算, 而不是形成完备化商. 五条命名证书义务由空历史处的单点承载给出居住, 由历史相等与有理比较的等价律给出分类器行, 由极限见证稳定性给出在分类代表替换下的封闭性. 一个包 h 落入 CompleteMetricUp token p 的签名 GAP, 当源域接受它的正则流和极限见证, 签名关系把它配对到答案收敛包和证据账本, token 引入关系把答案命名为 p; 具体地说, p 记录同一条流、模量、极限和后期距离界. 标准桥把这份有限账本读成 Bishop 风格的完备度量收敛数据并读回, 不加入选择、宿主完备化、商相等、紧致性或 Banach 结构; 本章把构造命名为 CompleteMetricUp.'

