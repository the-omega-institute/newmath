key = 'representationring'

aliases = ['RepresentationRingUp']

constructive_story_zh = '表示环被生成成有限包 K=(G,R,V,S,T,P,rho,lambda): G 行消费 GroupUp, R 行消费 RingUp, V 行列出表示端点, S 与 T 账本分别显示直和与张量积面. 承载恰好接纳被消费的群和环包、有限表示端点表、运算账本、来源包、Grothendieck 分类器行和有限 Cont 账本; 宿主表示范畴、模范畴、特征标表、诱导或限制函子以及环境 Grothendieck 商对象都不在内. 两个包同一, 当每个显示分量由 hsame 运输, 延拓账本逐项比较, 所以 Grothendieck 相等是直和行之间的有限账本平衡, 不是外部商. 源谱是依赖行与表示端点组成的包, 模式谱记录直和与张量账本覆盖、分类器精确性、消费者边界和有限源穷尽, 账本保留运算端点、来源、分类器行和延拓条目. 五条命名证书义务由自反包分类器给出非空性和自反性, 由逐分量反转给出对称, 由逐分量复合给出传递, 并由直和与张量账本稳定性给出分类器运输下的承载封闭. 一条历史 h 落入 RepresentationRingUp token p 的签名 GAP, 当源域接受这个有限包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 具体地说, h 被消费的群和环行、表示端点、运算账本、Grothendieck 平衡行和来源就是 p 编码的包. 本章把这种有限 Grothendieck 账本构造命名为 RepresentationRingUp; 它输出诱导表示消费者所需行, 但不加入特征标理论、诱导-限制演算、标准桥或宿主表示环原件.'

