key = 'lambdacalc'

aliases = ['LambdaCalcUp']

constructive_story_zh = '一个 λ 演算项由可见 TreeUp 语法脊生成, 根标签只能是变量、抽象或应用之一, NatUp 一元历史命名变量索引、绑定索引和自由变量行, Cont 账本记录替换、alpha 与 beta 路线. 承载只接纳那些构造子标签、载荷行、子树、替换输出、alpha 账本、beta-redex 行和来源都被展示出来的 BHist 包; 宿主语法树、未记录变量集、alpha 商或 beta 商都不进入承载. 两个已接纳根包只通过 TreeUp 根、NatUp 索引、替换延拓、beta 行、alpha 行、端点 hsame 比较和 Pkg 来源逐分量输运来分类, 而不是通过环境语法转换. 源谱是 TreeUp/NatUp 构造子表面, 模式谱记录变量、抽象、应用封闭, 构造子互斥, 替换来源覆盖, 捕获避免延拓封闭, alpha-beta 确定性和根 beta 账本精确性, 账本把构造子分支和每条递归延拓路线保持可见. 在这个 seed 边界上, 五条命名证书义务尚未导出为完整公开证书, 但机制已经摆出: 展示构造子包给出承载居住, hsame 给出自反、对称、传递端点移动, 保构造子的 Cont 输运让被分类的项仍在同一可见语法脊内. 一个包 h 落入 LambdaCalcUp token p 的签名 GAP, 当源域接受其构造子和账本行, 签名关系把它配对到答案项包和证据账本, token 引入关系把答案命名为 p; 展开后, 根标签、NatUp 索引、替换路线、alpha 行、beta-redex 行和来源正是 p 编码的行. 本章把这一根边界构造命名为 LambdaCalcUp; 它只暴露 BEDC 语法和归约账本, 不引入宿主 λ 语法相等、alpha 商、beta 商或完整标准桥.'

[en]
label = 'LambdaCalc'
desc = 'Inductive carrier of λ-terms with β-reduction and α-equivalence.'
wiki = 'https://en.wikipedia.org/wiki/Lambda_calculus'

