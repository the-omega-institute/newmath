key = 'DyadicRatCore'

aliases = ['DyadicRatCoreUp']

constructive_story_zh = '一个二进包通过把带符号 RatUp 尾数放在正一元指数行旁边生成, 展示 2^e的有限分母塔, 并附加 IntUp 与 RatUp 源的 Pkg 来源. 分类器通过把两个包提升到展示的公共一元指数, 并读取缩放尾数之间的 RatUp 分类器行来比较二者. 距离与绝对值观测是在同一批展示行上的有限公共指数窗口. 该表面记录 StreamNameUp、RegSeqRat 与 RealUp 所需的二进源, 不形成商等式, 不导入宿主有理数, 也不声称实数完备性.'

[en]
label = 'DyadicRatCore'
desc = 'Dyadic rational core; explicit binary fractions used in real construction.'

[zh]
label = '二进有理核'
desc = '二进有理核; 实数构造中使用的显式二进分数.'
