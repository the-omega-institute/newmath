key = 'quadrature'

aliases = ['QuadratureUp']

constructive_story_zh = '一个求积规则由有限 FinSetUp 节点脊、每个节点与权重的标量端点、固定紧区间上 IntegralUp 给出的多项式端点映射, 以及一个一元 NatUp 次数界生成. 只有这个有限加权四元组连同有限列表多项式代码、Horner 求值、trim、标量加乘和展示的 exactness 谓词在场时, 行才被接纳; 宿主节点排序、解析函数、收敛数据、数值近似和宿主实数相等都不是承载字段. exactness degree 的分类器是一元预序 DegBoundLe, 表示一个界之上的每个系数索引也在另一个界之上, 它通过缩小多项式窗口输运精确性, 而不是从外部比较实值函数. 源覆盖节点脊、标量节点与权重端点、积分端点映射、多项式代码和次数界; 模式记录有限加权和、多项式次数窗口、逐点精确性、弱化、等价稳定性和预序行; 账本让节点、权重、Horner 行、trim 行、积分来源和标量端点比较保持可见. 五条命名证书义务由有居住的有限规则表面和自反、传递的次数界比较给出, 承载封闭则来自复用同一有限四元组并通过展示的标量分类器输运精确性. 一条历史 h 落入 QuadratureUp token p 的签名 GAP, 当源域接受有限规则和次数界行, 签名关系把它配对到答案规则和证据账本, token 引入关系把答案命名为 p; 展开后, 加权和恰好在 p 编码的一元次数窗口内的多项式代码上精确. 本章把这一有限加权 exactness 构造命名为 QuadratureUp; 它给出 scoped 数值分析证书, 不声称收敛、解析误差估计、宿主函数相等、宿主实数相等或标准桥.'

