key = 'hypothesis'

aliases = ['HypothesisTestUp', 'hypothesistest']

constructive_story_zh = '一个 HypothesisTestUp 标记命名一个有限决策承载, 配 null 与 alternative DistributionUp 输入、被消费的 ProbSpaceUp 事件行、展示的统计量-阈值比较, 以及两份可见的有限误差额度账本. 分类器是决策历史上的 hsame, 输运把统计量、阈值、决策行与误差账本通过该历史比较重新打包, 源仅覆盖展示的分布、事件、阈值与有限额度行. 一条历史 h 落入 HypothesisTestUp 标记 p 的签名缺口, 当有限承载接纳 h, 签名关系把它配对到决策判决与误差额度行, 标记引入把该有限判决命名为 p.'

[en]
label = 'HypothesisTest'
desc = 'Decision procedure between null and alternative; Type I and Type II error bounds.'
wiki = 'https://en.wikipedia.org/wiki/Statistical_hypothesis_testing'

