key = 'poset'

aliases = ['POSetUp']

constructive_story_zh = '这里的偏序就是一元前缀预序再加一条可见行: 如果两条已承载的一元历史互相延拓到对方, 两个延拓尾部都必须塌缩, 两个端点由 hsame 分类为同一个. 承载仍是一元历史谓词, 排除所有 b0 分支, 只接受空历史和反复叠 b1 的栈, 分类器也仍是从 PreorderUp 继承来的带承载 hsame 关系. 源覆盖已认证的前缀预序承载加反对称字段, 模式记录双向前缀比较再塌缩为分类器, 账本保存两个方向的延拓见证、两个已承载端点以及读回得到的 hsame. 既然继承的一元承载由空历史居住, 分类器是等价关系, 并且沿 hsame 的承载输运已经存在, 加上反对称行后五条命名证书义务仍然保持并闭合偏序律. 一条历史 h 落入 PosetUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案端点和证据账本, token 引入关系把那条答案命名为 p; 具体说, h 是前缀承载中的一元端点, 账本中每次相反方向比较都塌缩成 p 编码的分类器证据. 有限链行和下游交接行把同一份延拓账本交给 TotalOrderUp 与 LatticeUp 使用, 但不改变承载, 也不加入标准桥. 本章把这一反对称一元前缀包命名为 PosetUp; 偏序只是在既有前缀关系上增加一个塌缩定理, 不是宿主相等、商代表或外部偏序对象.'

[en]
label = 'POSet'
desc = 'Partial order: preorder + antisymmetry.'
wiki = 'https://en.wikipedia.org/wiki/Partially_ordered_set'

[zh]
label = '偏序'
desc = '偏序: 预序 + 反对称.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%81%8F%E5%BA%8F%E5%85%B3%E7%B3%BB'
