key = 'adjointrep'

aliases = ['AdjointRepUp']

constructive_story_zh = '伴随表示行只能在 LieGroupUp 与 LieAlgebraUp 两个来源固定之后生成: 群侧给出承载、乘法、逆元与共轭行, 代数侧给出括号承载、分类器与伴随端映射包. 一个 Ad 端点被接纳, 是因为共轭把已承载群历史与已承载代数历史送到 BHist 作用端点; 一个 ad 端点被接纳, 是因为它正是 LieAlgebraUp 包中由括号生成的伴随端映射. 两个已接纳行相同, 是把群输入、代数输入、作用端点、微分端点与自同构目标都沿两个来源分类器、hsame 和可见 Cont 账本输运过去. 源覆盖的正是这两个依赖表面, 模式记录共轭承载、微分作用、自同构目标与分类器稳定性, 账本让群、代数、作用、微分、逆元、复合和来源见证保持对齐. 五条命名证书义务由两个依赖和稳定性行继承: 已接纳来源行给出承载, 分类器自反、对称、传递逐分量成立, 输运后的端点仍在展示的作用包与端映射包中. 一条历史 h 落入 AdjointRepUp token p 的签名 GAP, 当源域接受它的依赖与作用包, 签名关系把它配对到答案表示行与证据账本, token 引入关系把答案命名为 p; 展开后, h 携带的 Ad、ad、自同构目标和分类器稳定性行就是 p 编码的数据. 本章把这一依赖驱动的共轭与微分构造命名为 AdjointRepUp; 不假定 Lie 积分唯一性, 也不越过展示出的伴随行闭合边界.'

