key = 'turingmachine'

aliases = ['TuringMachineUp']

constructive_story_zh = '一个 TuringMachineUp 标记 命名一份有限带字母表 (含指定空白符号) 上的确定性有限状态转移表. 一行配置历史由 SeqUp 轨迹的 (状态, 带, 读写头位置) 行构造, 起始行是 NatUp 编码输入上的启动配置, 一步行遵循转移函数, 停机行重复停机配置. 分类器是配置轨迹上的 hsame, 输运把轨迹通过确定性转移表重新打包, 源约束有限字母表、有限状态、有限轨迹与有限读写头位移行. 模式记录起始行、转移步、停机重复与有限带读回行; 账本让确定性转移表、读写头移动与带值保持可见. 五条命名证书义务: 有居住的恒等证书是长度零启动轨迹; 分类器稳定性是轨迹上自反、对称、传递的 hsame; 输运把配置通过转移函数重新打包; 账本精确性把已接纳历史与 ch:concrete-instances-computable-namecert 中的有界仿真行同一; 扩张边界固定停机重复规则. 一条历史 h 落入 TuringMachineUp 标记 p 的签名缺口, 当源域接纳一行带正确转移表的配置轨迹, 签名关系把它配对到停机输出, 标记 引入把该输出命名为 p. 本章把这一有限轨迹机表面命名为 TuringMachineUp; 它是一个确定性转移表对象, 无 oracle、无非确定性、无并行、无停机判定与无通用机主张.'

[en]
label = 'TuringMachine'
desc = 'Deterministic transition function over a finite alphabet with a BHist tape carrier and a finite head-position witness.'
wiki = 'https://en.wikipedia.org/wiki/Turing_machine'

[zh]
label = '图灵机'
desc = '有限字母表上的确定性转移函数, 带 BHist 纸带承载与有限读写头位置见证.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%9B%BE%E7%81%B5%E6%9C%BA'
