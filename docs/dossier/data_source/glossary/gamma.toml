key = 'gamma'

aliases = ['GammaUp']

constructive_story_zh = 'Gamma 输入先是一条 ComplexUp 历史, 并且带有远离负整数极点轨迹的构造性分离见证: 被排除的历史正是那些能由一元见证展示为非正整数极点的历史, 被接纳的历史则保留让它远离该轨迹的精度数据. 值承载随后由这个输入上的一元索引 Weierstrass 部分积生成, 正整数点带有阶乘行, 再由 ComplexLimitUp 见证把正则部分积列送到一个目标复历史; 分类器是继承的 ComplexClassifier 下的极限唯一性, 不是外部亚纯函数相等. 源覆盖带分离数据的 Gamma 定义域历史; 模式记录极点输运、阶乘读回、Weierstrass 因子、显式 Cauchy 模量、全纯极限读回和递推边界行; 账本保存分离精度 k0、一元模量 N(k)、部分积族和阶乘表. 展示的定义域 core 给出非空性, 复极限与复历史分类器给出自反、对称、传递, 极点排除、部分积和极限证书沿 hsame 输运给出承载封闭. 一条历史 h 落入 GammaUp token p 的签名 GAP, 当源域接受它的 Gamma 定义域见证, 签名关系把 Weierstrass 极限包配对到一个答案复历史与证据账本, token 引入关系把那条答案命名为 p; 展开后, h 是非极点复输入, 答案是 token 的部分积证书编码的复极限. 本章把这一 Weierstrass 乘积构造命名为 GammaUp; 不引入原始 Gamma 函数、亚纯延拓定理、反射公式等式或外部 Euler/Bohr-Mollerup 桥.'

