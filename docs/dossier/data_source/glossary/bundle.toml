key = 'bundle'

aliases = ['BundleUp']

constructive_story_zh = '一个 bundle 被构造成可见的局部平凡化包: 来自 ManifoldUp 的 base 与 total manifold 行、一条 projection 历史、一条 fibre-model 历史、有限 ProbeBundle 平凡化见证、重叠上的 transition 历史, 以及一条源账本. 承载只接受这些 BundleLocalTrivPkg 包, 没有第二个分支; base 与 total 行由保留下来的 manifold 分类器比较, projection、fibre、trivialization、transition 与 ledger 行则逐分量用 hsame 比较. 源是 manifold 证书加展示的 bundle 历史, 模式记录 projection compatibility、有限 trivialization scope、transition congruence 和 cocycle-style ledger closure, 以及 visible exactness, 账本把每个 carrier、projection、trivialization、fibre 和 transition 的源条目与其输运后的行对齐. scoped 命名证书义务从这些投影读出: 一个已接受包占据承载, 保留的 manifold 分类器和逐分量 hsame 给出自反、对称、传递, carrier transport 加 ledger descent 保证分类替换后包仍被接纳. 一条历史 h 落入 BundleUp token p 的签名 GAP, 当源域接受 h 为这个局部平凡化包, 签名关系把它配对到答案包和证据账本, token 引入关系把该答案命名为 p; 展开后, projection、有限 probes、transitions 与源账本正是 p 编码的那些行. 这里没有标准桥行, 所以不导出普通 bundle equivalence. 本章把这一局部平凡化包命名为 BundleUp; bundle 结构是 ManifoldUp 之上的有限 BEDC 历史账本, 不引入宿主 bundle 对象、tangent-bundle 原件或外部 transition-function 库.'

[en]
label = 'Bundle'
desc = 'Fiber bundle: total space + base + projection + local trivializations.'
wiki = 'https://en.wikipedia.org/wiki/Fiber_bundle'

