key = 'dynsystem'

aliases = ['DynSystemUp']

constructive_story_zh = '一个动力系统行先消费已经认证的 ManifoldUp 相空间包和 OdeUp 局部流包, 再把相位行、经过时间、源状态、目标状态、端点行、ODE 依赖见证、来源和有限 Cont 路线放进同一个 BHist 元组. 承载只接纳那些相位与点行被流形证书接受、局部流来源被 ODE 证书接受、并且端点确实由展示路线到达的元组; 缺少任一依赖表面、端点路线或共享来源的元组都在外面. 两个已接纳流包相同, 是相位、时间、源、目标、ODE 见证、端点和来源逐分量由继承的 hsame 与同一条可见延拓账本输运, 而不是外部轨道或映射相等. 源谱是展示的流形加 ODE 流表面, 模式谱记录零时间恒等、分段复合、邻接、端点精确性以及相位与生成元分离, 账本把每个公开坐标同生成它的原始路线对齐. 五条命名证书义务从这个有限包继承: 一个已接纳流给出承载居住, 逐分量 hsame 给出自反、对称、传递, 分类器输运又把被输运的相位和 ODE 行重包成已接纳流. 一个包 h 落入 DynSystemUp token p 的签名 GAP, 当源域接受展示的相位/ODE 元组, 签名关系把它配对到答案流包和证据账本, token 引入关系把答案命名为 p; 展开后, 相空间、经过时间、端点、ODE 来源和延拓路线正是 p 编码的那些行. 本章把这一带路线的流构造命名为 DynSystemUp; 流律是已有流形与 ODE 证书上的拼接与单位行, 不引入全局存在定理、不变量测度对象、遍历包或独立轨道承载.'

[en]
