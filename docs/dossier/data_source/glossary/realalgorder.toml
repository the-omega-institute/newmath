key = 'realalgorder'

aliases = ['RealAlgOrderUp']

constructive_story_zh = '一个常值有理实数是取一条 RatUp 分母历史 d, 再在它外面放一个 b1 边界; 因而被接纳的实数历史正是来自有理嵌入的 Eone(d). 两条这样的实数历史命名同一个常值有理, 当底层分母已经被有理分类器识别; 实数层不再加第二套比较. 源是常值有理谓词, 模式记录 b1 嵌入形以及加、乘、序、远离这些行, 账本把可见实数端点系回它来自的有理见证. 因为有理分类器是等价关系, 嵌入在代表元上又是单射, 嵌入后的有理给了承载见证, 输运来的分类器自反、对称、传递, 且被识别的代表仍在常值有理子承载中. 一条实数历史 h 落入 RealAlgOrder token p 的签名 GAP, 当源域接受 h, 签名关系把 h 配对到一个有理见证与一份证据账本, token 引入关系把那个见证命名为 p; 展开后, h 是某个有理 d 的 Eone(d), 且 d 被分类为 p 编码的有理值. 每条代数或序行都先下到有理见证, 应用对应的 RatUp 行, 再把结果嵌回上层, 例如 Eone(d)+Eone(e) 先在有理层算 d+e, 再重新嵌入. 本章把这一经有理输运的构造命名为 RealAlgOrder; 这些行是通过有理嵌入继承来的, 不在这里引入完整非常值实数算术、完备性或标准桥.'

[en]
label = 'RealAlgOrder'
desc = 'Algebraic ordering on the Reals, hsame-transported from the rational classifier.'

[zh]
label = '实代数序'
desc = '实数上的代数序, 由有理分类器经 hsame 输运得到.'
