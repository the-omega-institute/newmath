key = 'graph'

aliases = ['GraphUp']

constructive_story_zh = '这个具体表面上的图以一元历史为顶点, 并把内核延拓行读成有向边: GraphEdge(h, k, g) 表示 h 和 k 都一元, 且展示了 Cont(h, k, g). 一行只有在两个端点都是已承载顶点、延拓结果也在同一个可见三元组中时才被接纳, 而边分类器是在源端、靶端和结果上的逐分量 hsame. 源是带 Cont 行的 BHist 一元顶点承载, 模式记录端点覆盖、行反演、单位环、两步复合和三步重结合, 账本只保存三元组 (h, k, g) 以及两个一元端点见证和延拓见证. 五条命名证书义务由空端点单位行给非空性, 由逐分量 hsame 的自反、对称、传递给分类器律, 由沿分类器输运一元端点和延拓行给承载封闭. 一个边行 e 落入 GraphUp token p 的签名 GAP, 当源域接受其一元端点和延拓三元组, 签名关系把该三元组配对到答案边和证据账本, token 引入关系把答案命名为 p; 展开后, 源端、靶端和结果历史正是 token 编码的逐分量边数据. 公开桥把每个可见三元组读成一条有向图边, 并把导出边的相等读回到同一个逐分量 BEDC 分类器, 但不声称独立标准图 API. 本章把这一延拓边构造命名为 GraphUp; 图结构是一元顶点和 Cont 行的账本, 不引入宿主有限图、连通性包、图同态理论或隐藏邻接对象.'

