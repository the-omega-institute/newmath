key = 'curryhoward'

aliases = ['CurryHowardUp']

constructive_story_zh = 'Curry-Howard 包把 FirstOrderUp 推导账本与 LambdaCalcUp 项、beta-redex 和替换账本并列放置，再用共享的证明-程序、cut 公式或类型、结论类型端点历史把两侧系在一起。承载只接纳共享 cut-beta 包：一阶侧展示可复合推导账本和 cut 消去端点，lambda 侧展示一个抽象作用于参数的应用以及避免捕获替换输出，公共端点和来源由 hsame、有限 Cont 和两个来源证书承载。两个包通过一阶推导分类器、lambda beta/替换分类器和共享端点行来分类，所以这个桥不会把宿主证明树等同于宿主 lambda 项，也不会形成 alpha 类商。源是位于 FirstOrderUp 和 LambdaCalcUp 命名证书之上的展示 cut-beta 包，模式记录 cut-beta 桥义务、来源行分离、端点输运、公开边界、证明-程序确定性、分类器穷尽、端点精确性和证明-程序账本表面，账本保留推导端点、程序端点、替换输出、共享 hsame、Cont 和 Pkg 来源。这个 seed 层级的五条命名证书义务由已接纳共享包表示承载居住，由两个继承分类器给自反、对称、传递，并由端点精确性和分类器穷尽给分类输运下的封闭。一条历史 h 落入 CurryHowardUp token p 的签名 GAP，当源域接纳它的 cut-beta 包，签名关系把它配对到答案包和证据账本，token 引入关系把该答案命名为 p；展开后，h 携带的推导账本、beta/替换行、证明-程序端点和来源正是 p 编码的数据。本章把这一共享 cut-beta 构造命名为 CurryHowardUp；不引入正规化、完整 Curry-Howard 等价、宿主证明相等、宿主 lambda 相等、alpha 商、范畴语义或标准桥数据。'

