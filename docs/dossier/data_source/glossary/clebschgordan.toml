key = 'clebschgordan'

aliases = ['ClebschGordanUp']

constructive_story_zh = '一个耦合包由 LieGroupUp 行、TensorProductUp 行和 RepresentationRingUp 行生成, 随后展示两个不可约来源表示历史、它们的张量端点、有限分解账本、系数历史、输运数据、provenance 和一条延拓路线. 承载只接受形如 (G,T,R,V1,V2,tau,D,Gamma,theta,P,lambda) 的有限包; 表示范畴、Hilbert 空间基约定、宿主分解定理或外部系数表都不在这些行之外. 两个包相同, 当三个已消费证书、两个来源、张量端点、分解项、系数槽、provenance 和有限 Cont 账本都能逐分量 hsame 输运. 源谱是 Lie 群、张量积和表示环边界连同两个不可约来源行, 模式谱是张量积分解为不可约输出及其重数和耦合系数, 账本保留 D、Gamma、theta、P 和 lambda. 五条命名证书义务继承自三个依赖分类器和精确性行: 已接纳包给出承载居住, 分量输运自反、对称、传递, 任意被输运的系数或分解行都重打包进同一个公开耦合账本. 一个包历史 h 落入 ClebschGordanUp token p 的签名 GAP, 当源域接受它的表示耦合表面, 签名关系把它配对到答案耦合包和证据账本, token 引入关系把答案命名为 p; 展开后, 张量端点、求和项账本、重数和系数槽就是 p 编码的数据. 本章把这一有限耦合账本构造命名为 ClebschGordanUp; 不引入完整表示范畴桥或标准 Clebsch-Gordan 系数表.'

[en]
