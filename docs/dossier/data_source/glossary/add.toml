key = 'add'

aliases = ['AddUp']

constructive_story_zh = '加法从两条一元脊按顺序摆在一起开始, 内核延拓给出跟在它们之后的结果脊. 因而被接纳的不是外部算术事实, 而是一行三元组 (h, k, r): 两个输入都被 NatUp 的一元谓词接受, 结果也一元, 且 r 正是 h 接上 k 的那条展示延拓. 两行加法只有在三条历史逐分量相同时才命名同一个步骤; 源侧覆盖的正是有这种延拓结果的一元输入对, 模式侧记录一元延拓仍一元以及内核消去行, 账本则让可见的源-结果三元组和生成它的原始历史保持对齐. 因为历史相等在每个坐标上都是恒等, 平凡的 (空, 空, 空) 行给了承载见证, 分类器也自动自反、对称、传递, 并在承载中封闭. 一个三元组 (h, k, r) 落入 AddUp token p 的签名 GAP, 当源域接受这一行, 签名关系把它配对到一条答案延拓与一份证据账本, token 引入关系把那条答案标识为 p; 展开之后, 这就是说 h 与 k 都一元, Cont(h, k, r) 是内核见证, 且 r 的 b1 深度就是 p 编码的和. 标准一元桥再把同一条延拓读成两个有限一元词的级联, 由词长读回级联长度等于两个输入长度之和. 本章把这一构造命名为 AddUp; 加法是内核延拓在一元三元组上的读法, 单位元与结合律作为 monoid 定理证明, 不是另加的算术原件.'

[en]
