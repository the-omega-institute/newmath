key = 'prod'

aliases = ['ProdUp']

constructive_story_zh = '一个有序对是把两条已经有证书的历史放在同一条可见线上: 先取来自 L 的左见证与来自 R 的右见证, 再让内核延拓把右历史接到左历史上, 组装成 h. 除此之外没有东西进入乘积承载; 两条组装历史算同一个乘积, 恰好在它们回收出的左分量被 L 的分类器识别、右分量被 R 的分类器识别时成立, 因而拼合历史上的相等会被追踪回两个分量视角. 证书的源就是这个乘积历史谓词, 模式记录展示的对形状以及能回收两边的消去行, 账本则把原始延拓见证与可见乘积历史放在同一份记录里. 既然分量分类器是等价关系, 延拓又是确定的, 一个已接纳的分量对给了承载见证, 分量式相同自反、对称、传递, 且它识别到的代表仍留在乘积承载中. 一条历史 h 落入 ProdUp token p 的签名 GAP, 当源域接受这条组装历史, 签名关系把它配对到一条答案历史与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, h 必须分解成两条分量历史的延拓, 且左、右分类器分别把它们识别为 p 编码的分量. 本章把这一并行展示构造命名为 ProdUp; 有序对只是内核延拓关系在两个具名分量上的可见用法, 不引入宿主元组类型或投影公理.'

