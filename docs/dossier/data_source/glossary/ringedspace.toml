key = 'ringedspace'

aliases = ['RingedSpaceUp']

constructive_story_zh = '环化空间从 BHist 上的 TopologyUp 承载开始, 在它的显示开集上放置 SheafUp 的截面行, 每个纤维再通过 CommRingUp 读出交换环结构, 最后在显示点处通过层的芽比较读到局部环行. 承载只接纳带有开集成员行、截面行、限制路线、交换环运算组、芽来源和局部茎见证的包; 宿主开集相等、茎商、谱行以及 SchemeUp 数据都不在承载内. 两个已接纳包同一, 当 hsame 移动底层历史, 并且拓扑、层、交换环、茎局部性的上游分类器把开集、截面、限制、运算和芽一起运过去. 源谱就是这个拓扑-层-环-茎包, 模式谱记录开集成员、限制相容、纤维运算和局部芽行为, 账本则按构造顺序保留原始开集见证、截面端点、限制路线和茎来源. 五条命名证书义务来自单点表面的接纳包、各分量分类器的自反对称传递, 以及同一组 hsame 与上游分类器把已接纳行运回承载的事实. 一条历史 h 落入 RingedSpaceUp token p 的签名 GAP, 当源域接受整个包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 在本章展开后, h 的拓扑、层、纤维环和局部茎行正是 p 命名的那些被运输行. 本章把这种逐行茎构造命名为 RingedSpaceUp; 它给 SchemeUp 输出所需表面, 但不加入谱桥、宿主茎商或独立局部环化空间原件.'

[en]
label = 'RingedSpace'
desc = 'Topological space with a sheaf of commutative rings; stalks form local rings.'
wiki = 'https://en.wikipedia.org/wiki/Ringed_space'

