key = 'modeltheory'

aliases = ['ModelTheoryUp']

constructive_story_zh = '一个 ModelTheoryUp 包由 FirstOrderUp signature-and-formula 行、展示 structure 行、valuation observations、satisfaction faces、elementary-equivalence 与 elementary-substructure faces、package provenance, 以及 continuation/history-equality transport ledger 生成. 承载只接受公式和 substitution 通过 first-order 来源读取, valuation、satisfaction 与 elementary 行展示在同一个有限 BHist tuple 中的包; host satisfaction relation、ambient model equality 和外部 structure comparison 都不被接纳. 两个包逐行分类: formula 与 substitution 读取通过 FirstOrderUp, assignments 通过 valuation 行, truth records 通过 satisfaction 账本, elementary faces 通过 elementary 行, provenance 通过同一个 Cont 账本. 源是 first-order 证书表面, 模式记录 structure、valuation、satisfaction exactness、elementary readback 和 consumer handoff, 账本保留 first-order 行、assignment endpoints、truth faces、elementary faces、Pkg provenance 和 continuation comparisons. 五条命名证书义务由已接纳 structure 包给出承载居住, 由逐行历史分类器给出自反、对称、传递, 由 carrier-classifier stability 把 satisfaction exactness 与 elementary ledgers 输运到重新打包的目标包. 一个包 h 落入 ModelTheoryUp token p 的签名 GAP, 当源域接受它的 first-order、structure、valuation、satisfaction 和 elementary 行, 签名关系把该包配对到答案包和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录的正是这些展示 truth faces 和 elementary-readback faces. 本章把这一有限 satisfaction-and-elementary 账本命名为 ModelTheoryUp; 不引入 completeness、compactness、Lowenheim-Skolem、host model equality 或标准桥.'

[en]
