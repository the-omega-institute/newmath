key = 'modn'

aliases = ['ModNUp']

constructive_story_zh = '这里的模 N 剩余类由一条一元模数历史 m 加上 RingUp 的单点端点展示出来: 一条历史只有在 m 一元且自身位于单点环承载中时才被接纳, 因而所有非单点环数据和非一元模数都留在这个具体承载之外. 分类器保留两个端点的承载见证, 然后使用单点环分类器, 这让 BEDC 范围能表达 quotient-ring 下降行, 但不形成宿主商集, 也不通过外部同余改换代表. 源就是具体的 ModNCarrier_m; 模式记录复制到理想 nZ 的 quotient-ring 展示以及单点加法、负元、乘法闭合; 账本保留展示的模数见证、端点承载字段和运算下降行. 五条命名证书义务正是已检查的分类器行: 单点端点给出非空性, 自反、对称、传递来自单点分类器, 承载输运已经存放在 ModNClassifier_m 的两个端点字段中. 一条历史 h 落入 ModNUp token p 的签名 GAP, 当源域接受一元模数和单点端点, 签名关系把该端点配对到一个答案端点与运算账本, token 引入关系把那条答案命名为 p; 展开后, h 是 p 编码的模数范围中的单点代表. 本章把这一展示的一元模数商范围命名为 ModNUp; 不引入标准桥、完整整数模运算, 也不引入超过已检查 BHist 商证书之外的商原件.'

[en]
