key = 'solvableradicals'

aliases = ['SolvableRadicalsUp']

constructive_story_zh = '一个 SolvableRadicalsUp 标记 命名一个有限塔深度 r、一份 SeqUp-typed 中间域行序列 K_0,...,K_r、一份根指标序列 n_0,...,n_{r-1}, 以及一份 radicand 见证序列 α_i ∈ K_{i+1}, 满足 α_i^{n_i} ∈ K_i. 承载接纳 K_0 上一个可分多项式 P, 当每一步 K_{i+1} = K_i(α_i) 在 NameCert_{FieldExtUp} 的意义下确实是根式扩张, 并且 P 在 K_r 中分裂. 分类器是塔深度与中间域行上的 hsame; 源覆盖域承载、根指标、radicand 见证、分裂见证与塔深度行; 模式记录根式步可纳入、分裂可纳入、塔深度可纳入、单位根可用与中间域稳定性行; 账本让深度 r、根指标、radicand 见证与分裂判决保持可见. 五条命名证书义务由 FieldExtUp 塔加 GaloisGroupUp 可解性供给: 有居住的恒等证书是平凡 r=0 塔; 分类器稳定性是固定深度塔上自反、对称、传递的 hsame; 输运把根式扩张通过域同构输运重新打包; 账本精确性把已接纳多项式与其在 K_r 中的分裂同一; 扩张边界固定根式步规则. 一条历史 h 落入 SolvableRadicalsUp 标记 p 的签名缺口, 当源域接纳根式塔分裂见证, 签名关系把它配对到分裂判决, 标记 引入把该判决命名为 p. 本章把这一根式塔表面命名为 SolvableRadicalsUp; 它是一个有限塔多项式分裂对象, 不主张 Galois 对应, 不给一般可解群标识, 不用超越方法, 也不通往标准根式闭包桥.'

[en]
label = 'SolvableRadicals'
desc = 'Tower of radical extensions K = K_0 ⊆ K_1 ⊆ ... ⊆ K_r where each step adjoins an n-th root of an element of the previous field.'
wiki = 'https://en.wikipedia.org/wiki/Solvable_group'

[zh]
label = '根式可解扩张'
desc = '根式扩张塔 K = K_0 ⊆ K_1 ⊆ ... ⊆ K_r, 每一步通过添加前一域中元素的 n 次根扩张得到.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%8F%AF%E8%A7%A3%E7%BE%A4'
