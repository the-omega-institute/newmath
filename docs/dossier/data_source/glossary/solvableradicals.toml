[en]
label = 'SolvableRadicals'
desc = 'Tower of radical extensions K = K_0 ⊆ K_1 ⊆ ... ⊆ K_r where each step adjoins an n-th root of an element of the previous field.'

[zh]
label = '根式可解扩张'
desc = '根式扩张塔 K = K_0 ⊆ K_1 ⊆ ... ⊆ K_r, 每一步通过添加前一域中元素的 n 次根扩张得到.'
