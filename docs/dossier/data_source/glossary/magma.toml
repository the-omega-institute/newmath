key = 'magma'

aliases = ['MagmaUp']

constructive_story_zh = 'MagmaUp 这一层把一元历史脊拿来暴露一个二元运算: 两条已接纳历史 h 和 k 由内核 append 顺次接上, 等价地由 Cont(h, k, append(h, k)) 这行可见延拓见证给出, 只接受从空历史反复叠 b1 生成的历史, 任何 b0 分支都留在承载之外. 两个已承载乘积由带承载的关系 R_U 分类: 两个端点都必须仍是一元历史, 底层历史还要 hsame, 所以这个运算不是宿主二元表, 也没有隐藏代表的商层. 源、模式和账本都回到同一个一元谓词; 模式再记录二元 append 形状、封闭性、同余性、可见输入非空读回和精确端点条件, 账本保留生成每个可见乘积的原始延拓. 五条命名证书义务来自空历史居住一元承载, 来自历史相等的自反、对称、传递, 也来自一个 R_U(h, k) 见证已经存着让已识别端点留在一元表面的承载行. 一条历史 h 落入 MagmaUp token p 的签名 GAP, 当源域接受展示的一元输入或乘积, 签名关系把它配对到答案历史和证据账本, token 引入关系把该答案命名为 p; 展开后, 答案正是由 R_U 分类的一元 append 端点及其延拓来源. 纸面桥把同一个对象读成供 SemigroupUp 和 MonoidUp 消费的自由一元 append magma, 但读回只是展示的 append 表面, 不是任意宿主 magma. 本章把这一一元 append 二元运算命名为 MagmaUp; 不引入结合律、单位元、逆元、商 magma 或独立代数承载.'

[en]
label = 'Magma'
desc = 'Magma: a set with a binary operation, no further laws.'
wiki = 'https://en.wikipedia.org/wiki/Magma_%28algebra%29'

