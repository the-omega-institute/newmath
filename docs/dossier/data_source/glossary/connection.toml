key = 'connection'

aliases = ['ConnectionUp']

constructive_story_zh = '联络包从已经认证的 BundleUp 与 ManifoldUp 行开始, 再展示一个基点、该点上的纤维、纤维中的截面端点、切向方向行, 以及由有限 Cont 来源接回这些输入的协变导数端点. 只有这些来源行都能通过两个依赖证书看见时, 包才进入承载; 两个包相同, 是基点、纤维、截面、切向、依赖来源和导数端点逐分量由继承分类器与 hsame 比较. 源覆盖的正是这些导数包, 模式记录截面线性、有限平行移动链和 CurvatureUp 可消费的交换子边界, 账本保存基点、纤维、截面、切向、导数、Pkg 来源和有限延拓行. 五条命名证书义务逐分量成立: 展示出的包给承载见证, hsame、BundleUp 与 ManifoldUp 给自反、对称、传递, 分类器输运每个已接纳字段而不产生宿主联络算子. 一条历史 h 落入 ConnectionUp token p 的签名 GAP, 当源域接受 h 的这样一个包, 签名关系把它配对到答案导数包和证据账本, token 引入关系把答案命名为 p; 展开后, h 展示的基点、纤维、截面、切向、导数和来源行就是 p 编码的内容. 展示义务还说明截面线性、平行移动和曲率边界怎样从有限账本读出, 但不导出坐标语义或标准桥. 本章把这一展示导数包构造命名为 ConnectionUp; 不加入 Leibniz 定理、宿主协变导数或独立图册级联络原件.'

[en]
label = 'Connection'
desc = 'Covariant derivative on a fibre bundle; Leibniz rule against scalars.'
wiki = 'https://en.wikipedia.org/wiki/Connection_%28mathematics%29'

