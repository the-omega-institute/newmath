key = 'category'

aliases = ['CategoryUp']

constructive_story_zh = '范畴从一元历史脊开始: 对象正是被 UnaryHistory 接受的历史, 从对象 a 到对象 b 的态射是一条可见一元尾部 f, 再带上一行 ContR(a, f, b). 对象之间、以及固定端点上的态射历史之间, 都由 hsame 分类, 所以复合只是把两条可见尾部接起来, 再用延拓结合律和端点输运比较两种账本. 源、模式和账本都是同一批 hom-carrier 与延拓谓词: 空尾部给单位, 可复合对给延拓链, 源端和靶端的移动全由端点 hsame 输运记录. 五条命名证书义务由一元空对象和空单位尾部给出非空性, 由 hsame 的自反、对称、传递给出分类器律, 由 hom-carrier 输运保证分类后仍在承载中. 一条态射历史 h 落入 CategoryUp token p 的签名 GAP, 当源域接受相关一元端点, 签名关系把展示的 hom 或复合结果配对到答案历史和证据账本, token 引入关系把答案命名为 p; 展开后, h 就是 token 编码的延拓态射或复合结果的可见尾部. 标准桥只通过一元对象、CategoryHomCarrier 箭头、以及分类器兼容的单位、复合、结合律和单位律行把它读成普通宿主范畴, 再读回同一批历史. 本章把这一一元延拓构造命名为 CategoryUp; 范畴结构就是已有延拓演算, 不引入全局范畴宇宙、宿主相等、极限、伴随或外部态射类型.'

[en]
label = 'Category'
desc = 'Category as Hist of objects + Cont as Hom.'
wiki = 'https://en.wikipedia.org/wiki/Category_%28mathematics%29'

