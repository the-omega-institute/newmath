key = 'prime'

aliases = ['PrimeUp']

constructive_story_zh = '一个素数候选先是一条越过第一个后继的一元脊: 它一元, b1 深度至少为二, 并且每个由延拓 Cont(d, q, h) 展示出来的一元因子 d 都被迫退回到单位脊 Eone(空) 或 h 自身. 因而整除性不是 oracle, 而是一条展示出来的一元延拓分解; 已接纳候选上的分类器就是素数脊的历史相等. 源是同一个一元素数谓词, 模式记录一元形、排除单位以及所有整除测试只用一元延拓, 账本让可见素数历史与被测试的原始脊保持一致. 既然历史相等在历史上是恒等, 素性条件又在恒等下保持, 一个已接纳素数给了承载见证, 分类器自反、对称、传递, 并在已接纳候选中封闭. 一条一元历史 h 落入 PrimeUp token p 的签名 GAP, 当源域接受 h, 签名关系把 h 配对到一条答案历史与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, h 一元、深度至少为二、每个一元因子都塌回单位或 h, 且 h 的 b1 深度匹配 p 编码的素数. 无限性行沿用这里的 Euclid 动作: 从任意有限素数表出发, 检查乘积加一那条脊的因子, 得到另一个素数. 本章把这一因子检验构造命名为 PrimeUp; 素性是一元延拓上的有限条件, 不引入素数 oracle、商类或额外算术原件.'

[en]
label = 'Prime'
desc = "Primality predicate; Euclid's infinitude; FTA."
wiki = 'https://en.wikipedia.org/wiki/Prime_number'

