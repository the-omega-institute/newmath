key = 'pingroup'

aliases = ['PinGroupUp']

constructive_story_zh = '一个 Pin 群奇偶行由两个已经认证的源生成: 继承的 SpinGroupUp 分支和 CliffordUp 反射分支, 它们被展示为带有奇偶分类器、Cont 输运账本、匹配 HSame 见证和 Pkg 来源的有限 BHist 包. 承载只接受两种分支形状: 要么端点就是被输运的 Spin 行, 要么端点是 Spin 行与展示的 Clifford 反射行的乘积; 不接纳第三种源投影. 两个已接受奇偶行只有在分支源、乘积行、端点和反射行都通过列出的 HSame 比较输运, 且展示的延拓乘积被保存时才分类在一起, 因而源谱是 Spin 或 Clifford 分支包, 模式谱是通过有限乘积账本展示的反射奇偶. 账本把原始 Spin 包含、Clifford 反射乘积、奇偶分类器、分支源投影、被输运端点、延拓行和来源都保留给消费者, 而不替换成宿主正交群或商代数. 五条命名证书义务逐分支闭合: 一个已接受 Spin 行或反射乘积行给出承载见证, 继承的 HSame 为可见端点比较提供自反、对称、传递, 稳定性定理把任一分支输运回同一个双源承载. 一条历史 h 落入 PinGroupUp token p 的签名 GAP, 当源域接受 h 为这些奇偶承载行之一, 签名关系把它配对到答案奇偶行和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 是 p 编码的 Spin 分支或 Clifford 反射乘积分支, 并带有相应 Cont、HSame 和 Pkg 行. 本章把这一反射奇偶义务表面命名为 PinGroupUp; 不引入宿主正交群等同、商代数结构、矩阵模型、标准桥或 SpinGroup 与 Clifford 行之外的源.'

[en]
label = 'PinGroup'
desc = 'Double cover of the full orthogonal group, extending Spin by a reflection generator.'
wiki = 'https://en.wikipedia.org/wiki/Pin_group'

[zh]
label = 'Pin 群'
desc = '正交群的双重覆盖, 比 Spin 多一个反射生成元.'
