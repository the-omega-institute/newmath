key = 'permutation'

aliases = ['PermutationUp']

constructive_story_zh = '一个排列从固定 FinSetUp 有限脊出发, 只接纳该有限位置承载上的认证自双射行: 前向图、逆向图、两条逆见证行, 以及匹配条目被有限集源承载并分类的逐点证据. 两个已承载排列行的分类器逐点比较它们的作用输出, 比较方式是 FinSetEnumClassifier_{A,sim_A}, 所以两个展示是否相同只由它们对有限条目的认证作用决定, 不是宿主函数相等. 源是有限集证书加同一已承载有限对象的源端和靶端副本, 模式记录图覆盖、逆覆盖、单位、复合、逆元和作用兼容, 账本把枚举见证、顺序见证、probe 读数和包来源隐藏在可见图行之后. 五条命名证书义务由认证恒等自双射给非空性, 由有限集分类器逐点自反、对称、传递给分类器律, 由图和端点包行的输运给承载封闭. 一个图行 G 落入 PermutationUp token p 的签名 GAP, 当源域接受固定有限脊和认证前向/逆向作用包, 签名关系把 G 配对到答案排列和证据账本, token 引入关系把答案命名为 p; 展开后, 每个有限位置都被送到 p 编码的目标位置, 逆向行认证往返. 桥接行把完全相同的承载、分类器、单位、复合、逆元、作用和账本行交给 SymGroupUp 的复合接口. 本章把这一有限位置双射构造命名为 PermutationUp; 排列是一份有限脊上的认证作用账本, 不是裸宿主双射、暴露的枚举顺序、函数商或独立对称群对象.'

[en]
label = 'Permutation'
desc = 'Bijection of a finite set with itself.'
wiki = 'https://en.wikipedia.org/wiki/Permutation'

