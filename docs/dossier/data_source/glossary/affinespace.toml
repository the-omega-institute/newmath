key = 'affinespace'

aliases = ['AffineSpaceUp']

constructive_story_zh = '仿射空间从一个已承载点历史、一个由 VecSpaceUp 认证的向量平移历史、GroupUp 给出的加法平移读法，以及把平移包接到点上的有限 Cont 动作账本生成。承载只接纳同时带有这两个依赖证书、点行、平移行、来源见证和动作账本的行；缺少向量来源、群来源或展示动作来源的数据都留在仿射表面之外。两个承载行由点上的 hsame 和平移历史上的 VecSpaceUp 分类器来比较，所以向量差通过展示动作见证识别，而不是通过选定原点或宿主 torsor 相等识别。源就是这个 torsor 包，模式记录动作封闭、两点覆盖、零平移分离、自由性、传递性、动作加法性和分类器输运，账本保留原始点、平移、群读法、向量读法、动作端点和来源证书行。五条命名证书义务由任一已接纳 torsor 行给出承载见证，由 hsame 与向量分类器给出自反、对称、传递，并由输运行说明被分类替换后的点和平移仍能重新打包为已接纳仿射行。一条历史 h 落入 AffineSpaceUp token p 的签名 GAP，当源域接纳它为这种 torsor 包，签名关系把它配对到答案包和证据账本，token 引入关系把该答案命名为 p；展开后，h 携带的点、向量平移、动作和依赖行正是 p 编码的数据。本章把这一 torsor 动作构造命名为 AffineSpaceUp；仿射结构只由 BHist、hsame、Cont、GroupUp 和 VecSpaceUp 的命名证书装配，不引入选定原点、坐标图、宿主仿射对象或标准桥。'

[en]
label = 'AffineSpace'
desc = 'Torsor over a vector space; free transitive action of vector translations.'
