key = 'convexset'

aliases = ['ConvexSetUp']

constructive_story_zh = '凸集在已经认证的仿射和向量空间数据内生成：先取已承载点，再附上来自域来源的非负标量历史，要求它们的有限和被分类为标量单位，然后用重复的仿射组合行构造端点。承载接纳由这个凸谓词、有限仿射脊、逐点交或沿已承载线性映射的分类器像展示出的端点；缺少仿射来源、标量非负性、单位和比较或线性映射见证的数据不进入这个 scoped 表面。两个展示端点只通过环境向量分类器和附着在来源凸谓词上的见证行比较，所以线性像是一条来源点加一条陪域分类器比较，而不是外部像集合。源是绑定到 AffineSpaceUp、VecSpaceUp、FieldUp 和 LinearMapUp 的展示凸承载谓词，模式记录二元仿射封闭、中点封闭、顺序对称、有限括号、交封闭和线性像封闭，账本保留原始点、权重、标量比较、仿射端点、线性映射输出和包行。这个 scoped 层级的命名证书义务从已接纳承载行读出：有居住例子给承载见证，继承分类器给自反、对称、传递，封闭定理把任何被分类的仿射组合、交成员或像端点重新打包进承载。一条历史 h 落入 ConvexSetUp token p 的签名 GAP，当源域接纳展示凸包，签名关系把它配对到答案承载行和证据账本，token 引入关系把该答案命名为 p；具体说，p 记录的每个仿射组合和有限脊端点都由同一个可见谓词承载。本章把这一仿射组合构造命名为 ConvexSetUp；它只给 scoped 凸表面，不引入公开 ConvexSetUp 命名证书、分离定理、紧致性定理、有限维理论或标准桥。'

[en]
label = 'ConvexSet'
desc = 'Subset closed under affine combinations with nonnegative coefficients summing to one.'
wiki = 'https://en.wikipedia.org/wiki/Convex_set'

[zh]
label = '凸集'
desc = '对非负系数和为一的仿射组合封闭的子集.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%87%B8%E9%9B%86'
