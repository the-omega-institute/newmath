key = 'dirichletunit'

aliases = ['DirichletUnitUp']

constructive_story_zh = '一个 Dirichlet 单位由一个有限包承载: 条目是 RingOfIntegersUp 依赖行、AbGroupUp 定律行、可见单位行、逆元与单位乘积见证行、一元秩见证、有限基或对数账本行, 以及包来源. 承载只接受那些单位侧行能通过整数环依赖读回、定律侧行能通过阿贝尔群依赖读回的包; 宿主单位类型、解析对数相等、行列式行、调节子值和桥行都被排除. 它的分类器是在可见单位、逆元、定律、秩、基账本、读回与来源行上的逐分量 hsame, 同时输运依赖来源. 源谱是整数环加阿贝尔群的包, 模式谱是带逆元、乘积、秩和有限基或对数账本行的可见单位群, 账本让原始单位证据、群定律证据和秩证据通过命名的 Cont 读回保持可见. 五条命名证书义务来自被接受的包作为承载见证、hsame 的等价关系定律, 以及分类器输运定理, 后者在每个分量移动到被分类端点后重建同一个包. 一条历史 h 落入 DirichletUnitUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案单位包和证据账本, token 引入关系把答案命名为 p; 展开后, h 正是可见单位、逆元或乘积行、一元秩行、有限账本、依赖行和包来源全部对齐的包端点. 本章把这一构造命名为 DirichletUnitUp; 不闭合解析调节子值、行列式公式、对数嵌入或标准桥.'

[en]
label = 'DirichletUnit'
desc = 'Finitely generated unit group of a ring of integers; Dirichlet rank r1+r2-1.'
wiki = 'https://en.wikipedia.org/wiki/Dirichlet%27s_unit_theorem'

[zh]
label = '狄利克雷单位群'
desc = '整数环的有限生成单位群, Dirichlet 秩为 r1+r2-1.'
