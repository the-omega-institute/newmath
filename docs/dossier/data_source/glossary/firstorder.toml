key = 'firstorder'

aliases = ['FirstOrderUp']

constructive_story_zh = '一个 FirstOrderUp 包被构造成展示的 syntax tuple: 历史命名 SetUp symbol source、TreeUp parse-tree source、变量、关系符号和函数符号账本、有限 term/formula 端点、formula 端点, 以及把它们系到证书上的包来源. 承载只接受能通过这些 BHist、hsame、Cont、有限 probe 和 signature-relation 行读出的公式与 deduction 端点; host strings、宿主 grammar table、外部 proof-system validity 和 semantic model carrier 都被排除. 两个 syntax 或 deduction 包按行输运分类: symbol 行通过 SetUp, parse 和 formula 行通过 TreeUp, 每个 premise 与 conclusion 通过展示的 continuation 和 history-equality 账本. 源是 set 与 tree 证书对, 模式记录公式构造、arity probes、substitution 与 deduction-step transport、satisfaction endpoint boundary 和有限 proof ledger, 账本保留 symbol provenance、parse provenance、rule steps、conclusion endpoints 和 package rows. 五条命名证书义务由已接纳 formula 包给出承载居住, 由逐行 hsame 给出自反、对称、传递分类, 由 classifier transport 把每个被输运的 symbol、subtree、formula 和 deduction step 重新打包为已接纳包. 一个包 h 落入 FirstOrderUp token p 的签名 GAP, 当源域接受它的 symbol、parse、formula 和 deduction 账本, 签名关系把该端点配对到答案公式或 deduction 端点和证据账本, token 引入关系把答案命名为 p; 展开后, p 记录同一棵展示 syntax tree 和同一份有限 deduction ledger. 本章把这一 syntax-and-deduction 表面命名为 FirstOrderUp; 不引入 host syntax equality、model-theoretic completeness theorem 或外部 proof oracle.'

