key = 'hypothesistest'

aliases = ['HypothesistestUp']

constructive_story_zh = '一个 HypothesisTestUp token 命名一个有限决策承载, 配 null 与 alternative DistributionUp 输入、被消费的 ProbSpaceUp 事件行、展示的统计量-阈值比较, 以及两个可见有限误差预算账本. 分类器是决策历史上的 hsame, 输运把统计量、阈值、决策行与误差账本通过该历史比较重新打包, 源仅覆盖展示的分布、事件、阈值与有限预算行. 一条历史 h 落入 HypothesisTestUp token p 的签名 GAP, 当有限承载接纳 h, 签名关系把它配对到决策判决与误差预算行, token 引入把该有限判决命名为 p.'

[en]
label = 'Hypothesis test'
desc = 'Finite hypothesis test packet carrying displayed rows, transports, routes, provenance, and naming.'

[zh]
label = '假设检验'
desc = '有限包, 含行、输运、路线、来源与命名.'
