key = 'diffgalois'

aliases = ['DiffGaloisUp']

constructive_story_zh = '一个 DiffGaloisUp 标记 命名一个微分域 (K, ∂) 在 NumFieldUp 子域上, 一个 K 中系数的线性微分算子 L = Σ a_i ∂^i, 一行 SeqUp-typed 维数等于 L 阶的解空间行 V, 以及作用在 V 上并逐点固定常数 K^∂ 的微分 Galois 群 G. 承载接纳一份 Picard-Vessiot 证书, 当 V 在 ∂ 下封闭并含一行基础解, G 在 NameCert_{GaloisGroupUp} 的意义下忠实作用在 V 上, 且 K^∂ = V^G 即 G-不动的解恰为常数. 分类器是解空间行上的 hsame; 源覆盖微分域承载行、微分算子系数、解空间基行、Galois 作用行与常数域行; 模式记录解空间可纳入、忠实作用可纳入、常数域精确性、基础解行与算子阶可纳入行; 账本让微分算子、解空间基、Galois 作用与常数域见证保持可见. 五条命名证书义务由 NameCert_{FieldExtUp} 加 NameCert_{GaloisGroupUp} 与 NameCert_{OdeUp} 供给: 有居住的恒等证书是零阶算子; 分类器稳定性是解空间行上自反、对称、传递的 hsame; 输运把 Galois 作用通过域同构输运重新打包; 账本精确性把已接纳证书与解空间基同一; 扩张边界固定常数域不动点方程. 一条历史 h 落入 DiffGaloisUp 标记 p 的签名缺口, 当源域接纳 Picard-Vessiot 证书, 签名关系把它配对到微分 Galois 群标识, 标记 引入把该群命名为 p. 本章把这一 Picard-Vessiot Galois 表面命名为 DiffGaloisUp; 它是一个有限阶线性算子对象, 不给出代数群分类, 不证 Liouvillian 可解性, 不通往求积分桥, 也不通往标准模型论微分 Galois 桥.'

[en]
label = 'DiffGalois'
desc = 'Picard-Vessiot Galois group of a linear differential equation over a number-field-base differential field.'
wiki = 'https://en.wikipedia.org/wiki/Differential_Galois_theory'

[zh]
label = '微分伽罗瓦群'
desc = '数域基微分域上线性微分方程的 Picard-Vessiot Galois 群.'
