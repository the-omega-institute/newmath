key = 'independence'

aliases = ['IndependenceUp']

constructive_story_zh = '一个独立性包从一个已承载的 ProbSpaceUp 源、一个有限 FinSetUp 指标脊、以及每个指标处的一条已承载 RandomVarUp 映射开始, 然后展示各边缘 DistributionUp 端点和元组映射的联合分布端点. 承载只接纳还为每个有限目标事件族展示乘积柱事件读回、边缘质量的有限 RealUp 乘积折叠、以及联合柱质量与该乘积之间分类比较的有限族; 分类器则通过各依赖分类器输运源、有限位置、随机变量行、边缘与联合分布、柱事件和实数乘积. 因而源覆盖有限的已承载随机变量族, 模式是乘积柱因子分解方程以及有限重编号和可测像输运, 账本恰好保持柱读回、边缘脊、乘积折叠、联合端点和来源行可见. 由于有限位置重编号、分布端点输运、可读原像输运和 RealUp 乘法同余都保持因子分解行, 一个已接纳有限族给出承载见证, 分类器逐分量自反、对称、传递, 被输运后的有限族仍在承载中. 一条有限族行 h 落入 IndependenceUp token p 的签名 GAP, 当源域接受其概率源、指标脊、随机变量与因子分解账本, 签名关系把该行配对到答案族和证据账本, token 引入关系把答案命名为 p; 展开后, h 中每个柱事件质量都与 p 编码的相应边缘质量乘积分类相同. 纸面桥只是这一有限因子分解表面的可测像与有限重编号读回, 不是通向完备概率空间的桥. 本章把这一有限因子分解构造命名为 IndependenceUp; 独立性是已承载分布上的展示乘积方程, 不引入条件期望行、sigma 完备化原件或宿主函数相等.'

