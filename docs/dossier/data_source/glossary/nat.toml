key = 'nat'

aliases = ['NatUp']

constructive_story_zh = '一个自然数从拒绝所有 b0 分支的历史开始: 从空历史出发可以不断叠 b1 标记, 每一条这样的栈都被接纳, 而一旦出现 b0 标记就落在承载之外. 既然内核已经规定两条历史只有在字面历史相等时才相同, 这些一元脊的分类器就没有额外的商要做; 同一个一元谓词同时说明证书覆盖哪些源、它们符合哪种模式, 以及账本中哪条原始历史保持可见. 因此五条命名证书义务一起到位: 空历史给出承载非空见证, 恒等关系自反、对称、传递, 而与已接纳一元历史相同的历史仍被接纳. 一条一元历史 h 落入 NatUp token p 的签名 GAP, 只有在源域先接受 h, 签名关系再把 h 配对到一条答案历史与一份证据账本, 且 token 引入关系把那条答案命名为 p 时才成立; 三个检查展开后, 它正是说 h 一元, 且 h 的 b1 深度就是 p 编码的计数. 这里附带的标准桥把每条一元历史送到一个有限一元词, 再把词长读回为通常的自然数值, 所以外部对照只是同一条脊的读回, 不是新的承载. 本章把这一构造命名为 NatUp; 后继就是再叠一个 b1, 归纳就是历史的封闭生成规则, 不引入 Peano 公理、独立 N 类型或额外公理.'

[en]
label = 'Nat'
desc = 'Unary natural numbers as Hist segments.'
wiki = 'https://en.wikipedia.org/wiki/Natural_number'

