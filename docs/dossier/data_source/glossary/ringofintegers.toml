key = 'ringofintegers'

aliases = ['RingOfIntegersUp']

constructive_story_zh = '一个整数环被展示为 NumFieldUp 承载与嵌入 IntUp 行之上的 Dedekind 源包, 其中嵌入来源之后接着一份有限账本, 账本列出用可见域加法、乘法、零、一和取负写出的整方程. 承载只接受这个包里显示的数域行、嵌入整数行、嵌入行、整方程账本、分类器行、延拓来源和包来源; 宿主多项式相等、代数整数商对象和脱离的整闭包承载都没有槽位. 它的分类器用 hsame 输运数域承载、嵌入整数行、运算端点以及每一条方程行, 然后用同一份有限账本、Cont 和 Pkg 来源重包. 源谱是 NumField 与 Int 的合并依赖表面, 模式谱是显示的整方程见证族, 账本让每条原始方程作为绑定到依赖证书的有限行保持可见. 五条命名证书义务由显示的依赖包表示: 被接受包给出承载端点, hsame 给出自反、对称、传递比较, 方程账本输运定理给出在分类替换下的承载封闭. 一条历史 h 落入 RingOfIntegersUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案包和证据账本, token 引入关系把答案命名为 p; 在本章中, 这意味着 h 是数域源、嵌入整数源、整方程账本、分类器、延拓行和包来源都正好为所携带行的端点. 本章把这一构造命名为 RingOfIntegersUp; 不闭合完整代数整数理论、类群结构、解析单位或标准桥.'

[en]
label = 'RingOfIntegers'
desc = 'Integral closure of Z inside a number field.'
wiki = 'https://en.wikipedia.org/wiki/Ring_of_integers'

