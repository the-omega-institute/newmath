key = 'topology'

aliases = ['TopologyUp']

constructive_story_zh = '这里的拓扑由承载、承载分类器、开指标族、逐点成员谓词、有限交指标、任意并见证以及空开集和全集行一起展示出来, 全部作为证书数据保留, 而不是从 powerset 中选择. 公开开集只有在一个显式指标携带该谓词、并且可见账本行命名生成它的构造子时才被接纳: 度量球、有限列表交、二元 meet、任意并、空开集、全集或单点空历史表; 没有这种指标加账本对的谓词不被接受. 两个公开开行由承载分类器输运成员关系, 再由展示指标的 carrying equation 分类, 所以分类器从不是外部子集相等. 源谱是 indexed-open 拓扑包以及度量生成和单点来源, 模式谱记录边界律、有限交、任意并、构造子覆盖和承载分类器范围, 账本记录被选择的开指标、它的 carrying equation 与构造来源. 五条命名证书义务来自展示拓扑包: 边界行给出有居住的公开来源, 分类器输运给出承载行上的自反、对称、传递, 每个被输运的成员证明都用同一显式指标或构造子行重包. 一行 h 落入 TopologyUp token p 的签名 GAP, 当源域接受其 carried-open 指标和构造子账本, 签名关系把它配对到答案开行和证据账本, token 引入关系把答案命名为 p; 展开后, h 正是由 p 编码的指标和构造子所携带的公开开谓词. 纸面桥把这一 indexed carried-open 表面读成标准 indexed topological-space 接口, 但只从同一批行读回承载成员和开集律, 不引入对所有宿主开集的满射性、powerset 相等、完备性内容或 bridgeChecked 对应.'

