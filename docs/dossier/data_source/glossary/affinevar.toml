key = 'affinevar'

aliases = ['AffineVarUp']

constructive_story_zh = '仿射簇由交换环证书、仿射点承载和一条有限 HistSpine 多项式代码历史构成; 一个点历史被接纳, 正是因为它是仿射点, 并且每个显示方程位置都求值到标量零行. 因而承载 V_R_n(F) 包含满足有限族所有方程的环境仿射点, 排除缺少环境行的点、落在规范有限序列基底之外的多项式代码, 以及任何没有有限位置说明的展示. 两个有限方程展示给出同一个零点集, 当它们的位置行彼此包含, 所以分类器是方程族互含以及由此得到的零点谓词等价, 不是宿主簇相等. 源谱覆盖仿射点行、多项式代码行、求值为零见证和有限族脊; 模式谱记录空族等于环境空间、连接对应交、沿方程包含限制行、重复头插入不变和互含精确性. 账本保留原始方程位置、该位置读出的条目、多项式求值行和仿射点见证, 让可见的零点集成员关系始终对齐生成它的有限族. 五条命名证书义务由环境仿射承载与空族情形给出非空性, 由互含关系给出自反、对称、传递, 并由行限制说明被运输的有限族仍把已接纳点留在承载内. 一条历史 h 落入 AffineVarUp token p 的签名 GAP, 当源域接受 h 为这种有限零点集包, 签名关系把它配到答案包与证据账本, token 引入关系把答案命名为 p; 具体说, p 中每个方程位置在 h 所代表的仿射点上都有零求值行. 标准零点集桥把有限 BEDC 行读成通常的有限多项式消失谓词, 也把标准有限族成员行读回相同位置; 本章把这种有限方程构造命名为 AffineVarUp, 不商掉展示也不加入宿主簇原件.'

[en]
label = 'AffineVar'
desc = 'Zero-locus of a finite system of polynomial equations in affine n-space.'
wiki = 'https://en.wikipedia.org/wiki/Affine_variety'

[zh]
label = '仿射簇'
desc = '仿射 n-空间中有限多项式方程组的零点集.'
wiki = 'https://zh.wikipedia.org/wiki/%E4%BB%BF%E5%B0%84%E7%B0%87'
