key = 'module'

aliases = ['ModuleUp']

constructive_story_zh = '这里的模作用是两个端点承载之间的常值作用: 标量侧是 RingUp 的单点, 向量侧是 AbGroupUp 的单点, 作用把每个已接纳的标量-向量对都送回空历史. 一个对 (s, v) 只有在两项都与空历史相等时才被接纳, 两个对则由标量侧与向量侧单点分类器的合取来分类. 源是单点对单点谓词, 模式记录标量作用像证书、图精确性、零作用湮没, 以及作用忠实与零湮没子平凡之间的等价, 账本把可见对与原始端点数据对齐. 既然两侧都是单点命名证书, (空, 空) 给了承载见证, 对分类器自反、对称、传递, 且被分类器识别的对仍被接纳. 一个对 (s, v) 落入 ModuleUp token p 的签名 GAP, 当源域接受该对, 签名关系把它配对到一个答案对与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, s 与 v 都与空历史相等, p 是单点标量作用 token. 湮没子理想谓词、通向宿主模数据的单点标准桥以及无宿主泄漏定理, 都读回同一个端点作用. 本章把这一单点标量作用构造命名为 ModuleUp; 标量环、交换群、结合律、两条分配律与单位律都在常值端点作用上检验, 不引入基、商、张量积或宿主模对象.'

[en]
