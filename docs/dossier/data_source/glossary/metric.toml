key = 'metric'

aliases = ['MetricSpaceUp', 'MetricUp']

constructive_story_zh = '这个度量边界包从一个可见上下文距离见证开始, 其中心两个端点都已经塌缩为空历史: 外围前缀和后缀可以保持可见, 但中心源、目标和距离都被迫回到空历史. 这个局部行的承载只接受形如 prefix·空 到 空·suffix、距离为 prefix·d·suffix 的 MetricDistanceWitness 包, 分类器是由此得到的 hsame(d, 空) 比较和零深度读回; 非空中心端点或非空中心距离都被排除. 源是已有的带可见上下文的度量距离见证, 模式记录空距离精确性、append 单位行为、单位 splice 交换、左右单位见证行和延拓深度相加, 账本保留前缀、后缀、中心距离和延拓 splice. 由于空中心距离给出有居住的边界行, 历史相等给出自反、对称、传递比较, 每条单位 splice 定理又把被输运的延拓重新打包成已接纳度量见证, 五条命名证书义务在这个 scoped 表面上闭合. 一个包 h 落入 MetricUp 空边界 token p 的签名 GAP, 当源域接受可见上下文距离见证, 签名关系把它配对到答案距离和证据账本, token 引入关系把答案命名为 p; 展开后, 中心距离为空历史, 深度为零, 每个展示 splice 都表现为左或右单位. 规范 splice 包随后把任何穿过该空距离的两步延拓读成可见端点之间的直接延拓, 并保留同一个深度账本. 本章在 MetricUp 中记录这一空边界可见上下文包; 不引入任意点承载、实值距离、诱导拓扑、完备性、紧致性或连续性.'

