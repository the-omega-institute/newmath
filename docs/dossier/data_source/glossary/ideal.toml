key = 'ideal'

aliases = ['IdealUp']

constructive_story_zh = '一个 ideal 被承载为环境 RingUp 证书的历史谓词, 并随带若干行: 其成员被环承载、包含零、对加法封闭、对加法逆封闭、对内部乘法封闭、可沿分类器输运, 并可被每个已承载环境端点左右乘吸收. 承载只接受带有这些行的谓词, 而 quotient-kernel 表面只在 x 与 y 两个端点都被承载且展示差 x-y 属于该 ideal 时接受这对端点; 同一性由环境环分类器输运, 而不是形成商承载. 源是环境环证书加已承载 ideal 谓词, 模式记录有限 meet、由加性分解给出的 sum、ring-map preimage、principal generated ideals, 以及 quotient-kernel 的对角和下降行, 账本保留 membership 见证、decomposition 见证、image-membership 见证和 difference-membership 行. 命名证书义务由零属于 ideal 给出 inhabitation, 由环境分类器的自反、对称、传递给出端点比较, 再由 ideal 的 classifier-transport 行保证分类替换后 membership 封闭. 一条 pair 历史 h 落入 IdealUp token p 的签名 GAP, 当源域接受环境环端点和 ideal 谓词, 签名关系把这对端点配到答案 quotient-kernel 包和证据账本, token 引入关系把该答案命名为 p; 展开后, 端点差是展示的 ideal 成员, 所有加法、取负和乘法下降行都是 p 编码的那些行. 标准桥把 BEDC 谓词读作由环境 RingUp 桥给出的标准环上的普通 ideal 谓词, 再通过同一套行清单读回, 同时明确不导出宿主商承载. 本章把这一 carried-predicate 与 quotient-kernel 构造命名为 IdealUp; ideal 始终是已有环历史上的谓词、输运和吸收行, 不引入宿主 quotient 原件或改变分类器的相等关系.'

