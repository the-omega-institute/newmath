key = 'atiyahsinger'

aliases = ['AtiyahSingerUp']

constructive_story_zh = '一个 Atiyah-Singer 指数配对包通过在共享流形端点和符号行上读入一条 spectral-theorem 源行与一条 Chern-Weil 源行装配出来, 然后把解析指数端点、拓扑指数端点、可见的比较 hsame(α, τ) 与 Pkg 来源记号行装在一份有限包里. 分类器仅是被展示的 ASIndexPair_{m,D,σ_D}(α, θ, τ) 行, 因此消费者相等是通过两条依赖读取与端点比较走的, 而不是经由宿主 Fredholm 定理或上同调商. 源恰好覆盖 spectral 依赖、Chern-Weil 依赖、共享流形与符号数据, 以及有限包来源记号; 该包不导出任何环境解析-拓扑等式. 本章把这一指数配对义务表面命名为 AtiyahSingerUp, 完整的外部 Atiyah-Singer 定理留在承载之外.'

[en]
label = 'AtiyahSinger'
desc = 'Analytic index of an elliptic operator equals topological index via Chern character and Todd class.'
wiki = 'https://en.wikipedia.org/wiki/Atiyah%E2%80%93Singer_index_theorem'

[zh]
label = '阿蒂亚-辛格指标定理'
desc = '椭圆算子的解析指标等于由 Chern 特征与 Todd 类给出的拓扑指标.'
wiki = 'https://zh.wikipedia.org/wiki/%E9%98%BF%E8%92%82%E4%BA%9A-%E8%BE%9B%E6%A0%BC%E6%8C%87%E6%A0%87%E5%AE%9A%E7%90%86'
