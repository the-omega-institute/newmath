key = 'fps'

aliases = ['FormalPowerSeriesUp', 'FpsUp']

constructive_story_zh = '一个形式幂级数在已认证环上构造为由 NatUp 索引的系数序列, 每个系数都由同一个 RingUp 标量证书承载. 承载只接受逐系数已承载的序列, 分类器在每个一元下标处用标量分类器逐点比较两条级数; 只要有一个未承载系数或缺少一个逐点比较, 就不进入公开代数表面. 源是标量 RingUp 数据加逐系数承载, 模式记录逐点加法、零级数、逐系数取负、通过有限 split spines 的 Cauchy 乘积、单位级数、分配律和零乘积吸收, 账本把每个有限 fold、split 见证和标量系数比较保持可见. 命名证书义务由终端实例的 singleton empty-history 语义证书以及一般接口的标量行支撑: 已承载的零序列或单位序列占据相应承载, 逐点分类器等价性给出自反、对称、传递, 逐系数输运保证分类替换后级数仍被承载. 一条序列历史 h 落入 FpsUp token p 的签名 GAP, 当源域接受 h 的所有系数, 签名关系把它配对到答案级数以及由系数见证和有限 fold 构成的证据账本, token 引入关系把该答案命名为 p; 展开后, 每个一元系数都匹配 p 编码的标量端点, 每个乘积系数都是展示的 Cauchy 有限 fold 值. 这里没有通往外部形式幂级数库的标准桥. 本章把这一逐系数代数接口命名为 FpsUp; 环律由已有 RingUp 与 NatUp 行装配出来, 不引入解析收敛、完备化或独立形式级数承载.'

