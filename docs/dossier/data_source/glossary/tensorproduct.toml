key = 'tensorproduct'

aliases = ['TensorProductUp']

constructive_story_zh = '这里闭合的张量积是单点因子构造: 当两个单点 ModuleUp 端点 l 和 r 被展示出来, 并且一条延拓账本 Cont(l, r, t) 把它们装配为端点 t 时, 该 tensor 端点被接纳; 在这个单点情形中, t 又被迫回到空历史. 同一组展示因子得到的两个 tensor 输出由端点历史相等分类, 因子输运说明把 l、r 或 t 沿 hsame 改写时, 单点承载见证和延拓见证会一起输运, 所以没有形成双线性商对象. 源是两个单点 module 因子, 模式是带保留延拓行的具体三元组 (l, r, t), 账本只记录这两个因子端点、tensor 端点、源靶交换、结合子、后缀与前缀封闭以及分类器唯一性读回. 五条命名证书义务闭合, 是因为任何展示的单点因子给出有居住元的端点承载, hsame 给出输出上的自反、对称、传递, 因子输运定理正是分类器下承载封闭, 而源、模式和账本使用同一个谓词. 一条历史 h 落入 TensorProductUp token p 的签名 GAP, 当源域接受两个单点 module 因子和它们的延拓, 签名关系把所得 tensor 端点配对到答案端点和证据账本, token 引入关系把答案命名为 p; 展开后, h 是由两个因子唯一决定的空 tensor 端点. 纸面桥把这个单点表面读成单点 tensor product, 再通过同一条延拓账本读回, 不通过泛双线性商. 本章把这一单点延拓因子包命名为 TensorProductUp; 不引入非单点张量代数、双线性泛性质、外幂或标准模型完备性.'

