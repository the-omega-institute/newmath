key = 'realanalytic'

aliases = ['RealAnalyticUp']

constructive_story_zh = '实解析边界从显式有理流开始: pi 的 Leibniz 重标度, exp 的幂级数部分和, log 的二分数据, 以及成对的 sin 与 cos 部分和, 每一项都由一元历史索引并配备显式模量. 一个候选端点只有在给定的 DyadicRatCore, StreamNameUp, RegSeqRat, RealUp 与 RealClassifier 表面把该局部流转成实历史值时才被接纳; 裸的部分和公式或局部 Cauchy 估计还不是已承载的解析对象. 分类器获得 RealUp 表面中的极限唯一性供给, 源是局部流包加实完备化见证, 模式记录部分和递归、模量、加法性、逆、Pythagorean 与正弦零点行, 账本保持流名、索引、模量、极限见证和被输运的分类器证据可见. 在这些给定行下, 预期的命名证书义务由端点见证、实分类器等价以及输运/稳定性子句填充; 没有它们时, 本章只暴露依赖表面, 而不暴露完成的证书. 一条历史 h 落入 RealAnalyticUp token p 的签名 GAP, 仅当源域先接纳相应的解析流和给定极限见证, 签名关系把它配对到答案实历史端点和证据账本, token 引入把该端点命名为 p; 展开后, 这表示 pi, exp, log, sin 或 cos 的端点由列出的完备化表面支撑, 而不是只由局部级数支撑. 这些解析端点不附带标准桥. 本章把这个条件性端点包登记为 RealAnalyticUp; 超越函数保持为既有实历史上的显式流与极限义务, 不引入完备性公理、解析延拓原语或宿主超越函数库.'

[en]
