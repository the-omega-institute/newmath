key = 'compactmetric'

aliases = ['CompactMetricUp']

constructive_story_zh = '一个紧致度量承载通过保留同一个已认证 MetricSpaceUp 承载并附上两族可见数据来装配: 每个正 RatUp 容差处的 TotallyBoundedUp ProbeBundle 网, 以及每条已承载正则 StreamNameUp Cauchy 流的 CompleteMetricUp 极限见证. 一行只有在度量承载、有限网族和极限见证族都出现在同一批点历史上时才被接纳; 开覆盖、子序列选择和环境紧子集不是承载数据. 分类器逐分量继承度量点分类器、ProbeBundle 网输运行和完备极限输运行, 所以两个紧致度量包只有在这些展示的度量、网和收敛账本能被输运时才相同. 源是共享度量承载, 模式是全有界性与完备性的合取, 账本是距离行、正容差有限网行、成员与覆盖行、正则流模量、已承载极限和后期观测界的并集. 五条命名证书义务由单点紧致度量包给出承载居住, 由继承分类器的等价行为给出自反、对称、传递, 由组件稳定性定理把输运后的有限网和极限见证重新打包到同一个度量承载下. 一个包 h 落入 CompactMetricUp token p 的签名 GAP, 当源域接受它的度量承载和两个组件族, 签名关系把这个三元组配对到答案紧致度量包和证据账本, token 引入关系把答案命名为 p; 展开后, p 编码的正是度量行、容差索引网和 Cauchy 极限见证. 公开桥让 continuous-map 与 Heine--Cantor 消费者读取同一批有限网和完备极限数据. 本章把这一逐组件构造命名为 CompactMetricUp; 不引入开覆盖紧致、无显式数据的序列紧致、乘积紧致或函数空间紧致.'

