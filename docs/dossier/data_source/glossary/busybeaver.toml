key = 'busybeaver'

aliases = ['BusyBeaverUp']

constructive_story_zh = '一个 BusyBeaverUp 标记 命名一个一元状态计数 n、n 状态二符 TuringMachineUp 编码的有限枚举、一个候选一元输出上限 B, 以及一条停机步数账本行. 承载接纳见证, 当枚举中每一个在空带上停机 (在 NameCert_{ComputableUp} 的意义下) 的编码, 其停机输出和步数都被 B 上限; 不停机编码记录在不停机见证行. 分类器是固定一元状态计数下输出上限上的 hsame; 源覆盖一元状态计数、有限机器枚举、一元输出上限、停机步数账本与不停机见证; 模式记录停机上限可纳入、有限枚举完备性、不停机排除、上限单调性与逐机器读回精确性行; 账本让枚举、停机上限 B、逐机器读回与不停机见证保持可见. 五条命名证书义务由有界仿真证书加枚举有限性供给: 有居住的恒等证书是平凡的 n=0 证书; 分类器稳定性是固定状态计数下自反、对称、传递的 hsame; 输运把有界仿真通过机器枚举重新打包; 账本精确性把已接纳行与展示的停机上限同一; 扩张边界固定一元状态计数中的上限单调性. 一条历史 h 落入 BusyBeaverUp 标记 p 的签名缺口, 当源域接纳枚举上限读回, 签名关系把它配对到停机最大值, 标记 引入把该最大值命名为 p. 本章把这一枚举上限停机表面命名为 BusyBeaverUp; 它是一个有限状态上限最大值对象, 不给出关于 busy-beaver 函数的实际可计算性主张, 不给出渐近增长率主张, 也不通往停机可判定性桥.'

[en]
label = 'BusyBeaver'
desc = 'Halting-output maximum over the finite enumeration of n-state two-symbol Turing machines.'
wiki = 'https://en.wikipedia.org/wiki/Busy_beaver'

[zh]
label = '繁忙海狸'
desc = 'n 状态二符 Turing 机有限枚举中停机输出的最大上界.'
wiki = 'https://zh.wikipedia.org/wiki/%E7%B9%81%E5%BF%99%E7%9A%84%E6%B5%B7%E7%8B%B8'
