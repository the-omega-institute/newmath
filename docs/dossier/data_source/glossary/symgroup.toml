key = 'symgroup'

aliases = ['SymGroupUp']

constructive_story_zh = '对称群把已经认证的 PermutationUp 承载重新包装为复合下的 GroupUp 表面. 一个已承载元素仍然是有限位置自双射行, 带着图、逆图、作用、逆见证行、包来源和账本条目; 没有排列证书的行不能作为群元素进入. 分类器是通过群边界读取的排列分类器, 因而两个群元素在有限集条目上的认证作用逐点一致时才分类为同一个, 而不是由宿主函数相等决定. 源是 PermutationUp 公开表面加群运算边界, 模式记录恒等排列、复合、逆元、结合律、单位律、作用兼容和精确性, 账本仍把枚举选择、位置名、probe 读数和来源作为排列账本数据保存. 五条命名证书义务由恒等排列给非空性, 由继承的排列分类器给自反、对称、传递, 由复合与逆元输运行保证已承载排列仍留在承载中. 一个已承载排列 G 落入 SymGroupUp token p 的签名 GAP, 当源域接受排列与群边界行, 签名关系把 G 配对到答案群元素和证据账本, token 引入关系把答案命名为 p; 展开后, G 是 p 编码的认证作用, 且单位、复合和逆元账本都存在. 纸面桥把它读成有限脊的认证排列群, 再只读回同一批排列行和分类器证据. 本章把这一复合群构造命名为 SymGroupUp; 群结构是排列账本的重包装, 不引入宿主对称群相等、展示商、表示论或暴露的顺序见证.'

[en]
label = 'SymGroup'
desc = 'Symmetric group S_n: permutations of n elements.'
wiki = 'https://en.wikipedia.org/wiki/Symmetric_group'

