key = 'ring'

aliases = ['RingUp']

constructive_story_zh = '环表面把同一个空历史端点使用两次, 让这个单点同时承担加法角色与乘法角色. 一条历史只有与空历史相等才被接纳, 分类器就是相应的单点关系, 所以由延拓给出的加法、负元、零、由延拓给出的乘法以及一元全都落回同一个端点. 源是单点谓词, 模式记录这些运算行以及分配律、零吸收、带符号平方和减法包, 账本让每个可见单点与其原始历史对齐. 由于一元素历史类由空历史居住, 历史相等又是保持该类的等价关系, 五条命名证书义务不需要另设代数承载就成立. 一条历史 h 落入 RingUp token p 的签名 GAP, 当源域接受 h, 签名关系把 h 配对到一条答案历史与一份证据账本, token 引入关系把那条答案命名为 p; 展开后, h 与空历史相等, p 是单点环元素. 公开运算表面与终态桥把同一张端点表交给下游消费者, 也包括对偶环证书. 本章把这一双运算单点构造命名为 RingUp; 加法与乘法在同一个端点上共享一个分类器, 不引入多项式、商、域或非单点环结构.'

[en]
label = 'Ring'
desc = 'Ring: AbGroup + multiplicative monoid + distributivity.'
