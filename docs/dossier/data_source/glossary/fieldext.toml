key = 'fieldext'

aliases = ['FieldExtUp']

constructive_story_zh = '这一边界上的域扩张从已经认证的一点域表面和一点向量空间表面构造出来, 再用恒等嵌入把每个被接受端点同时看作基域、扩张域和标量模. 因而分类器同时要求同一条显示历史满足域分类器和向量空间分类器, 在空端点处这只是 hsame, 不是宿主域相等或商表示. 源谱只覆盖单点域承载, 模式谱和账本把基域上的向量空间行、恒等嵌入行、标量作用读回、精确端点分类和 RatUp 自反塔行都通过同一份 Cont 与 Pkg 来源保持可见. 因为空历史给出承载见证, hsame 给出自反、对称、传递, 两个分量承载都在显示分类器下封闭, 五条命名证书义务就由投影和重包同一批单点行完成. 一条历史 h 落入 FieldExtUp token p 的签名 GAP, 当源域接受 h, 签名关系把它配对到一个答案端点和证据账本, token 引入关系把答案标识为 p; 这里三个检查收缩成 h 是恒等扩张端点, 且标量作用与域乘法都读回空历史. 论文桥把这个包送到通常的终端域扩张, 并通过恒等嵌入读回. 本章把这一构造命名为 FieldExtUp; 不加入非平凡塔、Galois 数据、可分性数据、代数闭包或独立扩张承载.'

[en]
label = 'FieldExt'
desc = 'Field embedding with the larger field as a vector space over the smaller.'
wiki = 'https://en.wikipedia.org/wiki/Field_extension'

[zh]
label = '域扩张'
desc = '域嵌入, 大域作为小域上的向量空间.'
wiki = 'https://zh.wikipedia.org/wiki/%E5%9F%9F%E6%89%A9%E5%BC%A0'
