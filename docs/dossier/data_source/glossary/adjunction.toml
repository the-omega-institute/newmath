key = 'adjunction'

aliases = ['AdjunctionUp']

constructive_story_zh = '一个 adjunction seed 由两条前缀自然变换分量装配而成: 从一个前缀到另一个前缀的 unit 分量、反向的 counit 分量, 以及展示两个三角复合的延拓账本. 被承载的 display 正是那些历史: 两个分量都在同一对象上是前缀分量, 两条三角边都由延拓见证; 缺少分量承载或任一延拓行的数据在这个 seed 之外, 同一性则是对两个前缀、对象、unit、counit 与三角边逐分量使用 hsame, carrier-swap 行记录同一个 display 的反向排列. 源是 unit-counit 三角 display, 模式记录空复合塌缩、自同态三角精确性、cycle 塌缩到相等前缀、carrier-swap 对称性和空正规形, 账本让 unit、counit 与两条三角历史保持可见. 在这个 seed 层级, 命名证书义务尚未作为完成的公开证书导出, 但已有行展示了机制: 空分量 display 提供规范占位, hsame 提供自反、对称、传递, 正规形与 swap 定理保证分类替换后仍保留承载. 一条 display 历史 h 落入 AdjunctionUp token p 的签名 GAP, 当源域接受这个 unit-counit display, 签名关系把它配对到答案 display 与两条三角账本, token 引入关系把那条答案命名为 p; 展开后, unit、counit 与两条三角边都塌缩为空历史, 两个前缀按 p 编码的方式分类为同一个. 这里没有标准桥, 也不声称 hom-set 泛性质 adjunction. 本章把这一前缀 unit-counit 三角表面命名为 AdjunctionUp; adjunction 数据只是已有历史上的延拓行, 不引入外部 adjunction 对象、宿主自然同构原件或额外范畴公理.'

