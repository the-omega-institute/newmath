key = 'homology'

aliases = ['HomologyUp']

constructive_story_zh = '导出的 homology 表面是从展示链微分中切出的 singleton cycle: 一条历史被承载当且仅当它与空历史 hsame, 而周围的 cycle 和 boundary 行说明一般谓词 Z_d(h) 与 B_d(h) 如何通过微分端点和原像读出. 因而这个导出对象只接受空 cycle, 排除非空端点; 它的分类器存储两个端点的承载见证以及 hsame(h,k), 而不是形成 boundary 商或 homology 类. 源、模式和账本策略都是 singleton cycle 谓词, 更宽的模式行记录 square-zero 下 boundary 到 cycle 的封闭、append 封闭、延拓原像以及沿 hsame 的输运. 五条命名证书义务在这个表面上直接成立: 空历史占据承载, hsame 给出自反、对称、传递, 分类器输运返回右端点中已经存好的承载见证. 一条历史 h 落入 HomologyUp token p 的签名 GAP, 当源域接受 h 为 singleton cycle, 签名关系把它配对到答案 cycle 并把源见证作为证据账本, token 引入关系把那条答案命名为 p; 展开后, h 与空历史 hsame, 并匹配 p 编码的单 cycle 端点. 纸面桥把这个 singleton 证书读作平凡 one-cycle homology 对象, 账本仍是同一个源见证, 不导出 boundary 商. 本章把这一 singleton-cycle 构造命名为 HomologyUp; homology 接口在这里是历史上的 kernel/image 边界, 不引入任意链复形库、boundary 商承载或 derived-functor 原件.'

[en]
