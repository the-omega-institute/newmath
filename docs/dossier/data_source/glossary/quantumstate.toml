key = 'quantumstate'

aliases = ['QuantumStateUp']

constructive_story_zh = '一个量子态行先消费 HilbertUp 包和 ProjectiveSpaceUp 包, 再把 Hilbert 单位向量端点、范数为一账本、整体相位行、射影端点、继承分类器和共享来源放进一个有限 BHist 承载. 承载只接纳那些向量与范数数据由 Hilbert 来源投影、射影端点与相位比较由射影空间来源投影的包; 密度矩阵、可观测量、信道作用、谱数据、宿主向量相等和商对象都在公开行之外. 两个已接纳包命名同一个量子态, 当单位向量端点通过展示的整体相位/射影分类器相关, 同时 Hilbert 与射影行逐分量由 hsame 输运, 而不是通过环境 Hilbert 空间中的向量相等. 源谱是 Hilbert 加射影的依赖表面, 模式谱记录范数为一投影、射影相位分类、整体相位稳定性、来源精确性、可观测量和密度读回边界以及信道输入边界, 账本保留 Hilbert 行、射影端点、相位行、范数行和来源. 五条命名证书义务从被消费的分类器读出: 已接纳包给出承载居住, 射影相位分类器经依赖行给出自反、对称、传递, 已分类的 Hilbert/射影输运又重包为已接纳量子态包. 一个包 h 落入 QuantumStateUp token p 的签名 GAP, 当源域接受其 Hilbert 与射影行, 签名关系把它配对到答案状态包和证据账本, token 引入关系把答案命名为 p; 具体说, 单位向量、范数为一行、相位比较、射影端点和来源必须是 p 编码的条目. 本章把这一射影单位向量构造命名为 QuantumStateUp; 下游可观测量、密度和信道消费者只能读取导出的分类器与来源, 这里不引入密度矩阵承载、测量谱、信道行、宿主向量相等或原始商.'

