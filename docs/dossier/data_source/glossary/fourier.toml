key = 'fourier'

aliases = ['FourierUp']

constructive_story_zh = '一个 Fourier 数据只通过有限观测承载在 SOneUp、RealUp、InnerProductUp 和 IntegralUp 这些已命名源之上: 系数探针、变换采样、内积探针和积分见证都作为 ProbeBundle 项出现, 并绑定到 SigRel 证据. 分类器比较两份 Fourier 历史时, 检查每个有限观测包是否经由对应源分类器以及 sameSig、Pkg 相互关联, 而不是断言宿主函数或变换相等. 源就是有限观测包表面; 模式记录承载、分类器、重索引、积分稳定性和精确性义务; 账本把截断界、系数窗口、正交探针、积分见证和收敛模量数据附在使用它的有限包旁边. 只要源策略提供可观测探针包就有承载见证, 分类器行通过有限签名给出自反、对称、传递, 源分类器输运后同一批认证观测仍可读出, 因而承载也封闭. 一条历史 h 落入 FourierUp token p 的签名 GAP, 当源域接受它的有限 Fourier 包, 签名关系把它配对到一个答案观测和证据账本, token 引入关系把那条答案命名为 p; 展开后, h 只提供 p 编码的系数或变换观测, 账本记录得到它们时用到的窗口和积分行. 纸面标准桥把同一批包读成通常的有限 Fourier 观测接口, 并且只保留这些有限观测. 本章把这一有限观测构造命名为 FourierUp; 不引入 Plancherel 定理、反演定理、收敛闭合或 Lean 检查的标准桥.'

