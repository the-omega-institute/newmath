key = 'axisadd'

aliases = ['AxisAddUp']

constructive_story_zh = '零轴加法从两条已经接纳的零轴历史开始, 用内核延拓关系 ContR 把第一条接上第二条. 对固定输入对来说, 承载只接受那些同时带有两个零轴输入和 ContR(h,k,r) 见证的结果历史; 缺少输入见证或延拓见证的结果不在表面内. 两个已接受结果只有位于同一个零轴输入对之上并由 HSame 相关时才被分类为同一个, 因而源谱是有序零轴对, 模式谱是展示出来的延拓结果. 账本保存原始输入与延拓见证, 让左单位、右单位、结果仍在零轴上、确定性、结合性和交换性都作为零轴上的检查行出现, 而不把这个运算等同为普通 AddUp. 五条命名证书义务由规范延拓结果、端点 HSame 的自反对称传递、以及确定性和输运共同给出, 被识别的结果仍落在同一个已接受模式中. 一个结果历史 r 落入 AxisAddUp token p 的签名 GAP, 当源域接受它的有序零轴输入, 签名关系把展示的延拓结果配对到答案结果和证据账本, token 引入关系把那条答案命名为 p; 具体说, r 是 p 编码的两条零轴历史的 ContR 和, 只差 HSame. 本章把这一零轴上的延拓构造命名为 AxisAddUp; 不引入完整 AddUp 等同、零轴之外的公开算术或独立加法原件.'

[en]
label = 'AxisAdd'
desc = 'Additive seed by Cont restricted to the e0-spine carrier.'

[zh]
label = '零轴加法'
desc = '将 Cont 限制到 e0-自旋 carrier 上的加法 seed.'
